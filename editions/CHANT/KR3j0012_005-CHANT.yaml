body:
  text: 卷五著書篇十連山三秩三十卷金樓祕訣一秩二十二卷周易義疏三秩三十卷禮雜私記五秩五十卷右四件一百三十二卷甲部注前漢書十二秩一百一十五卷孝德傳三秩三十卷忠臣傳三秩三十卷丹陽尹傳一秩十卷仙異傳一秩三卷黃妳自序一秩三卷全德志一秩一卷懷舊志一秩一卷研神記一秩一卷晉仙傳一秩五卷繁華傳一秩三卷右一十一件二百一十一卷乙部孝子義疏一秩十卷玉韜一秩十卷貢職圖一秩一卷語對三秩三十卷同姓同名錄一秩一卷式苑一秩三卷荊南志一秩二卷江州記一秩三卷奇字二秩二十卷長州苑記一秩三卷玉子訣一秩三卷寶帳仙方一秩三卷食要一秩十卷辯林二秩二十卷藥方一秩十卷補闕子一秩十卷譜一秩十卷夢書一秩十卷右一十八件一百六十卷丙部安成煬王集一秩四卷集三秩三十卷碑集十秩百卷詩英一秩十卷右四件一百四十四卷丁部內典博要三秩三十卷已上六百七十七卷夫安親揚名陳乎三德立身行道備乎六行孝無優劣能使甘泉自湧鄰火不焚地出兼金天降神女騰麇自犪嘯虎還仁陳弇黃雀之祥禽兼赤石之瑞孟仁之筍出林中華之梓生屋感通之至良可稱余中年承乏攝牧神州戚里英賢南冠髦俊車女流水伹踵許掾之門人同連璧咸登樂尹之館老聃貴弱孔子貴仁陳駢貴齊楊朱貴己而終為令德春風秋月賞心樂事淨竹節之船驅桂條之馬洛城之前猶有甄侯之館孝德傳序曰夫天經地義聖人不加原始要終莫踰孝道能使甘泉自涌鄰火不焚地出黃金天降神女感通之至良有可稱上忠臣傳表曰資父事君實曰嚴敬求忠出孝義兼臣子是以冬溫夏凊盡事君之節進思將美懷出奉之義羲軒改物殷周受命三能十亂九棘五臣靡不夙夜在公忠為令德若使縉雲得姓之子姬昌魯衛之臣是知禮合君親孝忠一體性與率由因心致極臣連華霄漢憑暉日月三握再吐夙奉紫庭之慈春詩秋禮早蒙丹扆之訓宣帝襃德麟閣畫充國之形顯宗念功雲臺圖仲華之象忠臣傳序曰夫天地之大德曰生聖人之大寶曰位因生所以盡孝因位所以立忠事君事父資敬之禮寧異為臣為子率由之道斯一忠為令德竊所景行且孝子烈女逸民咸有別傳至於忠臣曾無述製今將發篋陳書備加論討忠臣傳諫諍篇序曰富貴寵榮人所不能忘也刑戮流放人所不能甘也而士有冒雷霆犯顏色吐一言終知自投鼎鑊取離刀鋸而曾不避者其故何也蓋傷茫茫禹跡毀於一朝赫赫宗周滅成禾黍何者百世之後王化漸頹欽若之信既盡解網之仁已泯徒以繼體所及守器攸歸出則清警傳路處則憑玉負房事無暫舛意有必從所謂生於深宮之中長於婦人之手未嘗知憂未嘗知懼況惑襃人之巧笑迷陽阿之妙舞重之以刳斮用之以逋逃亦有傾天滅地汙宮瀦社之罪拔本塞源裂冠毀冕之釁於是策名委質守死不二之臣以剛腸疾惡之心確乎貞一之性不忍見霜露麋鹿栖於宮寢麥穗黍離被於宗廟故瀝血抽誠披胸見款赴焦爛於危年甘滅亡於昔日冀桐宮有反道之明望夷無不言之恨而九重懸遠百雉嚴絕丹心莫亮白刃先指見之者掩目聞之者傷心然後鳴條有不收之魂商郊致白旗之戮忠臣傳死節篇序曰自非識君臣之大體鑒生死之宏分何以能滅七尺之軀殉一顧之感然平路康衢從容之道進危塗險徑忠貞之節興登平路者易為功涉險塗者難為力從容之用世不乏人忠貞之概時難屢有丹陽尹傳序曰傳曰大夫受郡漢書曰尹者正也及其用人實難授受廣漢和顏接下子高自輔經術孫寶行嚴霜之誅袁宏留冬日之愛自二京版蕩五馬南渡固乃上燭天文下應地理爾其地勢可得而言東以赤山為成皋南以長淮為伊洛北以鍾山為華阜西以大江為黃河既變淮海為神州亦即丹陽為京尹雖得人之盛頗愧前賢而眄遇之深多用宰輔皇上受圖負扆寶歷惟新制禮以告成功作樂以彰治定豈直四三皇六五帝孕夏陶周而已哉若夫位以德敘德以位成每念忝莅京河茲焉四載以入安石之門思勤王之政坐真長之室想清談之風求瘼餘晨頗多夏景今綴采英賢為丹陽尹傳全德志序曰老子言全德歸厚莊周云全德不刑呂覽稱全德之人故以全德創其名也此志隆大夫為首伊人有學有辯不夭不貧寶劍在前鼓瑟從後連環炙輠雍容卒歲駟馬高車優游宴喜既令公侯踞掌復使要荒蹶角入室生光豈非盛矣若乃河宗九策事等神鉤陽雍雙璧理歸元感南陽樊重高閣連雲北海公沙門人成市咨此八龍各傳一藝夾河兩郡家有萬石人生行樂止足為先但使樽酒不空坐客恆滿寧與孟嘗聞琴承睫淚下中山聽息悲不自禁同年而語也全德志論曰物我俱忘無貶廊廟之器動寂同遣何累經綸之才雖坐三槐不妨家有三徑接五侯不妨門垂五柳但使良園廣宅面水帶山饒甘果而足花卉葆筠篁而玩魚鳥九月肅霜時饗田畯三春捧繭乍酬蠶妾酌斗酒而歌南山烹羔豚而擊西缶或出或處竝以全身為貴優之游之咸以忘懷自逸若此眾君子可謂得之矣懷舊志序曰吾自北守琅臺東探禹穴觀濤廣陵面金湯之設險方舟宛委眺玉笥之干霄臨水登山命儔嘯侶中年承乏攝牧神州戚里英賢南冠髦俊蔭真長之弱柳觀茂宏之舞鶴清酒繼進甘果徐行長安郡公為其延譽扶風長者刷其羽毛於是駐伏熊迴駟命鄒湛召王祥余顧而言曰斯樂難常誠有之矣日月不居零露相半素車白馬往矣不追春華秋實懷哉何已獨軫魂交情深宿草故備書爵里陳懷舊焉職貢圖序曰竊聞職方氏掌天下之圖四夷八蠻七閩九貉其所由來久矣漢氏以來南羌旅距西域憑陵創金城開玉關絕夜郎討日逐覩屬甲則建朱崖聞蒲萄則通大宛以德懷遠異乎是哉皇帝君臨天下之四十載垂衣裳而賴兆民坐巖廊而彰萬國梯山航海交臂屈膝占雲望日重譯至焉自塞以西萬八千里路之峽者尺有六寸高山尋雲深谷絕景雪無冬夏與白雲而共色冰無早晚與素石而俱貞踰空桑而歷昆吾度青丘而跨丹穴炎風弱水不革其心身熱頭痛不改其節故以明珠翠羽之珍細而弗有龍文汗血之驥卻而不乘尼丘乃聖猶有圖人之法晉帝君臨實聞樂賢之象甘泉寫閼氏之形後宮玩單于之圖臣以不佞推轂上游夷歌成章胡人遙集款開蹶角沿泝荊門瞻其容貌訴其風俗如有來朝京輦不涉漢南別加訪採以廣聞見名為貢職圖云爾捷對篇十一夫三端為貴舌端在焉四科取士言語為一雖諜諜利口致戒嗇夫便便為嘲且聞謔浪聊復記言以觀捷對晉武帝受禪探得一字朝士失色裴楷對曰天得一以清地得一以寧侯王得一以為天下貞宋文帝嘗與群臣汎天淵池帝垂綸而釣回旋良久竟不得魚王景文乃越席曰臣以為垂綸者清故不獲貪餌此竝風流閒勝實為美矣盧志問陸士衡陸抗陸遜是卿何物荷曰如卿於盧珽盧毓相似陳大武該問鍾毓曰皋陶何如人對曰君子周而不比群而不黨也崔正熊詣郡郡將姓陳問正熊曰君去崔杼幾世荅曰正熊之去崔杼如明府之去陳恆也安成公何勗與殷元喜共食元喜即淳之子也勗曰益殷蓴羹元喜徐舉頭曰何無忌諱勗乃無忌子劉悛勸謝瀹酒曰謝莊兒不得道不能飲對曰苟得其人自可沈湎悛乃沔之子魏文帝受禪郭淮晚到帝曰防風後至便行大戮對曰五帝教民以德夏后始用刑書臣在唐虞之世知免防風之戮宋武帝登霸陵乃眺西京使傅亮等各詠古詩名句亮誦王仲宣詩曰南登霸岸回首望長安揚子州年七歲甚聰慧孔永詣其父父不在乃呼兒出為設果有楊梅永指示兒曰此真君家果兒荅曰未聞孔雀是夫子家禽劉道真常與一人共素拌草中食見一嫗將二兒過竝青衣調之曰青羊將二羔嫗荅曰兩豬共一槽祖士言與鍾雅相調祖語鍾曰汝潁川之士利如錐鍾荅曰卿燕代之人鈍如槌祖曰以我鈍槌打汝利錐鍾曰吾有神錐祖曰既有神錐亦有神槌費褘使吳孫權饗之逆敕群臣使至伏食勿起褘至權為輟食褘嘲之曰鳳凰來朝麒麟吐哺鈍驢無知伏食如故諸葛瑾輟食反嘲之曰援植梧桐以待鳳凰有何燕雀自稱來翔羊戎好為雙聲江夏王設齋使戎鋪舒法坐戎處分曰官教前床可開八尺江夏曰開床小狹戎復唱曰官家恨狹更廣八分文帝與戎對曰金溝清泄銅池漾洩極佳光景當得劇棊吳遣張溫聘蜀百官皆餞焉秦宓未往諸葛亮累催之溫曰彼何人也亮曰益州學者也及至溫問宓曰君學乎宓曰五尺僮子皆學何必小人溫復問曰天有頭乎密曰有之溫曰何方宓曰詩云乃睠西顧以此推之頭在西地溫曰天有耳乎宓曰天處高而聽卑詩云鶴鳴九皋聲聞於天若其無耳何以聽之溫曰天有足乎宓曰天步艱難之子不猶若其無足何以步之溫曰天有姓乎宓曰姓劉溫曰何以然也荅曰今天子姓劉故以此知之溫曰生於東乎宓曰雖生於東而沒於西吳紀陟使魏廷問曰吳戎幾何曰西陵以至京都五千七百里道里甚遠難以堅守荅曰譬如八尺之身其護風寒不過數處裴松之謂不如金城萬雉防之者四門而已習鑿齒詣釋道安值持鉢趨堂鑿齒乃翔往眾僧之齋也眾皆捨鉢斂衽唯道安食不輟不之禮也習甚恚之乃厲聲曰四海習鑿齒故故來看爾道安應曰彌天釋道安無暇得相看習愈忿曰頭有鉢上色鉢無頭上毛道安曰面有匙上色匙無面上坳習又曰大鵬從南來眾鳥皆戢翼何物凍老鴟腩腩低頭食道安曰微風入幽谷安能動大才猛虎當道食不覺蚤䖟來於是習無以對志怪篇十二夫耳目之外無有怪者余以為不然也水至寒而有溫泉之熱火至熱而有蕭丘之寒重者應沈而有浮石之山輕者當浮而有沈羽之水淳于能剖臚以理腦元化能刳腹以浣胃養由拂蜻蛉之左翅燕丹使眾雞之夜鳴皆其例矣謂夏必長而蒜麥枯焉謂冬必死而竹柏茂焉謂始必終而天地無窮焉謂生必死而龜蛇長存焉若謂受氣者皆有一定則雉有化蜄雀之為蛤蠰蟲仮翼川鼃奮蜚鼠化為鴽草死為螢人化為虎蛇化為龍其不然乎及其乾鵲知來猩猩識往太皞師蜘蛛而結罟金天據九扈以為政軒轅候鳳鳴而調律唐堯觀蓂莢以候時此又未必劣於人也逍遙國葱變而為韭壯武縣桑化而為柏汝南之竹變而為蛇茵郁之藤化而為䱇盧躭為治中化為雙白鵠王喬為鄴令變作兩蜚鳧諒以多矣故作志怪篇秦青謂友人曰韓娥東之齊至雍門鬻歌既而餘響繞梁三日不絕遇逆旅人辱之娥因舉聲哀哭一哭老少悲愁三日不食娥復舉聲長歌一里抃舞不能自禁忘向之悲也乃厚賂之雍門人至今善歌有人以優師獻周穆王甚巧能作木人趨走俯仰如人鎮其頤則可語捧其手則可舞王與盛姬共觀木人瞚其目招王左右侍者王大怒欲誅優師優師大怖乃剖木以示王皆附會革木所為五臟完具王大悅乃廢其肝則目不能瞚廢其心則口不能語廢其脾則手不能運王厚賜之周穆王時西極有化人能入水火貫金石反山川移城郭穆王為起中天之臺鄭衛奏承雲之樂月月獻玉衣日日薦玉食幻人猶不肯舍乃攜王至幻人之宮構以金銀絡以珠玉鼻口所納皆非人閒物也由是王心厭宮室幻人易之耳王大悅肆志遠遊短人在康居國北男女皆長三尺夫餘國有美珠大如酸棗海中得一布褐長三丈天下之大物有北海之蟹舉其螫能加山焉有東海之魚焉有海燕焉一日逢魚頭七日遇魚尾魚魚產三百里海水如血大月支及西胡有牛名曰日及今日割取其肉明日瘡即愈故漢人有至其國者西胡以此牛示之漢人對曰吾國有蟲名為蠶如人食桑葉而吐絲外國人莫不信有蠶東南有桃都山山有大桃樹上有天雞日初出照此桃天雞即鳴天下之雞感之而鳴樹下有兩鬼對樹持葦索取不祥之鬼食之令人正旦作兩桃人以索中置雄雞法乎此也玉之精為白虎金之精為車渠楓脂千歲為琥珀銅之精為奴錫之精為婢松脂千歲為茯苓大秦國人長十丈小秦國人長八尺一足國人長九寸女國有橫池水婦人入浴出則孕若生男子三年即死神洲之上有不死草似菰苗人已死此草覆之即活秦始皇時大苑中多枉死者有鳥如烏狀銜此草墜地以之覆死人即起坐始皇遣問北郭鬼谷先生云東海亶洲上不死之草生瓊田中秦始皇聞鬼谷先生言因遣徐福入海求金菜玉蔬并一寸葚秦王遣徐福求桑椹於碧海之中海中止有扶桑樹長數千丈樹兩根同生更相依倚是名扶桑仙人食其椹而體作金光飛騰元宮也豫章有石以水灌之便熱以鼎置其上灼食則熟張茂先博物君子也雷孔章亦一時之學士也入洛齎此石以示張張曰所謂燃石也余從兄勱為廣州嘗致數片煮食猶須燒之余丙申歲婚初婚之日風景韶和末乃覺異妻至門而疾風大起折木發屋無何而飛雪亂下帷幔皆白翻灑屋內莫不縞素乃至垂覆闌瓦有時飛墜此亦怪事也至七日之時天景恬和無何雲翳俄而洪濤波流井溷俱溢昏曉不分從叔廣州昌住在西州南門新婦將還西州車至廣州門而廣州殞逝又怪事也喪還之日復大雨霔車軸折壞不復得前爾日天雷震西州廳事兩柱俱時粉碎於時莫不戰慄此又尢為怪也荊州高齋盛夏之月無白鳥余亟寢處於其中及移餘齋則聚蚊之聲如雷數丈之閒如此之異或世見或世不見者涸澤數百歲谷之不徙水之不絕者生慶怨慶忌狀如人其長四寸衣黃冠乘小馬以其名呼之可使千里外一日反報北澤之精生於蟲者一頭兩身狀若蛇以其名呼之可以取魚鱉此竝涸水之精也齊桓公北征孤竹未至卑耳之谿見人長一尺形貝焉右袪衣而走馬前左右皆不見桓公曰吾事之不濟也豈有人若此乎管仲曰臣聞山神有俞如小兒狀長一尺而人形見此霸王之君興則山神見也走馬前導之也袪衣前有水也右袪衣從右方可涉也至卑耳之谿有贊水者公乃從右方而涉既濟水公拜管仲於馬前曰仲父聖人也管仲曰聖人先知無形今已有形臣非聖人也善承教爾桓公與管仲闔門而謀伐莒未發而已聞於國桓公怒管仲曰國必有聖人桓公曰然有藝席必是人也少頃東郭郢至桓公問曰子言伐莒也曰然公曰何以知之曰臣視二君之在臺上也口開而闔是言莒也舉手而指又當莒也君有甲兵之色臣是以知之也山中有寅曰稱虞吏者虎也稱當路者狼也辰日稱雨師者龍也知其物則不能為害矣山精如小兒而獨足足向後喜犯人名蚑呼之即止一名熱六可兼呼之夜在山中見胡人者銅鐵精也見秦人者百歲木也中夜見火光者亦久枯木也外國方士能咒能臨淵禹步龍浮出有物長數十丈方士咒之即縮長數寸掇取著壺中輒有四五以水養之餘國少雨患者輒齎此龍往賣之一龍直金十斤取一頭置水中即興雲雨巨龜在沙嶼閒背上生樹木如淵島嘗有商人依其採薪及作食龜被灼熱便還海於是死者數十人海鴨大如鵝班白文亦名文鳥水鵠大而無尾和鳴如鵠聲在水底鯨鯢一名海鰌穴居海底鯨入穴則水溢為潮來鯨出穴則水入為潮退鯨鯢既出入有節故潮水有期用紫芝煮石石美如芋食之可更調和五味下橘皮葱豉名山之下生葱韭者是古人食石種也故語曰寧得一把五茄不用金玉一車寧得一片地榆不用明月寶珠五茄一名金鹽地榆一名玉豉唯此二物可以煮石有樹名獨根分為二枝其東向一枝是木威樹南向一枝是橄欖樹扶南國今眾香皆共一木根是旃檀節是沈香花是雞舌葉是霍香膠是薰陸地肺荊州濟江西岸安船處也洪潦常浮不沒故云地肺也其中有人焉居南定縣足骨無節解身有毛臥時更相扶然後能起晉寧縣境內出大鼠狀如牛土人謂之鼴鼠天時將災則從山出遊畎畝散落其毛悉成小鼠盡耗五稼利水內有木材元嘉中大水有千餘段木流出斧跡未滅俗曰漢將攻越築城伐木於利水未運之前一夜忽失數千段咸為鬼所匿今所流木昔鬼匿之者滎陽郡山中有巨龜長八九尺下有文字前後足下各躡一龜有時踰山越水咸觀異之晉時營道令何潛之於縣界得一鳥大如白鷺膝上自然有銅環貫之有清鹽池鹽正四方廣半寸其形扶疏似石人耕池旁地取池水沃種之去勿回視即生此鹽太極山有采華之草服之乃通萬里之言孔子冢在魯城北塋中樹以百數皆異種魯人世世無能名者傳言孔子弟子既皆異國之人各持其國樹來種之孔子塋中至今不生荊棘草木東平思王冢在東平民相傳言思王歸國後思歸京師後葬其冢上松柏皆西靡是時思王皆生埋所寵幸者其號呼之聲後數十年猶有聞者脩羊公止於華陰山以道干漢景帝帝禮遇之數歲道不可得有詔問脩羊公何能發語未訖於床上化為白羊題其脅曰脩羊公謝天子後置石羊於通靈臺上合浦有康頭山山上有一頭鹿額上戴科藤一枝四條直上各長丈許地鏡經凡出三家有師曠地鏡有白澤地鏡有六甲地鏡三家之經但說珍寶光氣前金樓先生是嵩高道士多遊名山尋丹砂於石壁上見有古文見照寶物之祕方用以照寶遂獲金玉凡有樹木之變枝柯南枝枯折者寶在樹南西枝枯折者寶在樹西也凡藏諸寶忘不知處者以銅盤盛井花水赴所擬地照之見人影者物在下也入名山牽白犬抱白雞山神大喜芝草及寶玉等自出有石連理生樹高一尺五寸枝頭葉皆紫吳時人獻以為瑞青龍元年五月庚辰芝產於長平之習陽六月甲子許昌典農中郎將充奉以其事聞色丹紫質光耀高尺八寸散為三十六莖枝榦似珊瑚之形巴蛇食象三歲而出其骨君子服之無心腹之疾魏明帝時京兆人食噉兼十許人遂大肥不能搖動其父曾作方長史官徙送彼縣令共食之一二年中一鄉為之斂東海有牛魚形如牛剝其皮貫之潮水至則毛起潮水去則毛弭奇肱國民能為飛車從風遠行至於亶州傷破其車不以示民十年西風至復使給車遣歸無腹國人長而無腹甘水之閒有羲和國有女子方浴於甘淵白鹽山山峰洞澈有如水精及其映月光似琥珀胡人和之以供國廚名為君王鹽亦名玉華鹽大月氐國善為蒲萄花葉酒或以根及汁醞之其花似杏而綠蕊碧鬚九春之時萬頃競發如鸞鳳翼八月中風至吹葉上傷裂有似綾紈故風為蒲萄風亦名裂葉風也巴陵僧房中木愈翦疾生終南山有子伐之瘡隨合浣紗女死三蛟至葬所竇武母窆蛇擊柩前羅含之雞能言西周之犬解語合浦桐葉飛至洛陽始興鼓木奔至臨武樂安胡氏枯骨吟嘯遼水浮棺有人言語鬼來求助張林使鬼而致富神女為董永織縑而免災懷德郡石解語臨川閒山能嘯泗水卻流蓋泉赴節蟲食葉成字鵠口畫作書狐屈指而作簿書狸群叫而講經傳黿頭戴銀釵豬脾帶金鈴成皋之魚號慨華陰之狗涕零武昌郡閤杖有蓮華長安城門斧柯生葉黃巾將走草作鳥獸之形董卓欲誅葉為人馬之狀有莘氏女採兒於空桑之中水濱浣嫗得子於流竹之裏陸機引軍而牙折桓元出遊而蓋飄隕石於宋都雨玉於薄邑取董奉之杏去即值虎持歸姜之橘還輒遇蛇益陽金人杖築地而成井遯水竹王以劍擊石而出水夫差之女死以玉壺送葬韓重之女亡以金罌贈別石言於晉國石立於泰山神降於莘蛇鬭於鄭子文受於菟之乳魏顆獲結草之功龍戰於夏庭樹生於殷廟會稽城門之鼓擊之聲聞洛陽遂得號為雷門是何怪於妖祥之事可殫言乎
