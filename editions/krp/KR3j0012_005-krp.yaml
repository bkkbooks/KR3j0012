body:
  text: 金樓子卷五梁孝元皇帝撰著書篇十案金樓子目録有著書篇永樂大典金樓子聚書篇後有自連山三袟至已上六百七十七卷云云今按其文盖係著書篇正文脫其篇目因誤與聚書合為一篇今分為著書篇大典又别載金樓子著書篇五條其二條與藝文類聚所載梁元帝孝子傳序懷舊志序相出入而首尾殘缺文亦互異知原書具載序論非僅目録今徧考諸書凡可補者悉附於後庶存其大畧云連山三袟三十卷原注金樓年在弱冠著此書至於立年其功始就躬親筆削極有其勞金樓袐訣一袟二十二卷原注金樓纂即連雜事無竒也周易義疏三袟三十卷原注金樓奉述制義私小小措意也案梁書本紀義作講三十卷作十卷禮雜私記五袟五十卷原注十七卷未成右四件一百三十二卷甲部註前漢書十二袟一百一十五卷孝德傳三袟三十卷原注金樓合衆家孝子傳成此忠臣傳三袟三十卷原注金樓自為序卷案隋書經籍志有顯忠傳三梁元帝撰丹陽尹傳一袟十卷原注金樓為尹京時自撰仙異傳一袟三卷原注金樓年小時自撰其書多不經黄妳案梁朝有名士呼書卷為黄妳即見本書雜記篇原本黄訛王謹校正自序一袟三卷原注金樓小時自撰此書不經全德志一袟一卷原注金樓自撰懷舊志一袟一卷原注金樓自撰研神記一袟一卷原注金樓自為序付劉穀纂次晉仙傳一袟五卷原注金樓使顔協撰傳案梁書顔協傳協所撰晉仙五篇繁華傳一袟三卷原注金樓使劉緩撰右一十一件二百一十一卷乙部孝子義疏一袟十卷原注奉述制㫖并自小小措意元案梁書本紀武帝有老子講疏帝有老子講疏四卷今自注云奉述制㫖則孝字即老字之訛義字即講字之訛但卷數不同未敢輙改附識於此玊韜一袟十卷原注金樓出牧渚官時撰貢職圖一袟一卷語對三袟三十卷同姓同名録案梁書本紀作古今同姓名録一袟一卷原注金樓撰式苑一袟三卷原注金樓自撰苑案梁書本紀有式贊三卷字疑訛荆南志一袟二卷原注金樓自撰江州記一袟三卷竒字二袟二十卷原注金樓付蕭賁撰長州苑記一袟三卷原注金樓與劉之亨等撰玉子訣一袟三卷原注金樓付劉緩撰寳帳仙方一袟三卷食要一袟十卷原注金樓付虞預撰辯林二袟二十卷案隋書經籍志辯林二十卷注蕭賁撰藥方一袟十卷補闕子一袟十卷原注金樓為序付鮑泉東里撰譜一袟十卷原注金樓付王兢撰夢書一袟十卷原注金樓使丁覘撰右一十八件一百六十卷丙部安成煬王集一袟四卷案梁書安成康王秀子機襲封謚曰煬所著詩賦數千言世祖集而序之原本訛作煬帝王集係抄冩訛舛謹校正又隋書經籍志安成煬王集五卷集三袟三十卷案梁書本紀文集五十卷隋書經籍志作五十二卷又有梁元帝小集十卷疑作此書時方三十卷非訛也碑集十袟百卷原注付蘭陵蕭賁撰二案隋書經籍志梁元帝撰雜碑二十卷碑文十五卷此作百卷疑至隋時已失其全詩英一袟十卷原注付瑯琊王孝祀撰運案隋書經籍志有詩英九卷注謝靈集注又云梁十卷不著姓名疑即元帝此書右四件一百四十四卷丁部内典博要三袟三十卷案梁書本紀作一百卷已上六百七十七卷夫安親揚名陳乎三德立身行道備乎六行孝無優劣能使甘泉自湧隣火不焚地出兼金天降神女騰麏自􅀈嘯虎還仁陳弇黄雀之祥禽兼赤石之瑞孟仁之笋出林中華之梓生屋感通之至良有可稱余中年承乏攝牧神州戚里英賢南冠髦俊車如流水俱踵許椽之門人同連璧咸登樂尹之舘老聃貴弱孔子貴仁陳駢貴齊楊朱貴已而終為令德案數語係引吕氏春秋下應有缺文春風秋月賞心樂事凈竹節之船驅桂條之馬洛城之前猶有甄侯之館案原本金樓子著書篇僅存五條其能使甘泉自湧四語與藝文類聚所載梁元帝孝徳傳序同中年承乏八句與藝文類聚所載梁元帝懷舊志序同則著書篇原載各書序論惜割裂不全謹校補數則於後孝德傳序曰夫天經地義聖人不加原始要終莫踰孝道能使甘泉自涌鄰火不焚地出黄金天降神女感通之至良有可稱上忠臣傳表曰資父事君實曰嚴敬求忠出孝義兼臣子是以冬温夏凊盡事親之節進思將羙懷出奉之義羲軒改物殷周受命三能十亂九棘五臣靡不夙夜在公忠為令德若使縉雲得姓之子姬昌魯衛之臣是知禮合君親孝忠一體性與率由因心致極臣連華霄漢凴暉日月三握再吐夙奉紫庭之慈春詩秋禮早蒙丹扆之訓宣帝褒德麟閣畵充國之形顯宗念功雲臺圖仲華之象忠臣傳序曰夫天地之大德曰生聖人之寳曰位因生所以盡孝因位所以立忠事君事父資敬之禮寧異為臣為子率由之道斯一忠為令德竊所景行且孝子烈女逸民咸有别傳至於忠臣曽無述製今將發篋陳書備加討論忠臣傳諫諍篇序曰富貴寵榮人所不能忘也刑戮流放人所不能甘也而士有冐雷霆犯顔色吐一言終知自投鼎鑊取離刀鋸而曽不避者其故何也蓋傷茫茫禹跡毁於一朝赫赫宗周㓕成禾黍何者百世之後王化漸頺欽若之信既盡觧網之仁已冺徒以繼體所及守器攸歸出則清警傳路處則慿玉負扆事無暫舛意有必從所謂生於深宫之中長於婦人之手未嘗知憂未嘗知懼况惑褒人之巧笑迷陽阿之妙舞重之以刳斮用之以逋逃亦有傾天㓕地汙宫瀦社之罪㧞本塞源裂冠毁冕之釁於是䇿名委質守死不二之臣以剛腸疾惡之心確乎貞一之性不忍見霜露麋鹿栖於宫寢麥穗黍離被於宗廟故瀝血抽誠披胸見欵赴焦爛於危年甘㓕亡於昔日冀桐宫有反道之明望夷無不言之恨而九重懸遠百雉嚴絶丹心莫亮白刅先指見之者掩目聞之者傷心然後鳴條有不收之魂商郊致白旂之戮忠臣傳死節篇序曰自非識君臣之大體鑒生死之宏分何以能㓕七尺之軀殉一顧之感然平路康衢從容之道進危塗險徑忠貞之節興登平路者易為功渉險塗者難為力從容之用世不乏人忠貞之槩時難屢有丹陽尹傳序曰傳曰大夫受郡漢書曰尹者正也及其用人實難授受廣漢和顔接下子髙自輔經術孫寳行嚴霜之誅袁宏留冬日之愛自二京版蕩五馬南渡固乃上燭天文下應地理爾其地勢可得而言東以赤山為成臯南以長淮為伊洛北以鍾山為華阜西以大江為黄河既變淮海為神州亦即丹陽為京尹雖得人之盛頗愧前賢而眄遇之深多用宰輔皇上受圖負扆寳厯惟新制禮以告成功作樂以彰治定豈直四三皇六五帝孕夏陶周而已哉若夫位以德叙德以位成毎念忝莅京河兹焉四載以入安石之門思勤王之政坐真長之室想清談之風求瘼餘晨頗多夏景今綴采英賢為丹陽尹傳全德志序曰老子言全德歸厚莊周云全德不刑吕覽稱全德之人故以全德創其名也此志隆大夫為首伊人有學有辯不夭不貧寳劒在前鼔瑟從後連環炙輠雍容卒歳駟馬髙車優㳺宴喜既令公侯踞掌復使要荒蹶角入室生光豈非盛矣若乃河宗九䇿事等神鉤陽雍䨇璧理歸元感南陽樊重髙閤連雲北海公沙門人成市咨此八龍各傳一藝夾河兩郡家有萬石人生行樂止足為先但使樽酒不空坐客恒滿寧與孟嘗問琴承睫淚下中山聼息悲不自禁同年而語也全德志論曰物我俱忘無貶廊廟之器動寂同遣何累經綸之才雖坐三槐不妨家有三徑接五侯不妨門垂五柳但使良園廣宅面水帶山饒甘果而足花卉葆筠篁而玩魚鳥九月肅霜時饗田畯三春捧繭乍酬蠶妾酌升酒而歌南山烹羔豚而擊西缶或出或處竝以全身為貴優之㳺之咸以忘懷自逸若此衆君子可謂得之矣懷舊志序曰吾自北守琅臺東探禹穴觀濤廣陵面金湯之設險方舟宛委眺玊笥之干霄臨水登山命儔嘯侣中年承乏攝牧神州戚里英賢南冠髦俊䕃真長之弱柳觀茂宏之舞鶴清酒繼進甘果徐行長安郡公為其延譽扶風長者刷其羽毛於是駐伏熊逥駟原缺一字命鄒湛召王祥余顧而言曰斯樂難常誠有之矣日月不居零露相半素車白馬徃矣不追春華秋實懷哉何已獨軫魂交情深宿草故備書爵里陳懷舊焉職貢圖序曰竊聞職方氏掌天下之圖四夷八蠻七閩九貉其所由来乆矣漢氏以来南羌旅距西域憑陵創金城開玊闗絶夜郎討日逐覩犀甲則建朱崖聞蒲萄則通大宛以德懷逺異乎是哉皇帝君臨天下之四十載垂衣裳而頼兆民坐巖廊而彰萬國梯山航海交臂屈膝占雲望日重譯至焉自塞以西萬八千里路之峽者尺有六寸髙山尋雲深谷絶景雪無冬夏與白雲而共色氷無早晩與素石而俱貞踰空桑而歴昆吾度青邱而跨丹穴炎風弱水不革其心身熱頭痛不改其節故以明珠翠羽之珍細而弗有龍文汗血之驥卻而不乘尼􅉌乃聖猶有圖人之法晉帝君臨實聞樂賢之象甘泉冩閼氏之形後宫玩單于之圖臣以不佞推轂上㳺夷歌成章胡人遥集欵開蹶角沿泝荆門瞻其容貎訴其風俗如有来朝京輦不渉漢南别加訪採以廣聞見名為貢職圖云爾案自孝德傳序以下俱從藝文類聚増補㨗對篇十一夫三端為貴舌端在焉四科取士言語為一雖諜諜利口致戒嗇夫便便為嘲且聞謔浪聊復記言以觀㨗對晉武帝受禪探得一字朝士失色裴楷對曰天得一以清地得一以寧侯王得一以為天下貞宋文帝嘗與群臣汎天淵池帝垂綸而釣回旋良乆竟不得魚王景文乃越席曰臣以為垂綸者清故不獲貪餌此並風流閒勝實為羙矣案此並以下疑係原注原本並作大字姑仍其舊盧志問陸士衡陸抗陸遜是卿何物答曰如卿於盧珽盧毓相似陳大武該問鍾毓曰臯陶何如人對曰君子周而不比羣而不黨也崔正熊詣郡郡將姓陳問正熊曰君去崔杼幾世答曰正熊之去崔杼如明府之去陳恒也安成公何朂與殷元喜共食元喜即淳之子也朂曰益殷蓴羔元喜徐舉頭曰何無忌諱朂乃無忌子劉悛勸謝瀹酒曰謝莊兒不得道不能飲對曰茍得其人自可沉湎悛乃沔之子原注諸如此類雖以至諱為嘲而答者為優魏文帝受禪郭淮晩到帝曰防風後至便行大戮對曰五帝教民以德夏后始用刑書臣在唐虞之世知免防風之戮宋武帝登覇陵乃眺西京使傅亮等各詠古詩名句亮誦王仲宣詩曰南登覇陵岸回首望長安楊子州案藝文類聚作楊氏子太平御覽引作梅周誤年七歳甚聰慧孔永案藝文類聚太平御覽俱作孔君平詣其父父不在乃呼兒出為設果有楊梅永指示兒曰此真君家果兒答曰未聞孔雀是夫子家禽原注如此之流並皆文雅可觀不闗得失也劉道真常與一人共素拌草中食見一嫗將二兒過並青衣調之曰青羊將二羔嫗答曰兩猪共一槽祖士言與鍾雅相調祖語鍾曰汝潁川之士利如錐鍾答曰卿燕代之人鈍如槌祖曰以我鈍槌打汝利錐鍾曰吾有神錐祖曰既有神錐亦有神槌案太平御覽載此叚文小異今附録備考祖納謂梅陶及鍾雅曰君汝潁之士利如錐我幽冀之士鈍如椎持鈍椎捶君利錐皆當摧矣陶雅並稱有神錐不可得摧納曰假有神錐必有神椎陶雅無以對費禕使吳孫權饗之逆敕羣臣使至伏食勿起禕至權為輟食禕嘲之曰鳳凰來朝麒麟鈍驢無知伏食如故諸葛瑾輟食反嘲之曰援植梧桐以待鳳凰有何燕雀自稱來翔原注諸如此例合曰調過為疏鄙也不足多稱羊戎好為䨇聲江夏王設齋使戎鋪舒法坐戎處分曰官教前床可開八尺江夏曰開床小狹戎復唱曰官家恨狹更廣八分文帝與戎對曰金溝清泄銅池漾洩極佳光景當得劇棊原注此其滑稽之雄未足以稱辨也吳遣張温聘蜀百官皆餞焉秦宓未往諸葛亮累催之温曰彼何人也亮曰益州學者也及至温問宓曰君學乎宓曰五尺僮子皆學何必小人温復問曰天有頭乎宓曰有之温曰何方宓曰詩云乃睠西顧以此推之頭在西地温曰天有耳乎宓曰天處髙而聴卑詩云鶴鳴九臯聲聞于天若其無耳何以聴之温曰天有足乎宓曰天歩艱難之子不猶若其無足何以歩之温曰天有姓乎宓曰姓劉温曰何以然也答曰今天子姓劉故以此知之温曰日生於東乎宓曰雖生於東而没於西原注既學而又辨此其優也吳紀陟使魏廷問曰吳域幾何曰西陵以至京都五千七百里道里甚逺難以堅守答曰譬如八尺之身其䕶風寒不過數處裴松謂不如金城萬雉防之者四門而已習鑿齒詣釋道安值持鉢趨堂鑿齒乃翔往衆僧之齋也衆皆捨鉢歛祍唯道安食不輟不之禮也習甚恚之乃厲聲曰四海習鑿齒故故來㸔爾道安應曰彌天釋道安無暇得相㸔習愈忿曰頭有鉢上色鉢無頭上毛道安曰靣有匙上色匙無靣上坳習靣坳也習又曰大鵬从南來衆鳥皆戢翼何物凍老鴟腩腩低頭食道安曰微風入幽谷安能動大才猛虎當道食不覺蚤䖟來於是習無以對案太平御覽載此事曰釋道安俊辨有髙才自北至荆州與習鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒志怪篇十二夫耳目之外無有怪者余以為不然也水至寒而有温泉之熱火至熱而有蕭邱之寒重者應沉而有浮石之山輕者當浮而有沉羽之水淳于能剖臚以理􅀈元化能刳腹以浣胃飬由拂蜻蛉之左翅燕丹使衆鷄之夜鳴皆其例矣謂夏必長而蒜麥枯焉謂冬必死而竹栢茂焉謂始必終而天地無窮焉謂生必死而龜蛇長存焉若謂受氣者皆有一定則雉有化蜄雀之為蛤蠰蟲仮翼川鼃奮蜚䑕化為鴽草死為螢人化為虎蛇化為龍其不然乎及其乾鵲知來猩猩識往太皥師蜘蛛而結罟金天據九扈以為政軒轅候鳳鳴而調律唐堯觀蓂莢以候時此又未必劣於人也逍遥國葱變而為韮壯武縣桑化而為栢汝南之竹變而為蛇茵郁之藤化而為䱇盧躭為治中化為䨇白鵠王喬為鄴令變作兩蜚鳬諒以多矣故作志怪篇秦青謂友人曰韓娥東之齊至雍門鬻歌既而餘響繞梁三日不絶遇逆旅人辱之娥因舉聲哀哭一哭老少悲愁三日不食娥復舉聲長歌一里抃舞不能自禁忘向之悲也乃厚賂之雍門人至今善歌案别卷載金樓子一條其事同其文互異又不著篇名附録於此以備考薛譚學謳於秦未窮青之㫖於一日遂辭歸秦青乃餞於郊衢撫節悲歌聲震林木響遏行雲薛譚乃謝求返終身不敢言歸秦青謂其友曰昔韓娥東之齊匱粮過雍門鬻歌假食既去而響繞梁三日不絶左右以其人弗去過逆旅逆旅之人辱之韓娥因曼聲哀哭一里老幼悲愁涕泣相對三日不食遽追而謝之娥復曼聲長歌一里老幼喜歡抃舞弗能自禁乃厚賂而遣之故雍門之人至今善歌善哭效娥之遺聲有人以優師獻周穆王甚巧能作木人趍走俯仰如人鎮其頥則可語捧其手則可舞王與盛姬共觀木人瞚其目招王左右侍者王大怒欲誅優師優師大怖乃剖木以示王皆附㑹革木所為五臓完具王大悅乃廢其肝則目不能瞚廢其心則口不能語廢其脾則手不能運王厚賜之周穆王時西極有化人能入水火貫金石反山川移城郭穆王為起中天之臺鄭衛奏承雲之樂月月獻玉衣日日薦玉食幻人猶不肯舍乃携王至幻人之宫構以金銀絡以珠玉鼻口所納皆非人間物也由是王心厭宫室幻人易之耳王大悅肆志逺逰短人在康居國北男女皆長三尺夫餘國有美珠大如酸棗海中得一布褐長三丈天下之大物有北海之蟹舉其螯能加山焉有東海之魚焉有海燕焉一日逄魚頭七日遇魚尾魚産三百里海水如血大月支及西胡有牛名曰白皮今日割取其肉明日瘡即愈故漢人有至其國者西胡以此牛示之漢人對曰吾國有蟲名為蠶如人食桑葉而吐絲外國人莫不信有蠶東南有桃都案别卷引此作郁山山有大桃樹上有天鷄日初出照此桃天鷄即鳴天下之鷄感之而鳴樹下有兩鬼對樹持葦索取不祥之鬼食之今人正旦作兩桃人以索中置雄鷄法乎此也玉之精為白虎金之精為車渠楓脂千歳為琥珀銅之精為奴錫之精為婢松脂千歳為茯苓大秦國人長十丈小秦國人長八尺一足國人長九寸女國有横案别卷作潢池水婦人入浴出則孕若生男子三年即死神洲之上有不死草似菰苖人已死此草覆之即活秦始皇時大苑中多枉死者有鳥如烏狀衘此草墜地以之覆死人即起坐始皇遣問北郭鬼谷先生云東海亶州上不死之草生瓊田中秦始皇聞鬼谷先生言因遣徐福入海求金菜玉蔬并一寸葚原注金菜玉蔬四字諸本同然莫曉何義御案此條又見箴戒篇原本多脫誤謹據太平覽校補秦王遣徐福求桑椹於碧海之中海中止有扶桑樹長數千丈樹兩根同生更相依倚是名扶桑仙人食其椹而體作金光飛騰元宫也案原本云求一寸葚尚云難得豈知碧海中有扶桑樹云云謹據太平御覽校改豫章有石以水灌之便熱以鼎置其上灼食則熟張茂先博物君子也雷孔章亦一時之學士也入洛賫此石以示張張曰所謂燃石也余從兄勱為廣州嘗致數片煮食猶須燒之余丙申歳婚初婚之日風景韶和末乃覺異妻至門而疾風大起折木發屋無何而飛雪亂下帷幔皆白翻洒屋内莫不縞素乃至垂覆闌瓦有時飛墮此亦怪事也至七日之時天景恬和無何雲翳俄而洪濤波流井溷俱溢昬曉不分從叔廣州昌住在西州南門新婦將還西州車至廣州門而廣州殞逝又怪事也喪還之日復大雨霔車軸折壞不復得前爾日天雷震西州㕔事兩柱俱時粉碎於時莫不戰慄此又尤為怪也荆州髙齋盛夏之月無白鳥余亟寢處於其中及移餘齋則聚蚊之聲如雷數丈之間如此之異或世見或世不見者涸澤數百歳谷之不徙水之不絶者生慶忌慶忌狀如人其長四寸衣黄冠乘小馬以其名呼之可使千里外一日反報北澤之精生於蟲者一頭兩身狀若蛇以其名呼之可以取魚鱉此並涸水之精也齊桓公北征孤竹未至卑耳之谿見人長一尺形具焉案管子作人物具焉右袪衣而走馬前左右皆不見桓公曰吾事之不濟也豈有人若此乎管仲曰臣聞山神有俞如小兒案管子作登山之神有俞兒者狀長一尺而人形見此覇王之君興則山神見也走馬前導之也袪衣前有水也右袪衣從右方可渉也至卑耳之谿有賛水者公乃從右方而渉既濟水公拜管仲於馬前曰仲父聖人也管仲曰聖人先知無形今已有形臣非聖人也善承教耳桓公與管仲闔門而謀伐莒未發而已聞於國桓公怒管仲曰國必有聖人桓公曰然有藝席案吕氏春秋作有執踱􅂒而上視者必是人也少頃東郭􅀈案吕氏春秋作牙至桓公問曰子言伐莒也曰然公曰何以知之曰臣視二君之在臺上也口開而闔是言莒也舉手而指又當莒也君有甲兵之色臣是以知之也山中有寅日稱虞吏者虎也稱當路案抱朴子有君字者狼也辰日稱雨師者龍也知其物案抱朴子有名字則不能為害矣山精如小兒而獨足足案抱朴子作走向後喜犯人名蚑呼之即止一名熱案抱朴子有内字六案抱朴子作亦可兼呼之夜在山中見胡人者銅鐡精也見秦人者百歳木也中夜見火光者亦乆枯木也外國方士能咒能臨淵禹歩龍浮出有物長數十丈方士咒之即縮長數寸掇取著壺中輙有四五以水飬之餘國少雨患者輙齎此龍徃賣之一龍直金十斤取一頭置水中即興雲雨巨龜在沙嶼間背上生樹木如淵島嘗有商人依其採薪及作食龜被灼熱便還海於是死者數十人海鴨大如鵝案太平御覽作如常鴨班白文亦名文案太平御覽作交鳥也水鵠大而無尾和鳴如鵠聲在水底鯨鯢一名海鰌穴居海底鯨入穴則水溢為潮來鯨出穴則水入為潮退鯨鯢既出入有節故潮水有期用紫芝煮石石美如芋食之可更調和五味下橘皮葱豉名山之下生葱韮者是古人食石種也故語曰寧得一把五茄不用金玉一車寧得一片地榆不用明月寳珠五茄一名金鹽地榆一名玉䜴唯二物可以煮石有樹名獨根分為二枝其東向一枝是木威樹南向一枝是橄欖樹扶南國今衆香皆共一木根是旃檀節是沉香花是鷄舌葉是藿香膠是薰陸地肺荆州濟江西岸安船處也洪潦常浮不没故云地肺也其中有人焉居南定縣足骨無節觧身有毛卧時更相扶然後能起晉寧縣境内出大䑕狀如牛土人謂之鼹䑕天時將災則從山出逰畎畆散落其毛悉成小䑕盡耗五稼利水内有木材元嘉中大水有千餘叚木流出斧跡未滅俗曰漢將攻越築城伐木於利水未運之前一夜忽失數千叚咸為鬼所匿今所流木昔鬼匿之者滎陽郡山中有巨龜長八九尺下有文字前後足下各躡一龜有時踰山越水咸觀異之晉時營道令何潜之於縣界得一鳥犬如白鷺膝上自然有銅環貫之有清鹽池鹽正四方廣半寸其形扶踈似石人耕池旁地取池水沃種之去勿回視即生此鹽太極山有采華之草服之乃通萬里之言孔子冢在魯城北塋中樹以百數皆異種魯人世世無能名者傳言孔子弟子既皆異國之人各持其國樹來種之孔子塋中至今不生荆棘草木東平思王冢在東平民相傳言思王歸國後思歸京師後葬其冢上松栢皆西靡是時思王皆生埋所寵幸者其號呼之聲後數十年猶有聞者脩羊公止於華隂山以道干漢景帝案别卷作武帝帝禮遇之數歳道不可得有詔問修羊公何能發語未訖於床上化為白羊題其脅曰脩羊公謝天子後置石羊於通靈臺上合浦案原本作蒲今依别本校改有康頭山山上有一頭鹿額上戴科藤一枝四條直上各長丈許地鏡經凡出三家有師曠地鏡有白澤地鏡有六甲地鏡三家之經但說珍寳光氣前金樓先生是嵩髙道士多逰名山尋丹砂於石壁上見有古文見照寳物之秘方用以照寳遂獲金玉凡有樹木之變枝柯南枝枯折者寳在樹南西枝枯折者寳在樹西也凡藏諸寳忘不知處者以銅盤盛井花水赴所擬地照之見人影者物在下也入名山牽白犬抱白鷄山神大喜芝草及寳玉等自出案太平御覽引地鏡圖曰夫寳物在城郭邱墻之中樹木為之變視柯偏有折枯是其候也視折枯所向寳有其方凡有金寳常變作積虵見此軰便脫隻履若衣以擲之溺之即得凡藏寳忘不知處以大銅盤盛水着所疑地行照之見人影者物在下也據此則凡有樹木之變以下三段皆地鏡經之文因其文互異謹録以備考有石連理生樹髙一尺五寸枝頭葉皆紫吳時人獻以為瑞青龍元年五月庚辰芝産於長平之習陽六月甲子許昌典農中郎將充奉以其事聞色丹紫質光耀髙尺八寸散為三十六莖枝幹似珊瑚之形巴蛇食象三歳而出其骨君子服之無心腹之疾魏明帝時京兆人食噉兼十許人遂大肥不能揺動其父曽作方長史官徙送彼縣令共食之一二年中一鄉為之歛東海有牛魚形如牛剥其皮貫之潮水至則毛起潮水去則毛弭竒肱國民能為飛車從風逺行至於亶州傷破其車不以示民十年西風至復使給車遣歸無腹國人長而無腹甘水之間有羲和國有女子方浴於甘淵白鹽山山峰洞澈有如水精及其映月光似琥珀胡人和之以供國厨名為君王鹽亦名玉華案曽慥類說作王􅏛鹽大月氐國善為蒲萄花葉酒或以根及汁醖之其花似杏而緑蘂碧鬚九春之時萬頃競發如鸞鳳翼八月中風至吹葉上傷裂有似綾紈故風為蒲萄風亦名裂葉風也巴陵僧房中木愈翦疾生終南山有子伐之瘡隨合浣紗女死三蛟至葬所竇武母窆蛇擊柩前羅含之鷄能言西周之犬解語合浦桐葉飛至洛陽始興鼓木奔至臨武樂安胡氏案别卷引作市枯骨吟嘯遼水浮棺有人言語鬼來求助張林使鬼而致富神女為董永織縑而免災懷德郡石解語臨川間山能嘯泗水却流蓋泉赴節蟲食葉成字鵠口畫作書狐屈指而作簿書狸羣呌而講經傳黿頭戴銀釵猪脾帶金鈴成臯之魚號慨華隂之狗涕零武昌郡閤杖有蓮華長安城閣斧柯生葉黄巾將走草作鳥獸之形董卓欲誅葉為人馬之狀有莘氏女採兒於空桑之中水濵浣嫗得子於流竹之裏陸機引軍而牙折桓元出逰而蓋飄隕石於宋都雨玉於薄邑取董奉之杏去即值虎持歸姜之橘還輙遇蛇益陽金人以杖築地而成井􅀈水竹王以劔擊石而出水夫差之女死以玉壺送葬韓重之女亡以金罌贈别石言於晉國石立於泰山神降於莘蛇鬪於鄭子文受於莵之乳魏顆獲結草之功龍戰於夏庭樹生於殷廟㑹稽城門之鼓擊之聲聞洛陽遂得號為雷門是何怪於妖祥之事可殫言乎金樓子卷五
