body:
  text: 提要金樓子六卷雜家類一雜學之屬臣等謹案金樓子六卷梁孝元皇帝撰梁書本紀稱帝博總郡書著述詞章多行于世其在藩時嘗自號金樓子因以名書隋書經籍志唐書宋史藝文志俱載其目為二十卷晁公武讀書志謂其書十五篇是宋代尚無闕佚至宋濂諸子辨胡應麟九流緒論所列子部皆不及是書知明初漸已湮没明季遂竟㪚亡故馬驌撰繹史徵採最博亦自謂未見傳本僅從他書摭録數條也今檢永樂大典各韻尚頗載其遺文核其所據乃元至正間刋本勘驗序目均為完備惟所列僅十四篇與晁公武十五篇之數不合其二南五霸一篇與説蕃篇文多複見或傳刻者亂其目而反佚其本篇歟又永樂大典詮次無法割裂破碎有非一篇而誤合者有割綴别卷而本篇反遺之者其篇端序述亦惟戒子后妃㨗對志怪四篇尚存餘皆脱逸然中間興王戒子聚書説蕃立言著書㨗對志怪八萹皆首尾完整其他文雖攙亂而幸其標目分明尚可排比成帙謹詳加裒綴叅考互訂釐為六卷其書於古今聞見事迹治忽貞邪咸為苞載附以議論勸戒兼資葢亦襍家之流而當時周秦異書未盡亡佚其所徵引如許由之父名耳兄弟七人十九而隠成湯凡有七號之類皆史外軼聞他書未見又立言聚書著書諸篇自表其撰述之勤所紀典藉源流亦可補諸書所未備惟永明以後艶語盛行此書亦文格綺靡不出彼時風氣其故為古奥如紀始安王遙光一節句讀難施又成變體至於自稱五百年運余何敢讓儼然上比孔子尤為不經是則瑕瑜不掩固不必曲為諱爾乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀金樓子原序先生曰余扵天下為不賤焉竊念臧文仲既歿其言立扵世曹子桓云立徳著書可以不朽杜元凱言徳者非所企及立言或可庶㡬故户牖懸刀筆而有述作之志矣常笑淮南之假手每蚩不韋之託原缺一字由年在志學躬自搜纂以為一家之言粤以凡庸早賜茅社祚土瀟湘搴帷抰服早攝神州晩居外相文案盈前書幌未輟俾夜作晝勤亦至矣其間屢事𤣥言亟登講肆外陳玉鉉之文内宏金疊案疊疑罍之典從乎華隂之市廢乎昌言之説其事一也六戒多務千乗糺紛夕望湯池觀仰月之勢朝瞻羙氣眺非煙之色替扵筆削其事二也復有西園秋月岸幘舉柸左海春朝連章離翰雖有欣乎寸錦而久棄扵尺璧其事三也而體多羸病心氣頻動卧治終日睢陽得善政之聲足不跨鞍聊城有却兵之術吾不解一也常貴無為每􅅓有待閒齋寂寞對林泉而握談柄虛宇遼曠玩魚鳥而拂叢蓍愛靜心彰乎此矣而候騎交馳仍麾白羽之扇兵車未息還控蒼兕之軍此吾不解二也有三廢學二不解而著書不息何哉若非隱淪之愚谷是謂髙陽之狂生者也竊重管夷吾之雅談諸葛孔眀之宏論足以言人世足以陳政術竊有慕焉老氏有言知我者希則我者貴矣有是哉有是哉裴㡬原劉嗣芳蕭光侯張簡憲余之知己也伯牙之琴嗟緑綺之長廢巨卿之驥驅白馬其安歸昔為爼豆之人今成介胄之士智小謀大功名其安在哉盖以金樓子為文也氣不遂文文常使氣材不值運必欲師心霞間得語莫非撫臆松石能言必解其趣風雲元感儻獲見知今纂開闢已来至乎耳目所接即以先生為號名曰金樓子盖士安之元晏稚川之抱朴者焉欽定四庫全書金樓子目録梁元帝自序一篇金樓子十五篇内二南五霸篇有録無書興王篇一箴戒篇二后妃篇三終制篇四戒子篇五聚書篇六二南五覇篇七説蕃篇八立言篇九上立言篇九下著書篇十㨗對篇十一志怪篇十二雜記篇十三上雜記篇十三下自序篇十四
