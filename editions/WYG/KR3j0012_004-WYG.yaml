body:
  text: 金樓子卷四梁孝元皇帝撰立言篇九上案目録有立言上下原本合為一篇其散見􅃨出者猶有上下之名謹參考分之如左案祭法天子諸侯宗廟皆月祭之又有月令皆薦新並云先薦寢廟此皆是月祭正文國語云古者先王月祭日祀雖諸侯不得祖天子而宗廟在都匈奴未滅拊心長呌萬恨不追昔魯國孔氏有仲尼車輿冠服漢眀帝錫東平王蒼光烈皇后假髻按後漢書作紒注周禮追師掌為副編鄭元云副婦人首服三輔謂之假紒帛按後漢書注續漢書帛字作阜巾衣一篋王沈集稱日磾垂泣於甘泉之畫掦雄顯頌於麒麟之圖遂畫先君先妣之像傅咸集畫讃曰敬圖先君先妣之容像畫之丹青曹休畫其父像對之流泣誠可悲也陸機有丞相像讃大司馬夫人像讃即其列焉竊尋孝經所説必稱先王蓋是先王之行不敢以不行也伏見臺内别造至敬殿甘㫖百品月祭日祀又為寢室昏定晨省如平生焉先帝朔望盡哀慟哭又宣脩容奉造二親像朝夕禮敬䖍事孜孜四十年中聿脩功徳追薦繼孝丁蘭無以尚此繹竊慕考妣之盛則立尊像供養於道塲内設花幡燈燭使僧尼頂禮正以烏鳥之心係戀罔極不厭丁年之内遭此百憂一同見似甘心殞越雖復於禮經無文家門之内行之已乆故月祭日祀用遵祭法車輿篋衣謹同魯聖止令朋友知余此心潘岳賦云太夫人御板輿乘按文選作升輕軒柳垂隂車結軌或宴于林或宴于沚按文選作或禊於汜兄弟斑白兒童稚齒稱福按文選作萬夀以獻觴或一懼而一喜嗟夫天下之至樂唯斯而已矣天下之至樂唯斯而已矣忽忽窮生百年之内曷由復如此矣痛矣過隙哀哉逝川淚盡而繼之以血不知復何從陳也與人善言煖於布帛傷人以言深於矛㦸贈人以言重於金石珠玉觀人以言美於黼黻文章聽人以言樂於鍾鼓琴瑟儉約之徳其義大哉齊之遷衛於楚邱也衛文公大布之衣大帛之冠務材訓農敬教勸學元年有車三十乘季年三百乘也豈不宏之在人明月之夜可以逺視不可以近書霧露之朝可以近書不通以逺視人才性亦如是各有不同也君子無邑邑按邑悒古通於窮無忽忽按大戴禮作勿勿於賤譽之而不加勸非之而不加沮定外内之分夷平榮辱之心立不易方斯有恒也夫言行在於美不在於多出一美言美行而天下從之或見一惡意醜事而萬民違之可不慎乎易曰言行君子之樞機樞機之發榮辱之主也昔成湯教民去三面之網而諸侯向之齊宣王活釁鐘之牛而孟軻以王道求之周文王掘地得死人骨哀憫而收葬而天下嘉之也易言不恒其徳或承之羞論語言無恒之人不可卜筮故知人之為行不可不恒詩言無恒之人其如飄風胡不自南胡不自北者也般輸不為拙工改繩準逄羿不為拙射變弦筈君子懐道徳之有檢詩云如月之恒如日之升孔子稱大㢤中庸之為徳其至矣乎又曰君子之道忠恕而已矣伯樂教其所憎者相千里馬其所愛者相駑馬千里之馬不時有其利緩駑馬日售其利急所謂下言而上用者也君子以宴安為鴆毒富貴為不幸故溺於情者忘月滿之虧在乎道者知日損之為貴斯固誹謗之木唐虞之道興瓊瑤之臺辛癸之祚亡在酣歌終日求數刻之歡躭滛長夜騁亡歸之樂而或四知必顯五美常在譬金舟不能凌陽侯之波玉馬不能偶騏􅑓之跡是猶炙冰使燥清柿令熾不可得也夫驕奢者衆縱逸日多如輕埃之應風似宵蟲之赴燭也玉不琢不成噐人不學不知道若雖有天縱㑹無學術猶若伯牙空彈無七弦則不悲王良失轡處駟馬則不疾晉平公問師曠曰吾年已老學將晩耶對曰少好學者如日盛陽老好學者如炳燭夜行追味斯言可為師也淮南言蕭條者形之君寂寞者身之主又云教者生於君子以被小人利者興於小人以潤君子孟子言禹惡㫖酒而樂善言又云若我得志不為食前方丈妾數百人斯言至矣故原憲之緼袍賢於季孫之狐貉趙宣之肉食㫖於智伯之芻豢案原本缺三字子之銀佩美於虞公之埀棘案鹽鐡論貧富篇云趙宣孟之魚食甘於智伯之芻豢子思之銀佩美於虞公之埀棘似此文所本原缺三字疑當作魯子思下子字上下有脱文趙盾食魚事見公羊肉食與芻豢無别疑亦魚飱之訛今未敢輙改姑仍其舊驕滛之理豈可恣歟人非有栁下延陵之才蒙荘柱史之志其以此者蓋有以焉雖復㧞山蓋世之雄回天倒地之力玉几為樽金湯設險驪山無罪之囚五嶺不歸之戍一有驕奢三代同滅䥴金石者難為力摧枯朽者易為功居得其勢也哲人君子戒盈思冲者何也政以戒懼所不睹恐畏所不聞况其甚此者乎夫生自深宫之中長於婦人之手憂懼之所不加寵辱之所未至粤自齠齓便作邦君其天姿卓爾則河間所以髙歩窮兇極悖廣川所以顯戮致之有由者也錫瑞蕃國執玉秉圭春朝則驅馳千乘秋謁則儀按儀下疑脱一字百辟江都廣川可以意者耳請論之一曰驕二曰富三曰媱四曰忌㓜饗尊貴驕也名田縣道富也歌鍾盈室媱也殺戮無辜忌也夫刑罰不中則民無所措手足况倍此者邪夫貴而不驕者鮮矣驕而輕於憲網富則恃於金寳媱則感於昏縱忌則輕於生殺既不知稼穡之艱難又不知民天之有本徒見珠璣犀甲之翫金錢翠羽之竒動容則燕歌鄭舞顧盼則秦筝齊瑟謂與椿鵠齊齡寜知蕣華易晩覆其宗社曽不三省損其身名不逄八議異矣哉古之欲眀眀徳於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者無為不善而怨人刑已至而呼天身不善而怨人不亦反乎刑至而呼天不亦晩乎太公曰夫為人惡聞其情而喜聞人之情惡聞已之惡喜聞人之惡是以不必治也鳥與鳥遇則相躅獸與獸遇則相角馬與馬遇則趹踶愚與愚遇則相傷按太平御覧引此叚作馬與馬遇則趹踶相傷愚與愚遇則五字疑衍天之生此物多其力而少其智智者之謀萬有一失狂夫之言萬有一得是以君子取狂夫之言補萬得之一失也行人不休息於松柏而止於楊栁者以松栢有幽僻之窮楊栁有路側之勢故也君子當去二輕取四重言重則有法行重則有徳貎重則有威好重則有觀言輕則招罪貎輕則招辱周公沒五百年有孔子孔子沒五百年有太史公五百年運余何敢讓焉但水至清則無魚人至察則無徒斯言至矣正當不窮似智正諫似直應諧似優穢徳似隱嘗謂人曰諸葛武侯桓宣武並翼賛王室宣威遐外此鄙夫之所以慕也董仲舒劉子政深精洪範妙逹公羊鄙夫之所以希也榮啓期擊磬縱酒行歌斯為至樂鄙夫之所以重也何者請試論之夫以武侯之賢宣武之智自天祐之蓋有以然也按此下疑有缺文假使逄文眀之后值則哲之君不足為鄙夫扶轂豈青紫之可望邪東方䑕虎之諭斯得之矣及仲舒之學術子政之探微見重元光之初聲高建始之末通宵忘寐終日下帷不有學術何以成噐川溜决石可不勉乎馳光不留逝川倐忽尺石為寳寸隂不惜文武二途並得儔匹啓期擊磬彼獨何人寜止伯鸞之詩將同威輦之詠一以我為馬一以我為牛莊周徃矣嗣宗長逝吾知宇宙之内更有人哉天下一致而百慮同歸而殊途何者夫儒者列君臣父子之禮序夫婦長㓜之别墨者堂高三尺土階三等茅茨不剪采椽不斵冬日以鹿裘為禮盛暑以葛衣為貴法家不殊貴賤不别親踈嚴而少恩所為法也名家苛察儌倖檢而失真是謂名也道家虚無本因循為務中原喪亂實為此風何鄧誅于前裴王滅於後蓋為此也裴㡬原問曰西伯拘而闡周易仲尼厄而作春秋孫子之遇龎涓韓非之值秦后虞卿窮愁不韋遷蜀士嬴疾行夷齊潛隐皆心有不悦爾乃著書夫子實尊千乘褰帷萬里地得周旦聲齊燕奭豪匹四君威同五伯玳簮之客鴈行接踵珠劍之賔肩隨鱗次下帷著書其義何也殊為牴牾良用於邑予答曰吾於天下亦不賤也所以一沭三握髪一食再吐哺何者正以名節未樹也吾嘗欲稜威瀚海絶幕居延出萬死而不顧必令威振諸夏然後度聊城而長望向陽關而凱入盡忠盡力以報國家此吾之上願焉次則清酒一壺彈琴一曲有志不遂命也如何脱畧刑名蕭散懐抱而未能為也但性過抑掦恒欲權衡稱物所以隆暑不辭熱凝冬不憚寒著鴻烈者蓋為此也又問之曰子何不詢之有識共著此書曷為區區自勤如此予答曰夫荷旃被毳者難與道純綿之緻密􅃵藜含糗者不足論大牢之滋味故服絺綌之凉者不苦盛暑之鬰煩襲貂䝖之煖者不知至寒之凄愴予之術業豈賔客之能闚斯蓋以莛撞鍾以蠡測海也予嘗切齒淮南不韋之書謂為賔遊所製每至著述之間不令賔客闚之也余見宰人嘆曰伊尹與易牙同知調鼎而有賢不肖之殊既而嘆曰無識之徒尚以伊尹方易牙余何有㢤退而復嘆曰碧盧似玉猗頓别之白骨似牙離婁别之猗頓離婁千年不㑹遇牙骨之怨何時當彌余見人為鮓嘆曰龍之為物也謂之四靈而亦為鮓魚之為物謂之五協而又為鮓抑乃有莘之調鼎瀟湘之開國歟退而復嘆曰靈龜五色似玉金不免為臛余何有哉余何有哉飽食髙卧立言何求焉修徳履道身何憂焉居安慮危戚也見險懐懼憂也紛紛然榮枯寵辱之動也人其能不動乎仲尼其人也抑吾其次之有佞而進有退按此下疑冇脱文其寜退乎予不喜游宴淹留每宴輙早罷不復沾酌矣太虚所以髙者以其輕而無累也人生茍清而無欲則飄飄之氣凌焉𢷬衣清而徹有悲人者此是秋士悲於心𢷬衣感於外内外相感愁情結悲然後哀怨生焉茍無感何嗟何怨也長沮浴桀溺問焉今日浴佳耶曰佳長沮曰浴湏浴其内而後其表五臟六腑尚有未㓗四支八體何為者耶夫浴者將使表裏潔也内茍含瑕何遽浴耶孔子東游見兩小兒相闘一兒曰我以日初出去人近一兒曰日中近一兒曰初日如車蓋至中裁如盤盂豈不近者大逺者小一兒曰日初出滄滄涼涼至日中有如探湯此非逺者凉近者熱耶孔子亦不知日中天而小落扶桑而大為政亦如是矣湏日用不知如中天之小也湏赫赫然此蓋落日之治不足稱也居家治理可移於官何也治國湏如治家所以自家刑國石奮之為家可矣若謂治國異治家者則條章不治民無依焉故治國者親民若治家也心不可欺物不可示物不欺不示得其𠂻也欺之則物不信示之則民驕矣自家刑國自國刑家可無失矣見善則喜聞惡則憂民之情也茍無憂喜其惟聖人乎若無喜而不喜無憂而不憂蓋何足稱也白鳥蚊也齊桓公卧於栢寢謂仲父曰吾國富民殷無餘憂矣一物失所寡人猶為之悒悒今白鳥營營饑而未飽寡人憂之因開翠紗之幬進蚊子焉其蚊有知禮者不食公之肉而退其蚊有知足者􅬄公而退其蚊有不知足者遂長噓短吸而食之及其飽也腹膓為之破潰公曰嗟乎民生亦猶是乃宣下齊國脩止足之鑒節民玉食節民錦衣齊國大化夫闘者忘其身也忘其親者也行湏臾之怒而闘終身之禍然而為之是忘其身也入是國也言信乎羣臣則可留也行忠乎羣臣則可仕也澤乎百里則富可安也鳯無司晨之善麟乏警夜之功日月不齊光參辰不並見冰炭不同室粉墨不同橐有之矣古語云不鑒於鏡而鑒於人鑒鏡則辨形鑒人則懸知善惡是知鑒於人勝鑒乎鏡矣楚王之食楚也故愛楚四境之民越王之食越也故愛越四境之民天子之食天下也吾是以知兼愛天下之民矣成瓦者炭而瓦不可以得炭潤竹者水而竹不可以得水蒿艾有火不燒不燃土中有水不掘無泉百梅能使百人酸一梅不足成味也孔文舉言武王伐紂而懸之白旗漢祖入關子嬰不死武王歴年止有白魚之瑞漢祖祥應其瑞不一是則漢祖優而武王劣也殷洪逺云魏武興師本由親舉漢祖初起本是亂兵此則魏武優於漢帝蔣子通言漢祖取天下如登山光武取天下如走丸當尋邑百萬震案震疑當作振古未聞滹沱河冰身面流血豈其易也凡如此例有書不如無書委之煨燼於事為宜矣徃者承華殿灾詔問髙堂隆此何灾隆曰殿名崇華而為天災所除是天欲使節儉勿復興崇華之飾也君子有三患未之聞患弗得聞既聞之患弗能學既學之患弗能行君子有四耻有其位無其言君子耻之按此下疑脱有其言三字無其行君子耻之既得之又失之君子耻之地有餘而民不足君子耻之制將之法必使弛張從時事疑則争生勢侔則亂起所以蕭樊被於縲絏信布見於誅夷馭將之間可不深慎之夫陶犬無守夜之警瓦雞無司晨之益塗車不能代勞木馬不中馳逐勢者君之輿威者君之䇿臣者君之馬民者君之輪勢固則輿安威定則䇿勁臣從則馬良民和則輪利獵猛虎者不於北園案園原本作苑謹據下文校改釣鯨鯢者不於南池按池原本作河謹據下文校改何則園非猛虎之藪池非鯨鯢之處也責罷者以舉千鈞督跛者以及走兎驅騏驥於庭求猿猱於檻猶倒裘而索領也諸子興於戰國文集盛於二漢至家家有製人人有集其美者足以叙情志敦風俗其弊者秪以煩簡牘疲後生徃者既積來者未已翹足志學白首不遍或昔之所重今反輕今之所重古之所賤嗟我後生􅀶逹之士有能品藻異同刪整蕪穢使卷無瑕玷覽無遺功可謂學矣夫聰明疏通者戒於太察寡聞少見者戒於壅蔽勇猛剛强者戒於太暴仁愛温良者戒於無斷也世有習干戈者賤乎爼豆修儒行者忽行武功范寗以王弼比桀紂謝混以簡文方赧獻季長有顯武之論文莊有廢莊之説余以為不然余以孫吳為營壘以周孔為冠帶以老莊為歡宴以權實為稻糧以卜筮為神明以政治為手足一圍之木持千鈞五寸之楗制開闔總之者明也顔回希舜所以早亡賈誼好學遂令速殞揚雄作賦有夢腸之談曹植為文有反胃之論生也有涯智也無涯以有涯之生逐無涯之智余將養性養神獲麟於金樓之制也夫石田不生五榖構山不游麋鹿何哉以其無所因也故龍藉風而飛龜由火而兆有其資焉常善利物無棄人也富貴不可以傲貧賢明不可以輕暗夷吾侈而鮑叔亷其性不同也張竦㓗而陳遵汚其行不齊也然而終能相善者蓋無棄人之謂也或説人須才學不資矜素按此句疑誤余謂不然昔孔文舉有言三人同行兩人聰雋一夫底下饑年無食謂宜食底下者譬猶蒸一猩猩煑一鸚鵡耳此蓋悖道之言也寜有是乎禰衡云荀彧彊可與語餘人皆酒瓮飯囊魏時劉陶語人曰智者弄愚人如弄一丸於掌中晉中朝庾道季云亷頗藺相如雖千載死人凛凜如有生氣曹攄李志雖乆在世黯黯如九泉下人皆如此便可結繩而理並抑抗之論也魏長髙有雅體而才學非所矜初官出虞存嘲之曰與卿約法三章談死文筆刑商畧底罪魏怡然而笑無忤於色更覺長髙之為髙虞存之為愚也卞彬為禽獸决録云羊滛而狠猪卑而攣鵝頑而傲狗險而出按太平御覽引齊卞彬禽獸决録曰羊性滛而狠猪性卑而攣狗性險而出皆指斥當時貴勢羊滛狠謂吕文顯猪卑攣謂朱隆之狗險出謂吕文庶也無鵝頑而傲句皆指斥貴勢其蝦蟇科斗賦云紆青拖紫出入苔中以比當時令僕也科斗唯唯羣浮闇水唯朝繼夕聿役如鬼比令史咨事也非不才也然復安用此才乎蕭賁忌日拜官又經醉自道父名有人譏此事賁大笑曰不樂而已何妨拜官温酒之談聊慕言在了無怍色賁頗讀書而無行在家徑偷祖母袁氏物及問其故具道其母所偷祖母乃鞭其母出貨之所得餘錢乞問乃估酒供醉本名渙兄弟共以其憸因呼為賁此人非不學然復安用此學乎世人有才學不勝朋友而好作文章苦辱朋友此謂學螳蜋之鈇運蛣蜣之甲何足以云吾少讀兵書三十餘年搜纂數千止為一帙菁華領袖備在其中性頗尚仁每宏解網重囚將死或許伉儷自㸔城樓夜寒必綈􅀈之賜狴牢併遣犴圉空虚盗者更鳴還取將軍之帳姦夫改徃復錫舍人之車由來此事差非一揆但性頗狷急或有不堪不欲藴蓄胷襟湏令豁然無滯將令士庶文武見我所懷兵法軍令省而不煩此言當矣乃為法三章一曰叛者去燕就楚從魏入韓説趙王之隂謀燒鄴都之倉廪故曰叛者死二曰不附夫不附者功成欲受其祿事亂欲避其禍玉節猶建或可畏威金湯倘覆急湏犇走雖招厚祿常嘆脂膏空加隆遇不酬國士當小㓂馮陵勤王以及豈可見拒抑掦横議出入異辭故曰不附者死三曰違令麾之不進鼓之不止應追白虎反入青龍我舉正正之旗彼徃亭亭之地我攻却月彼向横雲百萬之師復何益也然而李廣數竒或非深失龎涓戰死偶值伏兵故曰違令者抵辠曽子曰昔楚人掩口而言欲以説王王以為慢遂加之誅衛太子以紙閉鼻漢武帝謂聞已之臭又致大辠二者事殊而相似時異而怨同立言篇九下魏明修許昌宫作景福承光永寜昌宴百子延休諸殿築建神芝觀又作長夀康樂永休宜昌諸堂建承露鎜按三國志作盤穿虞淵池激引流川蛟龍吐水珍木芳草周環後庭嗚呼足稱過差者矣老子云生之徒十有三死之徒十有三而人莫能向生之徒也夫水之性也寂寥長邁此其本性也其波濤鼓怒頽山穴石蓋有以云耳金罇玊盃不能使薄酒更厚鸞輿鳯駕不能使駑馬健㨗有是哉右手吹竽左手擊節必不諧矣吕覽云衣人在寒食人在饑陳思王云投虎千金不如一豚肩寒者不思尺璧而思襁衣足也千里之路不可别以準繩萬家之邦不可不明曲直凡為善難任善易奚以知之今與驥俱走人不勝驥矣若夫居于車上驥不勝人矣夫人主亦有車無去其車則衆善皆盡力竭能矣秋早寒則冬必煖春雨多則夏必旱天地不能兩而况於人乎天道圜而地道方何以説天道之圜也精氣一上一下圜周復襍無所稽留故曰天道圜何以説地道之方也萬物殊類殊形皆有分職故曰地道方夫以衆勇無所畏乎孟賁矣以衆力無所畏乎烏獲矣以衆視無以畏乎離婁矣以衆智無以畏乎堯舜矣此君人者之大寳也有以乘舟死者欲禁天下之船有以用兵喪其國者欲偃天下之兵譬之若水火能善用之則為福不能善用則為禍義兵之為天下良藥也亦大也夫吞舟之魚不游清流鴻鵠髙飛不就茂林何則其志極逺牛刀割鷄矛㦸採葵甚非謂也昔有假人於越而救溺子越人雖善㳺子必不生矣失火而取水於海海水雖多火必不滅矣逺水不可救近火也夫犇車之士上無仲尼覆車案覆車據下文疑當作覆舟與上犇車對文之士下無伯夷故號令者國之舟車也安則亷貞生危則争鄙起矣管仲有言無翼而飛者聲也無根而固者情也然則聲不假翼其飛甚易情不待根其固非難以之垂文可不慎歟古來文士異世爭驅而慮動難固鮮無瑕病陳思之文羣才之雋也武帝誄云尊靈永蟄明帝頌云聖體浮輕案此下疑應疊浮輕二字與下文作對句有似於蝴蝶永蟄可擬於昆蟲施之尊極按太平御覽作徳不其􅅓乎夫翠飾羽而體分象美牙而身喪蚌懷珠而致剖蘭含香而遭焚膏以眀而自煎桂以蠧而成疾並求福而得禍衣錦尚褧惡其文之著也夫辟狸之不可使搏雞甝牛之不可使捕䑕今人才有欲平九州并方外責之以細事是猶用鈇斤翦毛髮也夫據榦窺井雖通視不能見其情借明於鏡以照之則分寸可察也吞舟之魚蕩而失水則制於螻蟻離其處也猿狖失木擒於狐狸非其所也故十圍之木持千鈞之屋五寸之楗制九重之城豈其才之足任哉所居得其要也子曰耳聽者學在皮膚心聽者學在肌肉神聽者學在骨髓也翟人以豐狐元豹之皮獻晉文帝嘆曰皮美以自辠人有積醉寐亡裘者宋君曰醉足亡裘乎答曰桀醉亡天下而况裘乎有人謂中行文子曰此嗇夫也公何不就其舍文子曰吾嘗好音此人遺我鳴琴吾嘗好佩此人遺余玉玦非愛吾以禮者也子曰滌盃而食洗爵而飲可以養家客未可以饗三軍兕虎在後隋珠在前弗及掇珠先避後患聞雷掩耳見電瞑目耳聞所惡不如無聞目見所惡不如無見火可見而不可握水可循而不可毁故有象之屬莫貴於火有形之類莫尊於水身曲影直者未之聞也用百人之所能則百人之力舉譬若伐樹而引其本千枝萬葉莫能弗從也剥牛皮鞹以為鼓正三軍之衆然為牛計不若服軛狐白之裘天子被之在廟堂為狐計不若走於平澤行合趣同千里相從趣不合行不同對門不逢也江出岷山河出崑崙涇出王屋潁出少室漢出嶓冢分流同注於東海出則異所歸者同也登髙使人欲望臨深使人欲闚處使然也射則使人端釣者使人恭事使然也或吹火而然或吹火而滅所以吹者異也善為民者樹徳不善為民者樹怨然政不必然也專用聰明事必不成専用晦昩事必有悖一明一晦得之矣殷亡焚衆噐皆盡唯琬琰不焚君子則唯仁義存而已矣夫一妻擅夫衆妾皆亂一臣專君羣臣皆弊其可忽哉人莫不左畫方右畫圓按此下疑有缺文以骨去螘螘愈多以魚敺蠅蠅愈至弓矢不調則羿不能中也六馬不和則造父不能致逺士民不親則湯武不能必勝夜光之璧黄彛之尊始乃中山之璞溪林之榦及良工琢磨則登廟廊之上矣加脂粉則宿瘤進䝉不潔則西施屏人之學也亦如此豈可不學邪世莫學馭龍而學馭馬莫學治鬼而學治人先其急脩也若使南海無采珠之民崑山無破玉之工則明珠不御於椒室美玉不佩乎褘裳也鋸齒不能咀嚼箕口不能别味榼耳不能理音樂屩鼻不能逹芬芳畫月不能摴望舒之景床足不能有尋常之歩跨孺子之竹馬不免於勞脚剥玉蚌之盈案無解於虚腹圖敖倉以救饑仰天漢以解渇指水不能赴其渇望冶不能止其寒陶犬無守夜之警瓦鷄無司晨之益塗車不能代勞木馬不能馳逐皆所忽也按此句疑有誤亦猶草木有龍膽狗脊虎掌麞牙而非四獸也雨以時降則謂之甘及其失節則謂之苦秦氏書懸衡石王莽夜御燈火庶事彌以亂矣菁茅薪草也書尊其貴王雎野鳥也詩重其辭羊鴈賤畜也禮見其質藂棘鄙木也易以定刑所謂常善救物故無棄財而况人身取人誠如是也按自羊雁至是也原本誤於㨗對篇複見又缺菁茅四句詳考文義宜屬此篇謹校正阿膠五尺不能止黄河之濁弊車徑尺不足救鹽池之泄殷洪逺云周旦腹中有三斗爛腸按原本云作念旦作恒腹下無中字謹據曽慥類説校改桓元子在荆州耻以威刑為政與令史杖上捎雲根下拂地足余比庶㡬焉詩云宜民宜人受禄於天書稱立功立事可以永年君子之用心也恒湏以濟物為本加之以立功重之以修徳豈不美乎楚人畏荀卿之出境漢氏追匡衡之入界是知儒道實有可尊故皇甫嵩手握百萬之衆而不反豈非儒者之貴乎摯虞論邕元表賦日通精以整思元􅀶而贍元表擬之而不及余以為仲治此説為然也案此段疑有缺文蔡邕言忠臣不用用臣不忠善言不入入言不善罪人無刑刑人無罪傅元言寵臣大病案此病字疑柄之訛其君則病寵臣過隆其君則聾王良造父不能同車而馭伯喈叔夜不可並琴而彈是知人君不可分權也人君當以江海為腹林藪為心使天下民不能測也徒有其聲而無其實若魚目之珠入市而損價斵氷為璧見日而銷也王懷祖之在㑹稽居喪每聞角聲即洒掃為逸少之弔也如此累年逸少不至及為掦州稱逸少罪逸少於墓所自誓不復仕焉余以為懷祖為得逸少為失也懷祖地不賤乎逸少頗有儒術逸少直虚勝耳才既不足以髙乎物而長其狠傲隱不違親貞不絶俗生不能養死方肥遯能書何足道也若然魏勰之善畫綏明之善棊皆可凌物者也懷祖構怨宜哉主父偃之心蘇季子之歎自於懷祖見之堯問舜紫舌之民不可與語若何舜曰君若逺鑑必知通塞紫舌之民何難合同余以為善對故管仲曰放老馬得迷道隨螘壤得水穴也韓昭侯使吏行縣之南門外有黄犢食苖昭侯下令曰當苖時禁牛馬入田乃得南門黄犢人以為神人心不同有如其面昔燕昭重樂毅而惠王疑其能魏武誅文舉而曹丕收其集劉向劉歆立言相反郗愔郗超所奉各異而况九族乎百姓乎處於堂之陰而知日月之次序也見瓶中之晷而知天下之寒暑也鼓不預於五音而為五音之主水不預於五味而為五味之和將軍不預於五官而為五官之督也蘭生空谷不為莫用而不芳舟在江海不為莫乘而不浮先針而後縷可以成帷蓋先縷而後針不可以成衣服有是哉公沙穆曰居家之方唯儉與約立身之道唯謙與學世人有忿者題其門為鳯字彼不覺大以為欣而意在凡鳥也有寄㯽榔與家人者題為合子蓋人一口也人有罵奴而命名風者凡蟲也如此皆為聼察焉按自阿膠五尺至為聼察焉十一叚原本誤入㨗對篇别卷載殷洪逺以下三段又標金樓子立言下之目詳考文義皆應屬此篇謹校正夫目察秋毫不見華嶽耳聽宫徴不聞雷霆君子用心必湏普也故麋鹿成羣虎豹所避衆鳥成列鷹隼不遊若臨事方就則不舉矣渇而穿井臨難鑄兵並無益也非直是矣復湏適時用矣魯人有身善織屨妻善織縞而徙於越或謂之曰子必窮矣夫屨而履越人跣行夫縞而冠越人被髪蓋無益矣夫水澄之半日必見目睫動之半刻已失方圜靜之勝動誠非一事也良匠能與人䂓矩不能使人巧明師授人書不能使人按人下疑脱一字搜尋仭之隴求干天之木望牛跡之水求吞舟之魚未可得也曾子曰患身之不善不患人之莫已知丹青在山民知而求之善珠在淵民知而取之至道在學而人不知就之惑夫吾假延晷漏常慮奄忽㓜好狂簡頗有勤成諸生孰能傳吾書者使黄巾綠林不能攘奪炎上潤下時為保持則關西夫子此名方邱東里先生夢中相報曹植曰漢之二祖俱起布衣高祖闕於微細光武知於禮徳高祖又鮮君子之風溺儒冠不可言敬辟陽滛僻與衆共之詩書禮樂帝堯之所以為治也而髙帝輕之濟濟多士文王之所以獲寕也髙帝蔑之不用聽戚氏之邪媚致吕后之暴戾果令兇婦肆酖酷之心凡此諸事豈非寡計淺慮斯不免於閭閻之人當世之匹夫也世祖多識仁智奮武畧以攘暴興義兵以掃殘破二公於昆陽斬阜賜於漢津當此時也九州鼎沸四海淵湧言帝者二三稱王者四五若克東齊難勝之冦降赤眉不計之虜彭寵以望異内隕龎萌以叛主取誅隗戎以背信軀斃公孫以離心授首爾乃廟勝而後動衆計定而後行師於時戰克之將籌畫之臣承詔奉令者獲寵違命犯㫖者顛危故曰建武之行師也計出於主心勝决於廟堂故竇融因聲而景附馬援一見而嘆息諸葛亮曰曹子建論光武將則難比於韓周謀臣則不敵良平時人談者亦以為然吾以此言誠欲美大光武之徳而有誣一代之俊異何者追觀光武二十八將下及馬援之徒忠貞智勇無所不有篤而論之非减曩時所以張陳特顯於前者乃自髙帝動多闊疎故良平得廣於忠信彭勃得横行於外語有曲突徙薪為彼人案漢書作亡恩澤焦頭爛額為上客此言雖小有似二祖之時也光武神畧計較生於天心故帷幄無他所思六竒無他所出於是以謀合議同共成王業而已光武稱鄧禹曰孔子有回而門人益親嘆吳漢曰將軍差强吾意其武力可及而忠不可及與諸臣計事常令馬援後言以為援䇿每與諧合此皆明君知臣之審也光武上將非減於韓周謀臣非劣於良平原其光武䇿慮深逺有杜漸曲突之明高帝能踈故張陳韓周有焦爛之功耳黄瓊言光武創基於氷泮之中用兵於枳棘之地有竒功也或曰光武之時敵寜有若項羽者余應之曰昔馬援見公孫述自修飾作邉幅知無大志推羽之行皆較然可見而胡有疑也仲長公理言世祖文史為勝晉簡文言光武雄豪之類最為䂓檢之風世誠以為子建言其始孔明揚其波公理導其源簡文宏其説則通人之談世祖為極優矣一兎走街萬夫爭之由未定也積兎滿市過者不顧非不欲兎分已定矣雖鄙人不爭故治國存乎定分而已河上公序言周道既衰老子疾時王之不為政故著道徳經二篇西入流沙至魏晉之間詢諸大方復失老子之㫖乃以無為為宗背禮違教傷風敗俗至今相傳猶未祛其惑皇甫士安云世人見其書云谷神不死是謂元牝故好事者遂假託老子以談神仙老子雖存道徳尚清虚然愽貫古今垂文述而之篇及禮傳所載孔子慕焉是也而今人學者乃欲棄禮學絶仁義云獨任清虚可以致治其違老子親行之言古之學者為己今之學者為人學而優則仕仕而優則學古人之風也修天爵以取人爵獲人爵而棄天爵末俗之風也古人之風夫子所以昌言末俗之風孟子所以扼腕然而古人之學者有二今人之學者有四夫子門徒轉相師受通聖人之經者謂之儒屈原宋玉枚乘長卿之徒止於辭賦則謂之文今之儒博窮子史但能識其事不能通其理者謂之學至如不便為詩如閻纂善為章奏如伯松若此之流汎謂之筆吟詠風謡流連哀思者謂之文而學者率多不便屬辭守其章句遲於通變質於心用學者不能定禮樂之是非辯經教之宗㫖徒能揚㩁前言抵掌多識然而挹源知流亦足可貴筆退則非謂成篇進則不云取義神其巧惠筆端而已至如文者維湏綺縠紛披宫徴靡曼脣吻遒㑹情靈揺蕩而古之文筆今之文筆其源又異至如彖繫風雅名墨農刑虎炳豹鬱彬彬君子卜談四始劉言七畧源流已詳今亦置而弗辨潘安仁清綺若是而評者止稱情切案原本作悄叨謹據太平御覽校改故知為文之難也曹子建陸士衡皆文士也觀其辭致側密事語更明意匠有序遣言無失雖不以儒者命家此亦悉通其義也徧觀文士畧盡知之至于謝元暉始見貧小然而天才命世過足以補尤任彥升甲部闕如才長筆翰善緝流畧遂有龍門之名斯亦一時之盛夫今之俗搢紳稚齒閭巷小生學以浮動為貴用百家則多尚輕側涉經記則不通大㫖茍取成章貴在悦目龍首豕足隨時之義牛頭馬髀强相附㑹事等張君之弧徒觀外澤亦如南陽之里難就窮檢矣射魚指天事徒勤而靡獲適郢首燕馬雖良而不到夫挹酌道徳憲章前言者君子所以行也是故言顧行行顧言原憲云無財謂之貧學道不行謂之病末俗學徒頗或異此或假兹以為技術或狎之以為戯笑若謂為技術者犁軒眩人皆技術也若以為戯笑者少府闘獲皆戱笑也未聞彊學自立和樂慎禮若此者也口談忠孝色方在於過鴻形服儒衣心不則於徳義既彌乖於本行實有長於澆風一失其源則其流已逺其與不隕穫於貧賤不充詘於富貴不畏君王不累長上不聞有司者何其相反之甚王仲任言夫説一經者為儒生博古今者為通人上書奏事者為文人能精思著文連篇章為鴻儒若劉向楊雄之列是也蓋儒生轉通人通人為文人文人轉鴻儒也按此條原本止有金樓子三字無篇名考文義與前段相類謹附於此子思云堯身長十尺眉乃八采舜身長六尺靣頷無毛禹湯文武周公或勤思勞體或折臂望陽或秃骭背僂聖賢在徳豈在貎乎按此卷原本載金樓子三段一出立言篇一出興王篇此段不標篇名或䝉上立言之目謹附於此按周禮筮人氏掌三易夏曰連山殷曰歸藏周曰周易解此不同按杜子春云連山伏羲也歸藏黄帝也予曰按禮記曰我欲觀殷道得坤乾焉今歸藏先以坤後乾則知是殷明矣推歸藏既則殷制連山理是夏書銘頌所稱興公而已按此句疑有誤夫披文相質博約温潤吾聞斯語未見其人班固碩學尚云賛頌相似陸機鈎深猶稱碑賦如一楊泉賦序曰古人作賦者多矣而獨不賦蠶乃為蠶賦是何言與楚蘭陵荀况有蠶賦近不見之有文不如無述也黄金滿筒不以投龜明珠徑寸豈勞彈雀按自按周禮以下四條原本俱無太平御覽引金樓子有之無篇名考文義似應屬此篇謹附於此金樓子卷四
