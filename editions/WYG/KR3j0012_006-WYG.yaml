body:
  text: 金樓子卷六梁孝元皇帝撰雜記篇十三上案此篇目録本分上下原本割裂有載上下篇名者今仍分屬其但標雜記篇者則附於上篇之後下篇之前又此篇雜引子史疑皆有斷語因原本割裂失去故或有或無今悉仍其舊謹識於此成湯誅獨木管仲誅史符吕望誅任卨魏操誅文舉孫䇿誅髙岱黄祖誅禰衡晉相誅嵇康漢宣誅楊惲此豈闗大盗者深防政術腹誹心謗不可全也龜所以有殻者何也欲以自衛也而人求而鑚灼之何也為殻也鳥所以可愛者為有羽也而人殺之何也為毛也私家有器甲欲以防盗也而王法治之閭閻間有利口之人者欲自進也而縣官裁之可不戒哉有人讀書握卷而輙睡者梁朝有名士呼書卷為黄妳此盖見其羙神養性如妳媪也夫兩葉蔽目不見泰山兩豆塞耳不聞雷奮以其専志也専志既過不覺睡也趙簡子沉鸞激於河曰吾嘗好聲為吾致之吾嘗好宫室為吾致之吾嘗好良馬善御為吾致之吾好賢士而鸞激未嘗進一人是長吾過而黜吾善也夫簡子者能善督責於臣矣有人以人物就問司馬徽者徽初不辨其髙下毎輙言佳其婦諫之曰人以君善士故質疑問於君君宜論辨使各得其所而一者言佳二者言佳豈人所咨問君之意耶徽曰汝此言亦復佳此所以避時也劉穆之居京下家貧其妻江嗣女穆之好徃妻兄家乞食毎為妻兄弟所辱穆之不為恥一日徃妻家食畢求㯽榔江氏弟戯之曰㯽榔本以消食君常飢何忽須此物後穆之來為宋武佐命及為丹陽尹乃召妻兄弟設盛饌勸酒令醉言語致歡座席將畢令厨人以金拌貯㯽榔一斛曰此日以為口實客因此而退顔師伯要倖貴臣莫二而多納貨賄家累千金宋世祖常與師伯摴蒲籌將决世祖先擲得雉喜謂必勝師伯後擲得盧帝失色師伯擲遽歛手佯曰㡬作盧爾是日師伯一輸百金宋山陽王休祐屢以言語忤顔色有庾道敏者能相手板休祐以己手板託為它許令占之庾曰此板相乃甚貴然後使人多諐忤休祐以褚淵詳宻乃換其板它日淵得侍帝自稱下官太宗多忌甚不悦而手板徃徃入相余以為信然南陽劉類好察民間聞狗逐猪子聲謂吏殺猪便曵五官掾孫弼時在職有三不肯遷之也吏題其門曰劉府君三不肯此戒褊急也余豈可不三復斯言哉荆楚間有人名我者此人向父恒稱我向子恒稱名此其異也衛人有夫妻祝神者使得布百匹其夫曰何少耶妻曰布若多子當買妾也韓子曰燕人李季其妻私通還見私通者在内令解髪出門季曰是何人妻曰無之季曰吾見鬼也妻曰宜取五姓案韓非子作牲尿浴季乃詐之曰此蘭湯也案以上十二條原本有雜記上篇標目今彚於前其無標目者若干條則附於上篇之後下篇之前夫結繩之約不可治亂秦之緒干戚之舞不可解聊城之圍且熊經鳥伸非謂傷寒之治呼吸吐納又非續骨之膏故知濟世各有其方也晉樂見殺士㑹奔秦子紏見誅管夷吾方覇時乎時乎事不同也吉凶在天猶影之随形響之應聲也形動則影動聲出則響應此分數乃有所繫非身口之進退也盖聞騏驥長鳴伯樂昭其能盧狗悲號韓國知其壯是以效之齊秦之路以逆千里之任夫矢人豈不仁於函人矢人惟恐不傷人函人惟恐傷人故技術不同也射使人端釣使人㳟登髙而望臨深而闚事使然也出林不得直道行險不得履繩鬻棺者欲民之死蓄榖者欲嵗之饑船漏水入壺漏内虚也狂者東走逐者亦東走溺者入水救者亦入水事雖同而心異也孔子游舍於山使子路取水逄虎於水與戰攬尾得之内於懐中取水還問孔子曰上士殺虎如之何子曰上士殺虎持虎頭中士殺虎如之何子曰中士殺虎持虎耳又問下士殺虎如之何子曰下士殺虎捉虎尾子路出尾棄之復懐石盤曰夫子知虎在水而使我取水是欲殺我也乃欲殺夫子問上士殺人如之何曰用筆端中士殺人如之何曰用語言下士殺人如之何曰用石盤子路乃棄石盤而去昔莊子妻死惠子弔之方箕踞鼓盆而歌豈非逹乎夏侯章為孟嘗君所禮駕駟馬有百人之食而章見人必毁孟嘗君人有問其故答曰臣無功於孟嘗君不爾則無見君之長也余以為不然東方有士曰袁旌因將有適而饑於道狐邱之盗父見之下壺飱以予之問子誰也曰我狐邱之盗父也曰吾不食也兩手據地而嘔之不出喀喀然伏地而死也太史公書有時而謬鄭世家云子産鄭成公子而實子國之子也尚書顧命衛實侯爵衛世家則言伯爵斯又乖也尚書云金縢是周公東征之時史記是姬旦後又紕繆焉其餘瑣碎亦不為少諸葛孔明嘗戰於鳯山諸葛孔明到益州嘗戰於石室諸葛孔明戰於石井曹植曰吾志不果吾道不行將來采史官之實録時俗之得失為一家之言藏之名山此外徒虚言耳昔洛下有洞穴其深不測有一婦人欲殺其夫謂夫未嘗見此穴夫自送觀此穴婦遂推夫下穴經多時至底婦於後擲飯物如欲祭之此人良乆乃蘓得飯食徊徨覔路仍得一穴便匍匐從就覺所踐如塵而聞粳米香噉之芬羙又齎以去食所齎將盡便入都郛郭修整宫觀壯麗臺榭房宇悉以金銀為飾雖無日月明踰三光被羽衣奏歌樂長人誥令前去凡過如此者九有人云君命不得停還問張華當悉此人便随穴而行出交州後歸洛問張華示之二物華云如塵者是黄河下龍泥是昆山泥也因訴華云為妻所苦華乃取其妻而煮之案太平御覽引幽明録曰洛下有洞穴婦欲殺夫推下經多時至底仍得一穴行數十里見人皆長三丈披羽衣如此九處最晩所至告饑長人指中庭栢樹下有一羊令跪捋羊初捋得一珠後得始令其噉之即得療饑復沿穴行出交州問張華云九處地仙名九館大夫羊為癡龍初一珠食之天地等夀次者延年後者充饑而已與此條當為一事而其文互異謹附錄以備考馬耽以才學知名譙縱文表皆耽所製會則賦詩多箴諫蜀土聞王師當至耽方檢封儲藏為國防守朱齡石具以聞耽性軒傲故猶徙邉自發之後諸譛日至耽越嶲界謂所親曰朱侯不因我下而見遣來此必惑於衆口恐卒不免也居無㡬而聞蜀信當至遥判知盡沐浴席地安卧作詩畢嘆曰所恨生於亂世矣我雖不引藥比於瞑目信有事便随宜見殺勿嘆我狂也言訖冺然若已絶矣蜀使繼至一遵其言戮尸訖無所知此謂能耿介也案晉書譙縱傳朱齡石徙馬躭於越嶲追殺之耽之徙也謂其徒曰朱侯不送我京師㓕衆口也吾必不免乃盥洗而卧引繩而死湏􅁷齡石師至遂戮尸焉史謂不送我京師㓕衆口也此謂朱齡石具以聞與史不同一也史謂師至此謂蜀使繼至與史不同二也史謂引繩而死此謂言訖冺然若已絶與史不同三也又考宋書朱齡石傳譙縱奔於涪城巴西人王志斬送偽尚書令馬耽封府庫以待王師則封府庫以待宋之師者志也并無徙越嶲事晋書則謂其尚書令馬耽封倉庫以待王師此亦謂耽方檢封儲藏為國防守各書不同如此何承天於太祖座戱庾登之曰夫因禍為福未必皆智也庾答曰我亦幾與三豎同戮承天為謝晦作表云當浮舟東下戮此三豎故庾公以此嘲之承天失色又與林道人同太祖坐常令二人棊林公指三棊謂承天曰維當承流直戮此三豎詠此言至於再三承天汗浹背恍惚蒼茫遂致失局孟昶立功專由妻也昶謂妻曰劉邁毁我於桓元正應作賊耳妻曰觀君非謀及婦人或由湏錢財故也於是下其絳帳姊妹適人者有帳并􅒌衣服皆方便借取宻壊為襖得三千餘領及平京城昶軍容最盛巢尚之求官執事就其求狀尚之乃状云尚之始祖父堯讓天下不受仍次魯郡巢尚之年若干所由以其無三代疑於序用聞之於孝武帝武帝拊床賞嘆曰此必不凡彌宜用之世人相與呼父為鳯毛而孝武亦施之祖便當可得通用不知此言意何所出王翼在座聞孝武此言逕造謝超宗向侍御坐天㫖云弟有鳯毛吾不曾見此物暫借一看翼非惟不曉此㫖近不知超宗是謝鳯之兒超宗感觸既深狼狽起還内裏避之翼謂超宗還内檢取鳯毛坐齋中待望乆之超宗心懼㣲歇兼冀其已悟於是更出對客翼又謂之曰鳯毛止於此一㸔本不將去差無損失那得遂不見借超宗又走乃令門人宻徃喻之翼然後去翼即是於孝武座呼羊肉為蹲鴟者乃其人也超宗字㡬卿中拜率更令騶人姓謝亦名超宗亦便自稱姓名云超宗蟲蟻就官乞睞幾卿既不容詶此言騶人謂為不許而言之不已幾卿又走劉撝少有豪氣家産富厚自奉養伎妾藝貌當時絶倫築館穿池雅有佳趣飲食珍味貴㳺莫及當世之士皆願與交撝随方接對無不諧欵齊武帝微時撝未之識時嘗附人車載至撝門同乗與撝善獨下造焉言畢而辭退撝怪而問焉對曰與蕭侍郎同車撝自至車後請焉既而歡飲如舊相識齊武甚懐之何敬容書名敬字大作茍小作文容字大作父小作口陸倕戯之曰卿名茍既竒大父殊不小敬容不能答常事衣服夏月入朝衣裳不整乃扶伏床下以熨斗熨之衣既甚輕背便焦灼不辨屯屯兩字之異答人書曰吾比七弊時人以為笑也不知晉國及晉朝人或嘲之曰獻公殺賈后重耳殺懐愍卿憶此敬容曰從來所難此故足稱匪人也宋玉戱太宰屢游之談後人因此流遷反語至相習至如太宰之言屢游鮑照之伐鼔孝綽歩武之談韋粲浮柱之説是中太甚者不可不避耳俗士非但文章如此至言論尤事反語何僧智者嘗於任昉坐賦詩而言其詩不類任云卿詩可謂髙厚何大怒曰遂以我為狗號任逐後解説遂不相領任君復云經蓄一枕不知是何木㑹有委巷之謂任君曰此枕是標櫧之木任託不覺悟此人乃以宣誇於衆有自得之色夫子曰必也正名乎斯言讜矣孔翁歸解元言能属文好飲酒氣韻標逹嘗語余曰翁歸不畏死但願仲秋之時猶觀羙月季春之日得玩垂楊有其二物死所歸矣余謂斯言雖有過差無妨有才也王思㣲性好潔浄毎還侍中省洗浴必乞御水水清濁與他井不異且貴水名耳廬陵威王之蓄内也千門相似萬户如一齋前悉施木天以蔽光景春花秋月之時暗如深夜撤燭内人有不識晦明者動經一紀焉所以然者正以桑中之契犇則難禁栁園之下空床多怨所以嚴其制而峻其網家人譬之廷尉門内同於苫廬雖制控堅嚴而金玉滿室土木緹罽不可勝云及凶冦濟江而凴陵京邑王之邸第邇於路左重門自啓無復擊柝之聲春服初成遂等閼氏之飾黄金滿匱前屬九虎白璧千雙後輸六郡向之所閉今所開向之所聚今所􅄆屏去三惑可不戒乎昔者潘君之慕虢雨之為人也虢雨好學方夏置金鏤龍盤於側以洗墨渝焉潘君慕之遂無冬夏置金鏤龍盤於側而不以洗墨渝也此豈所謂愛其滯質而失其實也廬濛侯之妍也行必捻其纓顔氏學之動足而捻其纓為不妍也如舊此又潘君也余以九日從上幸樂遊苑被敕押伏䝉敕板軍主新從荆還人馬器甲震耀京輦百姓觀者如堵墻焉上諸子之中特垂慈愛相賚相接其日賦詩䝉賞其晩道義被稱左右拭目朋友改觀此時天髙氣清炎凉調適千載一時矣上謂人曰余義如荀粲武如孫䇿余經侍副君講時季秋也召登含露之閣同時奉令者定襄侯祇舍人庾肩吾而已曲䝉恩晏自夜至朝奉玉裕之温入銅龍之省曈曨日色還想安仁之賦徘徊月影懸思子建之文此又一生之至樂也余後為江州刺史副君賜報曰京師有語曰議論當如湘東王仕宦當如王克時始為僕射領選也案王克時史無此人且此二句必有韵之語時字文義當属下句考梁書王瑩字奉光武帝時為左僕射克與光以形相近而訛上脱奉字光與王音正相協今未敢輙改姑仍其舊余作金樓子未竟從荆州還都時有言是鍜真金為樓子者來詣余三爵之後徃徃乞借金樓子玩弄之應大竒巧此則近可咍也宋岱之鷄猶解談説昔玉池國有民壻面大醜婦國色鼻齆壻乃求媚此婦終不肯囘遂買西域無價名香而熏之還入其室婦既齆矣豈分香臭哉世有不説適物而變通求進盡皆此類也參絲之絞以弦琴緩張則撓急張則絶案以下七條原本無篇名附録於此王仲宣昔在荆州著書數十篇荆州壊盡焚其書今存者一篇知名之士咸重之見虎一毛不知其斑案原本僅存末八字謹據太平御覽校補桂華無實玉巵無當當底也今俗猶有匡當之言也周赧王即位負債而逃之名為逃債之宫今洛陽南宫謻臺是也竊民鐵而藏之専諸學炙魚香聞數里王僚索魚炙専諸持利鋼刀藏著魚腹中持刀㦸者於後鉤専諸而諸隐刀刺王僚乳出徹後屏風僚子羗忌走及犇牛手接飛燕闔閭患之石室銅户藏翳備之也漢張猛皇甫商少而善相為狎既過乃至相殺爰及出奔故君子知慎之貌必齋莊於事為善邱遲出為永嘉郡羣公祖道於東亭敬子沈隐侯俱至邱云少來搜集書史頗得諸遺書無復首尾或失名凡有百餘卷皆不得而知今併欲焚之二客乃謂主人云可皆取出共㸔之傅金紫末至二客以向諸書示之傅乃發擿剖判皆究其流出所得三分有二賔客咸所悦服雜記下篇殷湯取士於商賈周武取士於負薪齊桓取士於車轅大漢取士於奴僕明王聖主取士以賢不拘卑賤故其功徳洋溢名流竹帛也大器不可小用小士不可大任周君出獵見白鴈為羣周君鼓弩欲射道之行者其御公孫龍下車拊矢曰君以鴈射人無乃虎狼也魏絳請施舍積粟自公以下有積者盡出之國無滯粟亦無困人公無禁利又無貪民行之期年國乃有節此盖䆳古之法耳今若開府併以濟民忽值妖賊便當束手此劉虞惜放火所以見誅仲堪賑貧民於兹竄矣趙簡子出畋命鄭龍射埜人使無驚吾鳥龍曰吾先君晉文公伐衛不僇一人今君一畋而欲殺良民是虎狼也簡子曰人畋得獸我畋得士故縁木愈髙者愈懼人爵愈貴者愈危可不慎乎齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國之恥胡不雪之以政公曰善因發倉粟賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不復遺其冠齊宣王晝卧案説苑作出獵於社山父老十三人迎勞王王命賜父老田不租又無徭役父老皆拜而閭邱先生獨不拜王問之對曰臣願得夀而富貴也王曰夫生殺有時夀非寡人所得許也今倉廪以備災荒無以富先生大官無缺無以貴先生閭邱曰不然願大王選良吏以牧之臣得夀矣春秋振之以時無煩擾百姓臣得富矣大王出令曰少者敬老則臣得貴矣王曰善夫主有三惡不修文徳而尚武力不明教化而枉任刑是一惡也妃妾百數黔首多鰥寡是二惡也男不耕耨女不紡績杼軸既空田疇蕪薉是三惡也主有三殆倍徳好色親謟諛逺忠直嬖子衆多嫡嗣無立是一殆也嚴刑峻法是二殆也犬馬啖黍民不厭糟糠是三殆也田光鞠武俱徃候荆軻軻時飲酒醉卧光等徃視之唾其耳中而去軻醉覺問曰誰唾我耳婦曰燕太子師傅向來是二人唾之軻曰出口入耳此必大事燕田光鞠武俱徃候荆軻軻在席擊筑而歌莫不髪上穿冠昔鄧通從理入口相者曰必餓死漢文帝曰能富通者我也賜以銅山其後果餓死枚乗云磨礲不見其損有時而盡種樹不見其長有時而大積行不知其善有時而用棄義不知其惡有時而亡也楚國龔舍初随楚王朝宿未央宫見蜘蛛焉有赤蜘蛛大如栗四面縈羅網有蟲觸之而死者退而不能得出焉舍乃嘆曰吾生亦如是矣仕宦者人之羅網也豈可淹嵗於是掛冠而退時人笑之謂舍為蜘蛛之隐桓譚有新論華譚又有新論揚雄有太元經楊泉有太元經談者多誤動形言也或云桓譚有新論何處復有華譚揚子有太元經何處復有太元經此皆由不學使之然也諸葛司馬二相誠一國之宗師霸王之賢佐也孔明起巴蜀之地蹈一州之土省任刑法整齊軍伍歩卒數萬長驅祁山慨然有河洛飲馬之志仲逹據天下十倍之地仗兼并之衆據牢城擁精鋭無擒敵之意若此人不已則雍梁敗矣方知司馬理大優乎髙貴鄉公賦詩給事中甄歆陶成嗣各不能著詩受罰酒金谷聚前絳邑令邵滎陽中牟潘豹沛國劉􅃉不能著詩並罰酒三斗斯無才之甚矣畢卓常飲廢職比舍郎釀熟卓因醉夜至其甕間取酒飲之掌酒者不察執而縛之郎徃視之乃畢吏部也遽釋其縛卓遂與主人飲於甕間取醉而去卓嘗謂人曰右手持酒杯左手執蠏螯拍浮酒池中便足了一生也孔静居山隂宋武㣲時以静東豪故徃候之静時晝寢夢人語曰天子在門覺寤即遣人出㸔而帝亦適至静虚已接對仍留帝宿夜設粥無鮭新伏鵞卵令煮以為肴賊平京都以静為奮威將軍㑹稽内史元嘉中張永開元武湖值古冢上有一銅斗有柄若酒桍太祖訪之朝士莫有識者何承天曰此亡新威斗王莽三公亡皆以賜之一在冢内一在冡外俄而又啓冢内得一斗有銘書稱大司徒甄邯之墓余好為詩賦及著詩宣修容勅㫖曰夫政也者生民之本也爾其朂之余毎留心此處恒舉燭理事夜分而寢余六嵗能為詩其後著書之中唯玉韜最善昔孔甲過人家主方産子占之曰子必有殃孔甲曰以為余子誰為殃之及長果見斫木而傷足髙蒼梧叔能為風車可載三十人日行數百里梁有富人虞氏財資無量登髙樓臨大路陳酒慱奕其上樓下俠客相随而行樓上慱奕者争采而笑㑹飛鳶墜腐䑕正中俠客俠客聞樓上笑謂虞氏以䑕投已夜聚攻滅虞氏宋邱之鼎以烹鷄多瀋則淡少瀋則焦鄭泉願得五百斛船貯酒四時甘肥置兩頭謂人言死必𦵏我於陶家之側百年之後形化為土得為酒器豈不美哉李元禮冽冽如長松下風周君颼颼如小松下風案此條原本不載篇名詳文義應屬此篇謹附魏文侯見宋陵子三仕不願文侯曰何貧乎曰王見楚之富者牧羊九十九而願百嘗訪邑里故人其隣人貧有一羊者富拜之曰吾羊九十九今君之一盈成我百則牧數足矣鄰者與之從此觀焉富者非貧貧者非富也案此條原本無太平御覽引作符子明郭偉所輯百子金丹引作金樓子謹附於此自序篇十四人間之世飃忽幾何如鑿石見火窺隙觀電螢覩朝而滅露見日而消豈可不自序也余六嵗解為詩奉敕為詩曰池萍生已合林花發稍稠風入花枝動日映水光浮因爾稍學為文也昔葛稚川自序曰讀書萬卷十五屬文余不閑什一憎人治生性乃隘急刑獄决罪多從厚降大辟之時必有不忍之色多所捶扑左右之間耳劉之亨嘗語余曰君王明斷不凡此皆大寛小急也天下萬事汎汎犯罪余皆寛貰之必有不遜者多不䝉宏貸也魏文帝曰余於彈棊略盡其妙能用手巾角拂有儒生能以低巾角而拂之合鄉侯東方安世張公子並皆一時佳手余經䝉儲皇賚彈棊具駁犀子彭城錦石局銀鏤香白檀床余遂歸於不解未曾一中余性不耐奏對案此下疑有脱文侍姬應有二三百人並賜將士余不飲酒而又不憎人飲毎遇醉者輙欣欣然而已吾年十三誦百家譜雖畧上口遂感心氣疾當時犇走及長漸善頻䘮五男銜悲怳惚心地荼苦居則常若尸存行則不知所適有時覺神在形外不復附身及以大兒為南征不復繼奉國諱随念灰滅萬慮盡矣既感心氣累問通人心氣之名當為何起多無以對余以為莊子云無疾而呼其笑若驚此心氣也曼倩有言隂陽争則心氣動心氣動則精神散華譚曰肝氣㣲則面青心氣動則面赤左氏云周王心疾終於童心疾卒曹志亦有心疾殷師者仲堪之父也有此病近張思光居䘮之後感此病凉國太史令趙􅜫造乾度歴三十年以心疾卒晉阮裕謂士狂者豈其余乎吾小時夏日夕中下絳紗蚊綯中有銀甌一枚貯山隂甜酒卧讀有時至曉率以為常又經病瘡肘膝爛盡比以來三十餘載泛玩衆書萬餘矣曰余年十四苦眼疾沉痼比來轉暗不復能自讀書三十六年來恒令左右唱之曾生所謂誦詩讀書與古人居讀書誦詩與古人期兹言是也案此叚又見别卷作金樓子雜記下篇但無小字蚊綯正字甜作瀋讀下無書字今詳考其文義宜屬此篇謹校余將冠方好易卜及至射覆十中乃至八九嘗經至郢州從兄平西令吾射金玉琥珀三指鐶筮遇姤之履其辭曰上既為天其體則圜指環之象金玉在焉寅爻帯乎虎案後周書作寅爻帯午上則為虎琥珀生光在合中央合中之物凡有三種按卦而談或輕或重又有人名褁襞紙中射之得鼎卦余言曰鼎卦上離為日下巽為木日下安木杲字也此是典籖裴重歡疏潘杲名與余射之他驗皆如此也余初至荆州卜雨時孟秋之月陽亢日久月旦雖雨俄而便晴有人云諺曰雨月額千里赤盖旱之徴也案曾慥類説月額下有月内多雨之細者如織懸絲十一字吾乃端筴拂蓍遇復不動既而言曰庚子爻為世水出生於金七月建申申子辰又三五合必在此月五日庚子果值甘雨余又以十七日筮何時雲卷金翹日輝合璧紅塵暗陌丹霞映日謂亢陽之勢未霑膏澤筮案雲卷以下二十五字原本脱去又訛為當雨二字謹據太平御覽校補遇坎之比於是輟蓍而嘆曰坎者水也子爻為世其在今夜三更平地上有水坎之為比其方有甘雨乎欣然有自得之志案末七字原本脱去謹據太平御覽校補姚文烈善龜卜謂余曰此二十一日將雨其在虞淵之時余乃筮之遇謙之小過既而言曰坤艮二象俱在土宫非直無雨乃應開霽俄而星如玉李月上金原缺霧生猶縠河垂似𢃄余乃欣然案原本俄而下作果晴無星如玉李十字據太平御覽校補御覽金字下又缺二字曽慥類説載金樓子有云霧生猶縠河垂似帯又有云星懸玉李雲展金翹當即此二段中語謹據此校補二字改一字仍缺一字但雲展金翹御覽引在上叚中豈慥以意作對語耶今未敢輙改附識於此吾齓年之時誦咒受道於法朗道人誦得浄觀世音咒藥上王咒孔雀王咒中尉何登善能解作外典咒癰疽禹歩之法余就受之至十嵗時敕㫖賜向道士黄侯曄建安侯正立並是汝年時汝不學義余尚幼未能受年十二三侍讀臧嚴又有此勸余答曰只誦咒自是佳伎倆請守此一隅其年末乃頺然改途不復説咒也石季倫篤好林藪有别廬在河南界金谷澗中澗中又有水碓土窑金樓子卷六
