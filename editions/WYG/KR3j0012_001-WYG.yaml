body:
  text: 金樓子卷一梁孝元皇帝撰興王篇一粤若稽古天皇氏地皇氏人皇氏分有十紀一曰九頭二曰五龍三曰括提案春秋元命苞作攝提博雅又作挺提四曰合雒案博雅作雄五曰連通六曰序命七曰修飛案春秋元命苞作循蜚八曰因穆案春秋元命苞作提九曰禪通十曰疏訖案春秋元命苞作仡容成氏大庭氏栢皇氏中央氏栗陸氏驪連氏赫蘇氏宗盧氏祝和氏渾沌氏昊英氏有巢氏朱襄氏葛天氏隂康氏無懐氏太昊帝庖犧氏風姓也母曰華胥燧人之世有大跡出靁澤華胥履之生庖犧蛇身人首有聖徳燧人氏沒庖犧氏代之繼天而王首案首原本作者今依帝王世紀校改徳扵木為百王之先都陳至扵共工覇而不已案此下疑有脱文炎帝神農氏姜姓也母曰女登為少典妃逰華陽有神龍感女登生炎帝人身牛首有聖徳以火承木都陳遷魯嘉禾生醴泉出在位百二十年黄帝有熊氏號軒轅赤曰帝鴻少典之子姬姓也又姓公孫少典娶有蟜女附寳見大電光繞北斗樞星照郊野附寳孕二十月生黄帝龍顔有聖徳生而神靈弱而能言㓜而循案史記作徇索隱曰一作濬齊長而敦敏成而聰明受國扵有熊居軒轅之邱廼與炎帝戰扵阪泉之野三戰然後得行其志屈軼草生庭佞人入則指之又有景星麟鳯之瑞乃以風后配上台天老配中台五聖配下台謂之三公置左右大監以治人得寳鼎興封禪帝座扵元扈之上太一下来案别卷引此作来下有大螻如羊帝曰土氣勝故以土徳王在位一百年有四妃生二十五子少昊帝金天氏一號窮桑二曰白帝朱宣帝黄帝之子姬姓母曰女節黄帝時有大星如虹下流華渚意感生少昊扵窮桑是為元囂姓姬氏或云己氏降居江水以登帝位以金承土都曲阜有鳳鳥之瑞以鳥紀官鳳鳥氏為司厯正元鳥氏為司分伯趙氏為司至青鳥氏為司開丹鳥氏為司􅐬祝鳩氏為司徒睢案左傳作瞗鳩氏為司空案左傳瞗鳩氏司馬也鳲鳩氏司空也此疑冇脱誤爽鳩氏為司宼鶻鳩氏為司事五雉為五工正九扈為九農正天下大治焉帝顓頊髙陽氏黄帝之孫昌意之子母曰女樞金天氏之末揺光之星貫曰如虹感女樞扵幽房之宫案别卷作中右脅有九色毛生顓頊以水承金始都窮桑徙商邱帝嚳髙辛氏少昊之孫蟜極之子生而神靈自言其名曰案原本脱曰字今依帝王世紀校補夋􅀈齒以木承火都亳在位十年元妃有邰氏女曰姜嫄生后稷次妃有娀氏女曰蕳翟案世本竹簡狄生契次陳鄷案鄷生民詩疏引大戴記作鋒今刻本作隆氏女曰慶都生堯次陬訾案大戴禮記陬作娵世本又作訾陬氏女曰常儀生子摯摯立不善乃立堯帝堯字放勛一名同成育陶唐氏帝嚳之子伊祁姓也母曰慶都為嚳妃出觀河渚遇赤龍而孕寄伊長儒家産甲申嵗而生堯丹陵也堯眉八采日角方目足有元武之字手有三河之文豐下鋭上就之如日望之如雲黄收案收原本訛作收今依史記校改純衣彤車白馬冬則鹿裘夏則絺葛采椽不斵土階三等克明俊徳以親九族九族既睦平章百姓百姓昭眀協和萬邦焦僥氏来獻沒羽常年之人得神獸若羊名曰獬豸堯乃緝其皮以為帳分命羲仲和仲日中星鳥以殷仲春日永星火以定仲夏宵中星虛以正仲秋日短星昴以正仲冬時許耳之子名曰由字道開一字仲武仲武黄白色長八尺九寸兄弟七人十九而隱堯欲禪之由乃洗耳是後景星曜扵天甘露降扵地朱草生扵囿鳳凰止扵庭以􅀢莆案説文􅀢作萐述異記莆作蒲宋書符瑞志又作箑脯蓂莢之瑞都扵平陽命羲仲羲叔和仲和叔掌四方在位四十一年洪水滔天懐山襄陵四岳舉鯀治水九年績庸不成五十年乃更咨四岳得舜乃在璿璣玉衡以齊七政類扵上帝禋扵六宗望扵山川辨案古字辨徧通扵羣瑞案舜典作神堯崩乃𦵏濟隂城廟居齊郡有栢樹死而更生焉舜攝政二十八年堯乃殂三年禮畢舜避丹朱扵河南諸侯朝覲訟獄者不之丹朱而之舜舜曰乃天命也初堯教丹朱棊以文桑為局犀象為子帝舜有虞氏龍顔大口圓天日角出額重鼻足履龜文目重瞳子身長九尺一寸常夢擊天鼓母曰握登早終瞽瞍更娶生象象傲瞽瞍頑後母嚚咸欲殺舜使舜入井舜鑿井旁行二十里以孝聞三十而帝堯問可用者四岳咸舉舜堯扵是降以女娥皇女瑩案列女傳竹英配之妻舜以觀其内使九男與處以觀其外二女不敢以貴驕事舜親戚甚有婦道堯九男皆益篤舜耕扵歴山歴山之人皆讓畔耕地得金枝銀節漁扵靁澤上人皆讓居陶扵河濵河濵噐皆不苦窳一年而所居成聚二年成邑三年成都堯乃試舜五典百官皆治布五教扵四方堯乃老使舜攝行天子政廵狩得舉用事卿雲出景星見西王母使使乗白鹿駕羽車建紫旗来獻白環之玦益地之圖乗黄之駟綏耳貫胷之民来獻珠蝦既陟帝位以土承火都平陽命禹為司空棄為后稷契為司徒咎繇為士垂為共工益為朕虞伯夷為秩宗夔為典樂龍為納言庶績咸熈羣瑞畢集簫韶九成鳳凰来儀擊石拊石百獸率舞生子商均不肖舜復禪禹入九疑山置銅劍一枚化為礫今濟南歴城有祠太陽山有虞氏三石􅊴也禹即位後十五年舜乃殂禹讓商均避之陽城天下不歸商均而之禹初商均一名章鷁帝禹夏后氏名曰文命字髙宻母修己山行見流星貫昴意感又吞神珠薏苡胷坼而生禹扵石坳夜有神光長扵隴西大夏縣龍角珠庭虎鼻大口兩耳參鏤案淮南子作漏别卷又作僂首戴鈎鈐案别卷作鈞鈴身長九尺九寸胷有黒子如玉斗焉手長至膝脛無毛左手中十七黒子為人敏給克勤其徳不違其言可信聲為律身為度乃遂與益后稷奉帝令諸侯百姓案史記作奉帝命命諸侯百姓傷先人父鯀之功不成受誅乃勞身焦思過門不入而洪水平既陟元后以金承土都平陽或營安邑薄衣食而致孝扵鬼神卑宫室而致羙扵黻冕陸行乗車水行乗舟泥行乗橇山行乗檋神鹿出扵河水天錫元圭乾吾國獻裘毛有五采復薦咎繇扵天将以致禪會咎繇終復薦益禹殂𦵏㑹稽廟中有鐡屧鐡莢石船廟裏有塗山神姑之象珠璣為帳寳玉琱華諸廟莫及當中山水之盛良辰吉日羅綺􅕼服滿橋梁之上皆金翠為飾神又甚靈彼人所敬初禹娶塗山氏之女生啓三年禮畢益避啟人不歸益而歸啟一名建一名余母化而為石啟即位伐有扈氏啟庶兄也夏禹氏絶少康出扵竇之中復禹跡也成湯姓子名履字天乙狼星之精感黒龍而生髙天廣角隆準手有縱理如印綬之文豐下鋭上皙而有鬚長九尺四寸八肘凡有七號一名姓生二云履長三云瘠肚四云天成五云天乙六云地甲七云成湯成湯始居亳從先王居作商誥湯征諸侯葛伯不祀湯始伐之湯曰汝不能敬命子大伐殛之無有攸赦作湯征政由伊尹阿衡阿衡欲干湯而無由乃為有莘氏媵臣負鼎爼以滋味説湯致扵王道湯謂之曰自進非道也乃令還其本居使人聘迎之五反然後從之任以國政白狼銜劍有神人身虎首獻玉鏡白狐九尾諸國貢玉盤入自北門遇女房作女房之歌案書序作遇女鳩女房林樹久不花一旦生如鳳翼湯出見野張網四面祝曰自上下四方皆入吾網湯曰噫盡之矣乃去其三靣祝之曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯徳至矣及扵禽獸當是時夏桀為虐政滛荒而諸侯昆吾氏為亂湯乃興師率諸侯伐桀敗扵有娀氏之墟犇扵鳴條之野乃改正朔服色朝諸侯崩𦵏扵濟隂亳縣東北郭去縣三里冡高七尺漢哀帝時遣大司空行湯冡又説曰殷湯無𦵏處此言非焉武丁大戊並賢君也周文王昌狼星之精母曰大任夣長人感已有胎目不視惡色耳不聴滛聲以胎教之溲扵豕牢生文王龍顔虎肩身長十尺胷有四乳即位為西伯有雀生鸇扵殷城隅文王增修政三年四方諸侯皆服崇侯譛之扵紂紂不納費仲又言扵紂欲誅之紂不從九年春三月率六州諸侯朝扵殷崇侯虎又譛之紂怒囚文王扵羑里雖有憂患方修先聖之業廣解六十四卦著其卦詞謂為周易時謂西伯為聖紂疑而未達長子伯邑考質扵殷為紂御紂烹之為羮賜文王以試之實聖當不食子羮文王得而食焉紂笑曰誰謂西伯聖者食其子而尚不知紂謂西伯曰譛汝者長鼻決耳也文王曰此崇侯虎之状紂赦文王四十三年春正月庚子朔文王在酆九州諸侯咸朝五緯聚房心周之分野時有烏衘丹書集扵周社文王乃獻洛西赤壤之國方千里請除炮烙之刑紂許焉賜以弓矢鈇鉞使専征天下大悦有鳳凰銜書而至文王稽首受命是嵗即位化被江漢之域以受命之始年也周武王發望羊高視􅀈齒生而有光太公周公作輔武王渡河伐紂中流白魚躍入舟長一尺四寸一説云丹鯉未知孰是武王俯取以祭既渡有火至扵王屋流為烏其色赤其聲魄云是時諸侯不期而㑹盟津者入百諸侯皆曰未可乃還歸居一年聞紂昏亂暴虐滋甚殺王子比干囚箕子太師疵少師强抱其樂器而犇周戊午師渡盟津諸侯咸㑹共案古文共恭通行天罰甲子昧爽武王朝至扵商郊牧野乃誓武王左仗黄鉞右秉白旄紂聞武王来亦發兵七十萬人距武王紂師雖衆皆無戰心心欲武王亟入及紂師皆倒兵以戰以開武王武王馳之持太白旗以麾諸侯畢拜武王王乃揖諸侯諸侯畢從武王至商國商百姓待扵郊扵是天錫黄鳥之旗遂入至紂死所武王身射之三發而後下車以輕劍擊之以黄鉞斬紂頭懸之大白之旗肅眘氏獻石砮楛矢苦庭之國獻文犀紫駞命釋百姓之囚表商容之閭命南宫括散鹿臺之財發巨橋之粟以賑貧弱時夷雍之子名伯夷叔齊不食周粟餓扵首陽依麋鹿以為羣叔齊起害鹿鹿死伯夷恚之而死漢高祖名季父名執嘉母曰合始入池中浴見玉鷄銜赤珠名曰玉英吞之有孕昔孔子夢三槐間豐沛邦有赤蛇化為黄玉上有文曰卯金刀字此其瑞矣帝羙髭髯隆準容受直言好謀多欲平秦楚之難撥亂反正雖不修文學而性眀達聰自監門戍卒見之如舊初從民心作三章之約天下既定命蕭何次律令韓信申軍法張蒼定章程叔孫通定禮儀陸賈造新語又與功臣剖符作誓丹書鐡劵金匱石室藏之宗廟雖日不暇給規模宏逺矣漢太宗恒即位宫室苑囿車騎服御無所增益有不便輙弛以利民嘗欲作露臺䑓基已成将構召匠計之直百金乃曰百金中人十家之産也吾奉先帝宫室嘗羞之何以䑓為身衣弋綈所幸慎夫人衣不曳地幃帳無文繡常集上書囊以為殿帷兵器無刄以示敦朴為天下先𦵏覇陵皆瓦屋不以金銀銅鐡為飾因山不起墳南粤尉佗自立為帝召佗兄弟以徳懐之佗遂稱臣與匃奴和親而背約入盜令邉備守不發兵深入恐煩百姓吳王濞詐病不朝錫以几杖羣臣袁盎等諌雖切常假借納用焉張武等受賂金錢覺更加賞賜以愧其心専務以徳化民是以海内殷富興扵禮儀斷獄數百㡬致刑措至扵中宗憲帝樞機周宻品式備具工巧器械先代莫及民畏其灋吏奉其職矣世祖文叔建平元年十二月甲子夜生扵武帝故宫有赤光照室影如五麟七鳳後望氣蘇伯阿為王莽使至南陽遥見舂陵城郭曰佳哉羙氣鬰鬰葱葱帝羙鬚眉身長八尺七寸脚下有文色如銀印厚一分更始起兵還舂陵逺望舍内火光赫然屬天夢乗龍登天上珠階玉闥乃以三千人破王莽百萬衆及即位故能平隗囂公孫述等在兵既久厭武事常思息肩皇太子嘗問攻戰之事帝對曰衛靈公問陳扵孔子孔子不對非爾所及也每旦視事日昃乃罷斷逺方餉異味竒珍功臣髙枕無所誅殺引公卿講經論夜分乃寐太子諌曰陛下有禹湯之明失彭聃之福願怡愛精神帝曰我自樂之不為疲也雖身濟大業兢兢如不及故能明慎政體總覽權綱嘗有獻千里馬者帝曰鸞旗在前屬車在後朕乗此安之乃以駕鼓車初廵狩舂陵父老曰乞蠲十年帝曰天下艱難三年已外豈能自保乃蠲三年退勲臣進文吏身衣大絹色無重采耳不聴鄭衛之音手不持珠玉之扇無私愛左右無偏㤙損池籞廢弋獵賜州國並皆一札十行成文細書勤約之嘗著瑞火籠賦内外匪懈百姓寛息戢弓矢散馬牛上案别卷引此無上字信止戈為武也魏武帝曹操用師大較依孫吳之法而因事設竒量敵制勝變化如神自作兵書十餘萬言諸将征伐皆以新書從事臨時义手為節度從令者克㨗違教者負敗與虜對陣意思安閒如不欲戰然及至决機乗利氣勢盈溢故每戰必克取張遼徐晃扵亡虜之中皆佐命立功列為名将其餘㧞出細㣲登為牧守者不可勝數是以創造大業文武並施御事三十餘年手不捨書晝則講軍䇿夜則思經傳登髙必賦被之管絃皆成樂章才力絶人手射飛鳥躬擒猛獸嘗扵南皮一日射雉六十三頭及造宫室繕治器械無不為之法則皆盡其意雅性節儉不好華麗攻城㧞邑得靡麗之物則悉以賜有功勛勞宜賞不吝千金無功望施分毫不與四方所獻與羣下共之豫自制送終衣服四篋而已晉世祖安世少厲髙行造次必扵忠恕未曾有過言失色扵人然而明逹善謀能斷大事暨登大阼之日制强國御下有禮所以鎮壓内外緝靜四方威惠參洽文武必舉故天下服焉承魏氏奢侈尅弊之後百姓思古之遺風帝既謙儉寡慾亦雅識時變臨朝愷悌務崇簡泰有人餉雉頭裘者即令燒之朝庭輯睦興居可觀故威服强吳規模宏逺雖饗國未久徳洽扵民矣其後惠懐䘮亂中宗東渡所謂五馬俱渡江一馬化為龍者也宋髙祖徳輿清簡寡慾嚴整有度未嘗視珠玉輿馬之飾後庭無紈綺絲竹之音寜州嘗獻琥珀枕光色甚麗時諸將北征以琥珀治金瘡帝大悦命搗分付諸将平闗中得姚興從女有盛寵以廢事謝晦諌即時遣出財帛皆在外府内無私藏宋䑓建有司奏東西堂施局脚床銀埿釘帝不許使用直脚床釘用鐡諸主出適遣送不過二十萬無錦繡金玉内外奉禁莫不節儉後孝武帝大明中壊帝所居隂室扵其處起玉燭殿與群臣觀之床頭有土鄣壁上掛葛燈籠廣州所部二千石有獻入筒細布一端八丈帝既見惡其精麗勞民力即付所司彈牧守以布還之并制嶺南勿作此布帝素有熱疾并患金瘡末年尤劇坐卧常須冷物而未能得後人獻石床帝見喜之寝其上即覺極以為佳乃嘆曰木床猶用功不少况乃鐫石即還其人亦令毁之帝始逰軍彭城置酒命紙筆賦詩曰先蕩臨淄冦却清河洛塵華陽有逸驥桃林無伏輪扵是羣才並作也宋太祖義隆年十四身長七尺三寸好讀史書善楷𨽻能文章温和有人君之徳及南面負扆深以子民為先䑓殿堂宇無所改易為吏長子孫居官成姓號明法令時人謂有建安永平之風每至諸侯王宴集必先論國家政務自朝訖晡廼設食令此輩稍知饑寒也經廵歴至上庫謂左右曰此庫内大有錢殊可羨願左右曰此縣官之物耳何羨願邪帝曰此皆國家之物吾奉先帝之祀常懼羞之四方豐稔倉粟皆紅省租賦米五錢也梁髙祖武皇帝生而靈異有聖徳頸光龍液舌文八字頂垂帯重邱額照日象有文在手曰武帝并上諱三字始在髫髮便愛琴書容止進退自然合禮常與兒童鬬技手無所持躡空而立觀者擊節咸共稱神及遭獻太后憂哭踊大至居䘮之哀髙柴不能過也每讀孝子傳未曾終軸輙輟書悲慟由是家門愛重不使垂堂登扵晩年探􅄨索隱窮理盡性究覽墳籍神悟知機讀書不待温故一閲皆能誦憶所以馳騁古今備該内外辨解聮環論精堅白沛國劉瓛當時馬鄭上每析疑義雅相推揖深沉靜黙不雜交逰所與往来一時才雋至扵得人門稱多士居宇精肅常有煙霧垂簾拱帳望者竦然六義四始尤解禮體登髙必賦莫非警䇿弱冠升朝令聞籍甚太尉王儉齊國阿衡欽上風雅請為户曹屬司徒竟陵王齊室驃騎招納士林待上賔友之禮范雲時為司徒記室深慕上徳自結神逰驅車到門頃日驟至上嘗旦往報雲雲聞街衢洒掃喚呼清道俄聞笳皷之聲雲意天子出幸南苑尋乃上遣通焉心獨怪之未敢言也上哲扵知人慮無遺事歴司徒法曹祭酒掾㑹輔友仁之賦永明九年出為鎮西諷議西上述職行過牛渚直暴風卒起入泊龍瀆既波浪不可靜登岸逍遥四望梁山瞻眺墟落見一長老披儒服至揖上曰君龍顔虎歩相不可言天下方亂四海未一安蒼生者其在君乎上笑之曰觀公長者不容見戱俄而風靜此夕竟届姑熟永明十年太祖登遐上始承不豫便即言歸輕舟仍發州府贈遺一無所受齊隋郡王苦留一宿不許得單艇望星上路犯風冐浪兼行不息雖狂飈地發髙浪天湧船行平正常若安流舟中之人皆稱神異及舟漏臨沒呌不輟聲鵲頭戍主周達奉上一船犇波就路至亰不踰二旬自在途便不盥櫛寢食俱廢憔憂易形視人不識望宅奉諱氣絶良久既葬嘔血數升水漿不入口者四日憂服之内不服嘗米所資麄麥日中二溢再拜山陵杖而後起涕淚所灑松為變色及號思廬室未嘗見齒仍留山陵因欲隱遁太傅宣武王苦諫乃止有桑門釋僧輝不知從何来也自云有許負之法通名詣上見而驚曰檀越項有伏龍此非人臣之相貧道所未見也若封泰山願能見覔上笑而不答此後莫知所之齊明宻敕上為雍州領兵往救新野仍即發引振旅長途號令清嚴所過秋毫不犯信賞分明士卒咸思盡命凡公私行旅多停大雷輙逾信次不肯時發上軍浦口值風起浪生㳂流泝波無敢行者軍直兵啟風浪大不可冐宜入浦待靜兼應解周何郎神上曰周公瑾何無忌在昔勤王如我今日亦復何異爾若有靈當令風靜因打上皷催進行途未遠便波恬風息扵是利渉常乗便風漢􅃆榖貴百姓多饑上賑救乏絶闔境不匱九月九日上出講武時士女觀者逺近畢至中間忽暴風起煙塵四合當上所居獨白日清照有紫雲特起始齊髙在府夢著􅄚案别卷引此作履上太極殿三人從一人齊武一人齊明一人張天地圖而不識意言是太祖子弟及踐阼嘗與太祖宻謀案别卷引此作燕謂太祖曰我辛苦得天下而祚不傳孫我死龍子當得龍子齊武小名龍子死當屬阿度阿度齊明小名此後當還卿子孫遂至大覇及太傅援亰邑夜在越城假寐忽夢見一大人著朱衣牽三匹馬来太傅因騎一匹騰空半天而墜次衡陽王一馬踴過屋而落後上騎一匹因化成龍遂飛上天此幽讃神明吉之先見及受終太祖允恭寳厯臺城内起至敬殿庶羞百品若殷薦焉其中隋珠和璧圓淵方井侔於宗廟晦朔恒號慟哽絶躬至寢門若文王之為世子又為奉太祖於鍾山起大愛敬寺又為奉獻后起大智慶寺即位五十年至扵安上治民移風易俗度越終古無得而稱焉又作聮珠五十首以明孝道云伏尋我皇之為孝也四運推移不以榮落遷貿五徳更用不以貴賤革心臨朝端黙過隙之思彌慙垂拱岩廊風樹之悲踰切齊潔宗廟䖍事郊禋言未發而涕零容弗改而傷慟所謂終身之憂者是之謂也盖虞舜夏禹周文梁帝萬載之中四人而已箴戒篇二末喜桀之妃羙扵色薄扵徳亂孽無道女子行丈夫志身常帯劍桀嘗置末喜扵膝上喜謂桀曰羣臣盡憎妾之貴乃以益慢扵君君威衰令多不從皆以妾為亂君願賜死桀扵是大怒行苛法賜與嬖妾侈益無度府藏空虛譽者昌諌者亡羣下杜口莫敢正言造酒池可以運舟一鼔而牛飲者三千人扵酒池醉而溺死者無數扵是末喜笑之以為樂夏桀作為璿䑓瑶室象牙之席白玉之床以處之夏桀滛扵婦人求四方羙女積之後宫俳優侏儒狎徒能為竒瑋戯者聚之扵傍造爛熳之樂夏桀嘗鑿霍山通扵淵闗夏桀時兩日並出黒光遍天攝提星失其常所伊洛水竭天雨血月流精火神囬禄見扵黔隧昔夏后既衰妖精竝見蜚虹滿野夷羊在牧殷帝乙無道為偶人謂之天神與之博令人為行天神不勝乃戮辱之殷武乙無道嘗為革嚢盛血仰而射之命曰射天獵扵河渭之間暴震而死殷帝紂囚西伯羙里西伯乃獻獸黄金目毛如織錦玉女駭雞犀九江大貝青狐𤣥豹黄熊白虎因費仲獻紂紂喜之殷帝紂滛虐王子比干諫弗聽剖其心十二宂破而觀之帝紂垂胡長尺四寸手格猛獸愛妲己色重師涓聲狗馬竒物充牣後庭使男女躶形相随為長夜之飲時人為之語曰車行酒騎行炙百二十日為一夜帝紂時木林之地宵䧟為池池生滛魚取而食之池一夜而竭得滛魚數百大悦之錫之宫人宫人悉滛亂帝紂時天雨丹血布及石大者如瓮小者如箕周厲王好利近榮公大夫芮良夫諫之王怒問衛巫使監謗者以吿則殺之喜曰能弭謗矣召公曰防人之口甚扵防川川潰傷人人亦如之故近臣盡規親戚補察瞽瞍教誨耆艾修之王不聽扵是莫敢出言其先夏后氏衰有二龍止扵夏庭曰余褒之二君也帝殺而埋其漦三代莫敢視厲王發而觀之使婦人躶而譟之漦化為元黿後宫未齓者遭之既笄而孕褒姒矣周幽王嬖愛褒姒褒姒生子伯服廢太子而立之用褒姒為后褒姒者宣王時歌云皦皦伯服實亡周國宣王下國内有白服者殺之時褒姒初生父母不養而棄白服者聞嬰兒啼因取以犇褒後人以姒贖罪因名褒姒焉西周君奔秦蹶角受罪遣獻其邑秦受其獻歸其君扵周周赧王卒降為西武公秦始皇聞鬼谷先生言因遣徐福入海求玉蔬金菜并一寸葚秦二世即位自幽深宫以鹿為馬以蒲為脯漢昌邑王賀初昭帝崩無嗣霍光徴賀典䘮到濟陽求長鳴雞卵五百枚道買積竹杖過宏農使大奴宋善以衣車載女子行居道上不素食常私買雞豚漢有三壐賀受之上前就次不拜初至國都不哭言嗌痛不能哭後即位二十七日見廢漢昌邑王賀嘗召皇太后御果下馬使官奴服之漢昌邑王賀嘗封奴二百餘人常與居禁闥使中府令髙昌奉黄金千斤賜侍中君卿取十妻漢昌邑王嘗夢青蠅之矢積西階東可五六石以屋板瓦覆發視之青蠅之矢也以問龔遂遂曰皆宜進先帝大臣子孫親近以為左右如不忍昌邑故人信用讒諛必有㓙咎願詭禍為福皆放逐之臣當先逐矣漢昌邑王在藩時有大鳥集扵宫中血汙王坐席其恠如此漢昌邑王賀在藩見大白狗戴法冠問左右左右皆曰不見後即位二十七日見廢漢哀帝即位寵任董賢均田之制從此墮壊百姓訛言持籌相驚被髮徒跣而走漢氏衰矣漢哀帝時董賢母病長安厨給祠具道中過者皆飲酒為賢治器成奉御乃行賜及蒼頭奴婢人十萬錢漢桓帝常在南宫長秋和曜殿上作樂漢桓帝時黄龍千秋萬嵗殿皆被災漢靈帝本侯家宿貧即位常歎曰桓帝不能作家居都無私錢乃賣官自關内侯虎賁羽林各有差私令左右賣公卿錢公錢千萬卿錢五百萬漢靈帝嘗藏寄小黄門常侍錢累數千萬漢靈帝嘗鑄銅人四列扵蒼龍元武闕外漢靈帝時鑄四鐘皆受二千斛懸扵玉堂及雲䑓殿前漢靈帝起篳圭靈琨苑以珉玉為壁案後漢書篳作單琨作昆漢靈帝嘗扵西園弄狗著進賢冠帯綬漢靈帝時作列肆扵後宫使采女販賣更相盜竊鬬爭之聲聞扵人間帝著商賈服飲宴扵其間漢靈帝時飬驢數百帝自騎之驅馳遍亰師有時駕四驢入市裏漢靈帝時黄巾賊起帝自稱無上將軍耀兵平樂觀上設九葉蓋蓋皆安九子真金鈴銀珠玉之飾稱是也漢靈帝時樂城門灾延及北闕度道燒嘉徳和曜殿廣陽門外上屋自壊收天下田畆十錢以治室魏明帝扵列殿北立八坊諸才人以次第處其中貴人夫人以上轉南附焉其名擬百官之數帝嘗逰宴在内魏明帝時徙長安鍾簴駱駝銅人承露鎜案三國志注作盤下同鎜折銅人重不可致留扵覇城大發銅鑄人二號曰翁仲列坐司馬門外魏明帝時鑄黄龍鳳凰各一龍髙四丈鳯髙三丈餘置内殿前魏明帝時引榖水過九龍前為玉井綺闌蟾蜍含受神龍吐流嵗首建巨獸魚龍曼延弄馬倒騎如漢西亰之制魏明帝起土山扵芳林西北陬使公卿皆負土捕禽獸置其中羣臣穿方舉土面目垢黒沾體塗足衣冠了烏以崇旡益其所以不能興國也魏明帝作延休殿永寜殿昌宴殿魏齊王芳不親萬機眈滛内寵日延倡優迎六宫家人留止内房嘗扵芙蓉殿前裸袒相逐又扵凌雲䑓曲施帷見九親婦女芳臨宣曲觀呼小優郭懷袁信使入帷共飲酒清商令令狐景曰先帝持門户急今陛下日将后妃㳺戱無度乃至共觀為陛下計耳倡優裸袒為亂恐不可令皇太后聞臣不愛死芳曰我作天子不得自在耶向使先帝使外人滛内侍子孫豈不衆多太后何與我事使人縳景燒鐡灼之舉體皆爛魏齊王芳日延倡優及司馬昭初入朝司馬師将有問鼎之志芳與左右小臣謀因昭辭殺之勒其衆以退師昭入芳方食栗優人唱曰青頭雞青頭雞者鴨也芳懼不敢發晉惠帝衷為太子時武帝宴羣臣扵式乾殿歡甚衛瓘被酒拊帝座云此座可惜帝猶不悟乃佯言曰公醉耶後朝臣多言衷不可立及即位後為趙王倫所簒晉惠帝昬酒過常每見大官上食有蚶帝慘然作色曰自今勿復制此糜費人力宋景和子業孝建之太子也即皇帝位興改制度或取之前史謝荘為誄宣貴妃文曰賛軌堯門方之漢鉤弋也帝下荘扵獄乃發貴妃墓縱糞扵孝建冡曰查奴何意生我孝建多昏縱故查奴之目太后臨卒遣人召帝帝曰病人間多鬼不可往太后怒曰引刀破我腹那得生如此兒其不孝皆此類也宋蒼梧王昱嘗置射雉場二百處翳中帷帳皆緑紅錦為之金銀鏤弩牙瑇瑁帖箭宋蒼梧王鈐鑿錐鋸之徒不離左右嘗以槌搥人隂破左右見之有歛眉者大怒令此人袒膞正立以矛㓨􅈩洞過宋蒼梧王昱嘗扵七月七日乗靈車往新安寺從曇慶道人飲酒宋蒼梧王昱嘗飲酒醉扵仁夀殿東阿氊幄中卧時楊玉夫見昱醉無所知乃與楊萬年同入氊幄中以千牛刀斬之齊武帝嘗與王公大臣共集石頭􅇏火樓令長沙王晃歌子夜之曲曲終輙以犀如意打牀折為數段爾日遂碎如意數枚齊武帝内殿則張帷雜色錦􅃨帳帳之四角為金鳯凰銜九子鈴形如二三石瓮垂流蘇珥羽其長拂地施畫屏風白紫貂皮褥雜寳枕金衣机名香之氣充滿其中外讌既畢則環而臥齊武帝時宫内深宻不聞端門鼓漏聲乃置鐘扵景陽樓上宫人聞鐘則起装餙也齊武帝有寵姬何羙人死帝深悽愴後因射雉登巖石望其墳乃命布席奏伎呼工歌陳尚歌之為吳聲鄙曲帝掩嘆久之賜錢三萬絹二十匹齊武帝數幸琅琊城宫人常從之早發至湖北埭雞始鳴齊武帝嘗扵内殿環臥合歌姬舞女奏樂扵帷幔之前為歡曲則拊几稱佳起哀聲則引巾拭淚齊武帝時隱靈寺雕飾炫麗四月八日皆往往以宦閽防門有禮拜者男女不得同日至也僧尼並皆妍少俗心不盡或以箱簏貯姦人而進之後為覘伺所得並皆誅死齊武帝時内人出家為異衣住禪靈寺者猶愛帯之如初齊欝林王初欲廢明帝其文則内博士韓蘭英所作蘭英號韓公總知内事善扵文章始入為後宫司儀齊欝林王武帝嫡孫嗣位之日與妃何氏書題作一喜字又作三十許細喜字繞四邉齊欝林王昭業既嗣位武帝有甘草杖宫人寸斷用之齊欝林王嘗取武帝衣箱開之有金射雉玻瓈貫納等悉賜左右齊欝林王既嗣位嘗夜中與宦者共刺䑕立至曉皆用金銀釵以金花獸紅綸為􅃭齊欝林王既嗣位常列胡伎二部夾閣迎奏随意賞賜動百數十萬齊欝林王既嗣位賞賜無度武帝庫儲垂盡嘗開生衣庫與皇后寵姬觀之又給閹人豎子各十數人随其所欲恣意輦取諸寳器以相剖擊破碎之以為笑樂齊欝林王時有顔氏女夫嗜酒父母奪之不出入宫為列職帝以春夜命後宫司儀蘭英為顔氏賦詩曰絲竹獨在御愁人獨向隅棄置將已矣誰憐㣲薄軀帝乃還之東昏侯寳卷黒色身纔長五尺猛眉出口齊東昏侯時後宫遭火之後更起仙華神仙玉夀殿刻畫雕彩青金鉛帯錦幔珠簾窮極巧麗齊東昏侯以青油為堂名琉璃殿穿針樓在其南最可觀望上施織成帳懸千條玉佩聲晝夜不絶地以錦石為之殿北開千門萬户又有千和香香氣紛馥聞之使人動諸邪態兼令人睡眠齊東昏侯初扵宫中取空輦行之繞䑓如天子儀服自捉玉手板金梁路帯齊東昏侯扵芳樂苑諸樓觀壁上􅀞男女滛䙝之状又扵苑中立市大官則每旦進酒肉雜使宫人屠沽齊東昏侯妃潘氏服御極選珍寳琥珀釧一隻直七千萬案南齊書作百七十萬齊東昏侯嘗為潘妃御車製襍色錦伎衣綴以金花玉鏡齊東昏侯潘妃嘗着裲襠袴金樓子卷一金樓子卷一考證十八頁前四行號思廬室查號恩二字不可解恩字自屬思字之訛今遵㫖改正十八頁後五行案樂府有聖郎曲白石郎曲太平廣記有郎子神諸稱似六朝時亦有以郎名神者然此字於周瑜為宜于何無忌不甚相合其解字雖有􅓙解一義亦未明晰查南史王僧辨傳有僧辨進師尋陽夢周何二廟神助天子討賊之語正與此所稱相合以史文相證郎神或當作二神謹遵㫖攷正加案聲明
