body:
  text: 卷六雜記篇十三上成湯誅獨木管仲誅史符呂望誅任離魏操誅文舉孫策誅高岱黃祖誅禰衡晉相誅嵇康漢宣誅楊惲此豈關大盜者深防政術腹誹心謗不可全也龜所以有殼者何也欲以自衛也而人求而鑽灼之何也為殼也翠所以可愛者為有羽也而人殺之何也為毛也私家有器甲欲以防盜也而王法治之閭閻間有利口之人者欲自進也而縣官裁之可不戒哉有人讀書握卷而輒睡者梁朝有名士呼書卷為黃妳此蓋見其美神養性如妳媼也夫兩葉蔽目不見泰山兩豆塞耳不聞雷奮以其專志也專志既過不覺睡也趙簡子沈鸞淚於河曰吾嘗好聲為吾致之吾嘗好宮室為吾致之吾嘗好良馬善御為吾致之吾好賢士而鸞激未嘗進一人是長吾過而黜吾善也夫簡子者能善督責於臣矣有人以人物就問司馬徽者徽初不辨其高下每輒言佳其婦諫之曰人以君善士故質疑問於君君宜論辨使各得其所而一者言佳二者言佳豈人所咨問君之意耶徽曰汝此言亦復佳此所以避時也劉穆之居京下家貧其妻江嗣女穆之好往妻兄家乞食每為妻兄弟所辱穆之不為恥一日往妻家食畢求檳榔江氏弟戲之曰檳榔本以消食君常飢何忽須此物後穆之來為宋武佐命及為丹陽尹乃召妻兄弟設盛饌勸酒令醉言語致歡座席將畢令廚人以金柈貯檳榔一斛曰此日以為口實客因此而退顏師伯要幸貴臣莫二而多納貨賄家纍千金宋世祖常與師伯樗蒲籌將決世祖先擲得雉喜謂必勝師伯後擲得盧帝失色師伯擲遽斂手佯曰幾作盧爾是日師伯一輸百金宋山陽王休祐屢以言語忤顏色有庾敏者能相手板休祐以己手板託為他許令占之庾曰此板相乃甚貴然後使人多愆忤休祐以褚淵詳密乃換其板他日淵得侍帝自稱下官太宗多忌甚不悅而手板往往入相余以為信然南陽劉類好察民間聞狗逐豬子聲謂吏殺豬便曳五官掾孫弼時在職有三不肯遷之也吏題其門曰劉府君三不肯此戒褊急也余豈可不三復斯言哉荊楚間有人名我者此人向父恆稱我向子恆稱名此其異也衛人有夫妻祝神者使得布百匹其夫曰何少耶妻曰布若多子當買妾也韓子曰燕人李季其妻私通還見私通者在內令解髮出門季曰是何人妻曰無之季曰吾見鬼也妻曰宜取五姓尿浴季乃詐之曰此蘭湯也夫結繩之約不可治亂秦之緒干戚之舞不可解聊城之圍且熊經鳥伸非謂傷寒之治呼吸吐納又非續骨之膏故知濟世各有其方也晉樂見殺士會奔秦子糾見誅管夷吾方霸時乎時乎事不同也吉凶在天猶影之在形響之應聲也形動則影動聲出則響應此分數乃有所繫非身口之進退也蓋聞騏驥長鳴伯樂昭其能盧狗悲號韓國知其壯是以效之齊秦之路以逆千里之任夫矢人豈不仁於函人矢人惟恐不傷人函人惟恐傷人故伎術不同也射使人端釣使人恭登高而望臨深而窺事使然也出林不得直道行險不得履繩鬻棺者欲民之死蓄穀者欲歲之飢船漏水入壺漏內虛也狂者東走逐者亦東走溺者入水救者亦入水事雖同而心異也孔子遊舍於山使子路取水逢虎於水與戰攬尾得之內於懷中取水還問孔子曰上士殺虎如之何子曰上士殺虎持虎頭中士殺虎如之何子曰中士殺虎持虎耳又問下士殺虎如之何子曰下士殺虎捉虎尾子路出尾棄之復懷石盤曰夫子知虎在水而使我取水是欲殺我也乃欲殺夫子問上士殺人如之何曰用筆端中士殺人如之何曰用語言下士殺人如之何曰用石盤子路乃棄盤而去昔莊子妻死惠子弔之方箕踞鼓盆而歌豈非達乎夏侯章為孟嘗君所禮駕駟馬有百人之食而章見人必毀孟嘗君人有問其故答曰臣無功於孟嘗君不爾則無見君之長也余以為不然東方有士曰袁旌因將有適而飢於道狐丘之盜父見之下壺飱以豫之問子誰也曰我狐丘之盜父也曰吾不食也兩手據地而嘔之不出喀喀然伏地而死也太史公書有時而謬鄭世家云子産鄭成公子而實子國之子也尚書顧命衛實侯爵衛世家則言伯爵斯又乖也尚書云金縢是周公東征之時史記是姬旦後又紕繆焉其餘瑣碎亦不為少諸葛孔明嘗戰於鳳山諸葛孔明到益州嘗戰於石室諸葛孔明嘗戰於萬騎溪諸葛孔明戰於石井曹植曰吾志不果吾道不行將來采史官之實録時俗之得失為一家之言藏之名山此外徒虛言耳昔洛下有洞穴其深不測有一婦人欲殺其夫謂夫未嘗見此穴夫自送觀此穴婦遂推夫下穴經多時至底婦於後擲飯物如欲祭之此人良久乃蘇得飯食徊徨覓路仍得一穴便匍匐從就覺所踐如塵而聞粳米香噉之芬美又齎以去食所齎將盡便入都郛郭修整宮觀壯麗臺榭房宇悉以金銀為飾雖無日月明踰三光人皆長三丈被羽衣奏歌樂長人語令前去凡過如此者九有人云君命不得停還問張華當悉此人便隨穴而行出交州後歸洛問張華示之二物華云如塵者是黃河下龍泥是昆山泥也因訴華云為妻所苦華乃取其妻而煮之馬耽以才學知名譙縱文表皆耽所製會則賦詩亦多針諫蜀土聞王師當至耽方檢封儲藏為國防守朱齡石具以聞耽性軒傲故猶徙邊自發之後諸譖日至耽越嶲界謂所親曰朱侯不因我下而見遣來此必惑於衆口恐卒不免也居無幾而聞蜀信當至遙判知盡沐浴席地安臥作詩畢嘆曰所恨生於亂世矣我雖不引藥比於瞑目信有事便隨宜見殺勿嘆我狂也言訖泯然若已絶矣蜀使既至一遵其言戮尸迄無所知此謂能耿介也何承天於太祖座戲庾登之曰夫因禍為福未必皆智也庾答曰我亦幾與三豎同戮承天為謝晦作表云當浮舟東下戮此三豎故庾公以此嘲之承天失色又與林公道人同太祖坐常令二人棊林公指三棊謂承天曰維當承流直戮此三豎詠此言至於再三承天汗浹背恍惚蒼茫遂致失局孟昶立功專由妻也昶謂妻曰劉邁毀我於桓元正應作賊耳妻曰觀君非謀及婦人或由須錢財故也於是下其絳帳姊妹適人者有帳并縫衣服皆方便借取密壞為襖得三千餘領及平京城昶軍容最盛巢尚之求官執事就其求狀尚之乃狀云尚之始祖父堯讓天下不受仍次魯郡巢尚之年若干所由以其無三代疑於序用聞之於孝武帝武帝拊床賞嘆曰此必不凡彌宜用之世人相與呼父為鳳毛而孝武亦施之祖便當可得通用不知此言意何所出王翼在座聞孝武此言徑造謝超宗向侍御坐天旨云弟有鳳毛吾不曾見此物暫借一看翼非惟不曉此旨近不知超宗是謝鳳之兒超宗感觸既深狼狽起還內裏避之翼謂超宗還內檢取鳳毛坐齋中待望久之超宗心懼微歇兼冀其已悟於是更出對客翼又謂之曰鳳毛止於此一看本不將去差無損失那得遂不見借超宗又走乃令門人密往喻之翼然後去翼即是於孝武座呼羊肉為蹲鴟者乃其人也超宗字幾卿中拜率更令騶人姓謝亦名超宗亦便自稱姓名云超宗蟲蟻就官乞睞幾卿既不容訓此言騶人謂為不許而言之不已幾卿又走劉撝少有豪氣家産富厚自奉養伎妾藝貌當時絶倫築館穿池雅有佳趣飲食珍味貴遊莫及當世之士皆願與交撝隨方接對無不諧款齊武帝微時撝未之識時嘗附人車載至撝門同乘與撝善獨下造焉言畢而辭退撝怪而問焉對曰與蕭侍郎同車撝自至車後請焉既而歡飲如舊相識齊武甚懷之何敬容書名敬字大作苟小作文容字大作父小作口陸倕弄之曰卿名苟既奇大父殊不小敬容不能答常事衣服夏月入朝衣裳不整乃扶伏床下以尉斗尉之衣既甚輕背便焦灼不辨屯兩字之異答人書曰吾比弊時人以為笑也不知晉國及晉朝人或嘲之曰獻公殺賈后重耳殺懷愍卿憶此敬容曰從來所難此故足稱匪人也宋玉戲太宰屢遊之談後人因此流遷反語至相習至如太宰之言屢遊鮑照之伐鼓孝綽步武之談韋粲浮柱之説是中太甚者不可不避耳俗士非但文章如此至言論尢事反語何僧智者嘗於任昉坐賦詩而言其詩不類任云卿詩可謂高厚何大怒曰遂以我為狗號任逐後解説遂不相領任君復云經蓄一枕不知是何木會有委巷之謂任君曰此枕是標櫧之木任託不覺悟此人乃以宣誇於衆有自得之色夫子曰必也正名乎斯言讜矣孔翁歸解元言能屬文好飲酒氣韻標達嘗語余曰翁歸不畏死但願仲秋之時猶觀美月季春之日得玩垂楊有其二物死所歸矣余謂斯言雖有過差無妨有才也王思微性好潔淨每還侍中省洗浴必乞御水水清濁與他井不異且貴水名耳廬陵威王之蓄內也千門相似萬戶如一齋前悉施木天以蔽光景春花秋月之時暗如深夜撤燭內人有不識晦明者動經一紀焉所以然者正以桑中之契奔則難禁柳園之下空床多怨所以嚴其制而峻其網家人譬之廷尉門內同於苫廬雖制控堅嚴而金玉滿室土木緹罽不可勝云及凶寇濟江而憑陵京邑王之邸第邇於路左重門自啓無復擊柝之聲春服初成遂等閼氏之飾黃金滿匱前屬九虎白璧千雙後輸六郡向之所閉今之所開向之所聚今之所散屏去三惑可不戒乎昔潘君之慕虢雨之為人也虢雨好學方夏罝金鏤龍盤於側以洗墨渝焉潘君慕之遂無冬夏置金鏤龍盤於側而不以洗墨渝也此豈所謂愛其滯質而失其實也廬濛侯之妍也行必捻其纓顏氏學之動足而捻其纓為不妍也如舊此又潘君也余以九日從上幸樂遊苑被敕押伏蒙敕板軍主新從荊還人馬器甲震耀京輦百姓觀者如堵牆焉上諸子之中特垂慈愛相賚相接其日賦詩蒙賞其晚道義被稱左右拭目朋友改觀此時天高氣清炎涼調適千載一時矣上謂人曰余義如荀粲武如孫策余經侍副君講時季秋也召登含露之閣同時奉令者定襄侯祗舍人庾肩吾而已曲蒙恩宴自夜至朝奉玉裕之溫入銅龍之省曈曨日色還想安仁之賦徘徊月影懸思子建之文此又一生之至樂也余後為江州刺史副君賜報曰京師有語曰議論當如湘東王仕宦當如王克時始為僕射領選也余作金樓子未竟從荊州還都時有言是鍛真金為樓子者來詣余三爵之後往往乞借金樓子玩弄之應大奇巧此則近可咍也宋岱之雞猶解談説昔玉池國有民壻面大醜婦國色鼻齆壻乃求媚此婦終不肯回遂買西域無價名香而熏之還入其室婦既齆矣豈分香臭哉世有不適物而變通求進盡皆此類也參絲之絞以弦琴緩張則撓急張則絶王仲宣昔在荊州著書數十篇荊州壞盡焚其書今存者一篇知名之士咸重之見虎一毛不知其斑桂華無實玉卮無當周赧王即位負債而逃之名為逃債之宮今洛陽南宮謻臺是也竊民鐵而藏之專諸學炙魚香聞數里王僚索魚炙專諸持一利鋼刀藏著魚腹中持刀戟者於後鉤專諸而諸隱刀刺王僚乳出徹後屏風僚子羌忌走及奔牛手接飛燕闔閭患之石室銅戶藏翳備之也漢張猛皇甫商少而善相為狎既過乃至相殺爰及出奔故君子知慎之貌必齊莊於事為善丘遲出為永嘉郡群公祖道於東亭敬子沈隱侯俱至丘云少來搜集書史頗得諸遺書無復首尾或失名凡有百餘卷皆不得而知今併欲焚之二客乃謂主人云可皆取出共看之傅金紫末至二客以向諸書示之傅乃發擲剖判皆究其流出所得三分有二寡客咸所悅服雜記篇十三下殷湯取士於商賈周武取士於負薪齊桓取士於車轅大漢取士於奴僕明王聖主取士以賢不拘卑賤故其功德洋溢名流竹帛也大器不可小用小士不可大任周君出獵見白鴈為群周君鼓弩欲射道之行者其御公孫龍下車拊矢曰君以鴈射人無乃虎狠也魏絳請施舍積粟自公以下有積者盡出之國無滯粟亦無困人公無禁利又無貪民行之期年國乃有節此蓋邃古之法耳今若開府併以濟民忽值妖賊便當束手此劉虞惜放火所以見誅仲堪賑貧民於茲竄矣趙簡子出畋命鄭龍射野人使無驚吾鳥龍曰吾先君晉文公伐衛不僇一人今君一畋而欲殺良民是虎狼也簡子曰人畋得獸我畋得士故緣木愈高者愈懼人爵愈貴者愈危可不慎乎齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國之恥胡不雪之以政公曰善因發倉粟賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不復遺其冠齊宣王晝臥於社山父老十三人迎勞王王命賜父老田不租又無徭役父老皆拜而閭丘先生獨不拜王問之對曰臣願得壽而富貴也王曰夫生殺有時壽非寡人所得許也今倉廩以備災荒無以富先生大官無缺無以貴先生閭丘曰不然願大王選良吏以牧之臣得壽矣春秋振之以時無煩擾百姓臣得富矣大王出令曰少者敬老則臣得貴矣王曰善夫主有三惡不修文德而尚武力不明教化而枉任刑是一惡也妃妾以百數黔首多鰥寡是二惡也男不耕耨女不紡績杼軸既空田疇蕪薉是三惡也主有三殆倍德而好色親諂諛遠忠直嬖子衆多嫡嗣無立是一殆也嚴刑峻法是二殆也犬馬啖黍民不厭糟粳是三殆也田光鞠武俱往候荊軻燕太子以武陽性好彈太子為作金丸燕田光鞠武往候荊軻軻時飲酒醉臥光等往取之唾其耳中而去軻醉覺問曰誰唾我耳婦曰燕太子師傅向來是二人唾之軻曰出口入耳此必大事燕田光鞠武俱往候荊軻軻在席擊築而歌莫不髮上穿冠昔鄧通從理入口相者曰必餓死漢文帝曰能富通者我也賜以銅山其後果餓死枚乘有云磨礱不見其損有時而盡種樹不見其長有時而大積行不知其善有時而用棄義不知其惡有時而亡也楚國龔舍初隨楚王朝宿未央宮見蜘蛛焉有赤蜘蛛大如栗四面縈羅網有蟲觸之而死者退而不能得出焉舍乃歎曰吾生亦如是矣仕宦者人之羅綱也豈可淹歲於是挂冠而退時人笑之謂舍為蜘蛛之隱桓談有新論華談又有新論揚雄有太元經楊泉又有太元經談者多誤動形言也或云桓談有新論何處復有華談揚子有太元經何處復有太元經此皆由不學使之然也諸葛司馬二相誠一國之宗師霸王之賢佐也孔明起巴蜀之地蹈一州之土省任刑法整齊軍伍步卒數萬長驅祁山慨然有河洛飲馬之志仲達據天下十倍之地仗兼并之衆據牢城擁精鋭無擒敵之意若此人不已則雍梁敗矣方知司馬理大優乎高貴鄉公賦詩給事中甄歆陶成嗣各不能著詩受罰酒金谷聚前絳邑令邵滎陽中牟潘豹沛國劉邃不能著詩並罰酒三斗斯無才之甚矣畢卓常飲廢職比舍郎釀熟卓因醉夜至其甕間取酒飲之掌酒者不察執而縛之郎往視之乃畢吏部也遽釋其縛卓遂與主人飲於甕間取醉而去卓嘗謂人曰右手持酒杯左手執蟹螯拍浮酒池中便足了一生也孔靜居山陰宋武微時以靜東豪故往候之靜時晝寢夢人語曰天子在門覺寤即遣人出看而帝亦適至靜虛已接對仍留帝宿夜設粥無鮭新伏鵝卵令煮以為肴賊平京都以靜為奮威將軍會稽內史元嘉中張永開元武湖值古冢上有一銅斗有柄若酒桍太祖訪之朝士莫有識者何承天曰此亡新威斗王莽三公亡皆以賜之一在冢內一在冢外俄而又啓冢內得一斗有銘書稱大司徒甄邯之墓余好為詩賦及著書宣修容敕旨曰夫政也者生民之本也爾其勗之余每留心此處恆舉燭理事夜分而寢余六歲能為詩其後著書之中唯玉韜最善昔孔甲過人家主方産子占之曰子必有殃孔甲曰以為余子誰為殃之及長果見斫木而傷足高蒼梧叔能為風車可載三十人日行數百里梁有富人虞氏財資無量登高樓臨大路陳酒博奕其上樓下俠客相隨而行樓上博奕者爭采而笑會飛鳶墜腐鼠正中俠客俠客聞樓上笑謂虞氏以鼠投己夜聚攻滅虞氏宋丘之鼎以烹雞多瀋則淡沙瀋則焦鄭泉願得五百斛船貯酒四時甘肥置兩頭謂人言死必葬我於陶家之側百年之後形化為土得為酒器豈不美哉李元禮冽冽如長松下風周君颼颼如小松下風魏文侯見宋陵子三仕不願文侯曰何貧乎曰王見楚富者牧羊九十九而願百嘗訪邑里故人其鄰人貧有一羊者富拜之曰吾羊九十九今君之一盈成我百則牧數足矣鄰者與之從此觀焉富者非貧貧者非富也自序篇十四人間之世飄忽幾何如鑿石見火窺隙觀電螢覩朝而滅露見日而消豈可不自序也余六歲解為詩奉敕為詩曰池萍生已合林花發稍稠風入花枝動日映水光浮因爾稍學為文也昔葛稚川自序曰讀書萬卷十五屬文余不間什一憎人治生性乃隘急刑獄決罪多從厚降大辟之時必有不忍之色多所捶朴左右之間耳劉之亨嘗語余曰君王明斷不凡此皆大寬小急也天下萬事泛泛罪犯余皆寬貰之必有不遜者多不蒙宏貸也魏文帝曰余於彈棊略盡其妙能用手巾角拂有儒生能以低巾角而拂之合鄉侯東方安世張公子並皆一時佳手余經蒙儲皇賚彈棊具駁犀子彭城錦石局銀鏤香白檀床余遂歸於不解未曾一中余性不耐奏對侍姬應有二三百人並賜將士余不飲酒而又不憎人飲每遇醉者輒欣欣然而已吾年十三誦百家譜雖略上口遂感心氣疾當時奔走及長漸善頻喪五男銜悲恍忽心地荼苦居則常若尸存行則不知所適有時覺神在形外不復附身及以大兒為南征不復繼奉國諱隨念灰滅萬慮盡矣既感心氣纍問通人心氣之名當為何起多無以對余以為莊子云無疾而呼其笑若驚此心氣也曼倩有言陰陽爭則心氣動心氣動則精神散華談曰肝氣微則面青心氣動則面赤左氏云周王心疾終於童心疾卒曹志亦有心疾殷師者仲堪之父也有此病近張思光居喪之後感此病涼國太史令趙𢾺造乾度歷三十年以心疾卒晉阮裕謂士狂者豈其余乎吾小時夏日夕中下絳紗蚊綯中有銀甌一枚貯山陰甜酒臥讀有時至曉率以為常又經病瘡肘膝爛盡比以來三十餘載泛玩衆書萬餘矣曰余年十四苦眼疾沈痼比來轉暗不復能自讀書三十六年來恆令左右唱之曾生所謂誦詩讀書與古人居讀書誦詩與古人期茲言是也余將冠方好易卜及至射覆十中乃至八九嘗經至郢州從兄平西令吾射金玉琥珀三指鐶筮遇姤之履其辭曰上既為天其體則圓指鐶之象金玉在焉寅爻帶乎虎琥珀生光在合中央合中之物凡有三種按卦而談或輕或重又有人名裹襞𥿄中射之得鼎卦余言曰鼎卦上離為日下巽為木日下安木杲字也此是典籤裴重歡疏潘杲名與余射之他驗皆如此也余初至荊州卜雨時孟秋之月陽亢日久月旦雖雨俄而便晴有人云諺曰雨月額千里赤蓋旱之徵也吾乃端策拂蓍遇復不動既而言曰庚子爻為世水出生於金七月建申申子辰又三五合必在此月五日庚子果值甘雨余又以十七日筮何時雲卷金翹日輝合璧紅塵暗陌丹霞映謂亢陽之勢未霑膏澤筮遇坎之比於是輟蓍而嘆曰坎者水也子爻為世其在令夜三更乎地上有水坎之為比其方有甘雨乎欣然有自得之志姚文烈善龜卜謂余曰此二十一日將雨其在虞淵之時余乃筮之遇謙之小過既而言曰坤艮二象俱在土非直無雨乃應開霽俄而星如玉李月上金霧生猶縠河垂似帶余乃欣然吾齓年之時誦呪受道於法朗道人誦得淨觀世音呪藥上王呪孔雀王呪中尉何登善能解作外典呪癰疽禹步之法余就受之至十歲時敕旨賜向道士黃侯曄建安侯正立並是汝年時汝不學義余尚幼未能受年十二三侍讀臧嚴又有此勸余答曰只誦呪自是佳伎倆請守此一隅其年末乃頽然改途不復説呪也石季倫篤好林藪有別廬在河南界金谷澗中澗中有水碓土窯
