body:
  text: 卷二后妃篇三夫以坤維厚載實配乾道月以陰精用扶陽德故能輔佐天子求賢審臣二妃擅于虞朝十亂興乎周室其所以卜世隆長誠有以矣有虞二妃者帝堯之二女也長曰娥皇次曰女英四岳薦舜于堯堯乃妻以二女以觀厥內事舜于甽畝之中事瞽叟不以天子之女故而驕盈怠慢猶謙讓恭儉思盡婦道瞽叟使塗廩舜歸告二女父母使我塗廩我其往二女曰衣鳥工往舜既治廩瞽叟焚廩舜飛去舜入朝瞽叟使舜浚井舜告二女二女曰往哉衣龍工往舜往浚井石殞于上舜潛出其旁迨既納于百揆賓于四門選林木入于大麓每事常謀于二女舜既嗣位升為天子娥皇為后女英為妃封象于有庳二妃聰明貞仁舜陟方死于蒼梧號曰重華二女死于江湘之閒也湯妃有㜪氏之女也殷湯娶為妃生三子太丁仲壬外丙亦明教訓致其功太丁早卒丙壬嗣登大位妃領九嬪後宮有序咸無妒媢逆理之人伊尹為之媵臣與之入殷卒致王功君子謂有㜪明而有序詩云窈窕淑女君子好逑言賢女為君子和好眾妾其有㜪之謂也光烈陰后麗華南陽新野人也初漢世祖適新野聞后美心悅之後至長安見執金吾車騎甚盛因歎曰仕宦當作執金吾娶妻當得陰麗華漢世祖時追爵諡陰貴人父為宣恩侯漢明德馬皇后身長七尺二寸方口美髮梁宣修容本姓石揚州會稽上虞人粵自周仕衛入趙徙溫有石化字士風者與渤海諸石同出而異源仕吳為中書令生鑑字子奇曉仰觀見知于王隱游寓卒于歷陽葬于會稽王父元恭宋昇明中仕至武騎常侍考靈寶齊永明中為奉朝請修容誕中粹之至和涵祥明之純氣賢明之稱女師之德言為閨門之則行為椒蘭之表以升明元年丁巳六月十一日生生而紫胞朝請府君以為靈異年數歲能誦三都賦五經指歸過目便解同生弟妹各二人為家之長朝請永明之朝密勿王事與茹法亮紀僧真對直多在禁省不得休外處分家計專以仰委號為女王拊循弟妹閨門輯睦隆昌元年齊世祖因荀昭華薦以入宮時值少主失德好為虐戲手刺禽鳥必斂容正色少主非直深加嚴憚乃反賜金錢前後無算每對之而泣人問之故荅曰朝請府君陳夫人在家供奉未足用此何為有諸尼入臺齋會乃密以達之徑寄南金數百兩還家此人仍負之而趨其人後肉袒銜璧乃云不憶有此及建武之時始安王遙光聘焉專掌內政承上接下莫不得中遙光非王氏不被禮遇每因哂戲之際同類多侮慢王氏修容每盡禮謹肅王氏恆釃酒酹地曰將使自天祐之吉無不利東昏之世就遙光求金既而獻之乃從容諫曰盜憎主人民惡其上生于亂世將使貴人能貪無厭之求不如早而勿與遂不見信後遙光還東第又諫曰駟馬高蓋其憂實重少主貪虐不過欲得州城不如稱老歸第于事為善若其不爾悔將何及又不納及遙光破敗之後其子詡等竝多躓弊悉皆贍卹飢寒俱解天監元年選入為露采女賜姓阮氏進位為修容於是辨物書數詔獻穜稑初習淨名經義備該元理權實之道妙極沙門末持雜阿毗曇心論精研無比一時稱首三十年中恆自講說自為雜心講疏廣有宏益繹始習方物名示以無誑及在幼學親承慈訓初受孝經正覽論語毛詩及隨繹數番指以吏道政無繁寡皆荷慈訓時值水旱變食深憂居常儼敬無喜慍之色恭儉仁恕未嘗疾言親指至于醴酏品式衣裳製度家人有善莫不仰則先是丁朝請之憂毀瘠過禮見者不復能識母陳氏繼而艱故攀號慟絕殊不勝哀乃刻木為二親之像朝夕虔事每歲時伏臘言必隨淚下從母淨粲法師常所供奉及粲師遷神孺慕過禮異姓之服禮不過緦氣朔雖改纏悲愈切孝思不匱緊此類歟隨繹歸會稽或謂衣錦歸鄉古今罕例詢求故實贍卹鄉黨扶老攜幼竝沭恩猷修容既在昆弟之長撫育兩弟備加訓戒及兩弟云亡諸姪十有餘人皆稟規勗有庶生之妹受均同產及殞歿之後收養諸甥復隆恆日季妹為臺采女每隔歲時未有書翰必流涕忘食及采女告殂因此感氣孝乎惟孝友于兄弟實見斯言抱孫之愛垂慈尢篤孫方諸方等方規方智含貞含介含芷等爰自翦鬌躬親襁育居家卹隱不嚴而治御下以和而傍無游手刀尺綺縞各盡其業方諸含貞等婚嫁皆躬自經始旬日之中內外眾事爰及禮儀一時舉辦公家發遣啟臺悉停外及饋人失禮接之彌篤每語繹曰吾垂白之年雖親所聞見然而德不孤必有鄰且妒婦不憚破家況復甚於此者也于是愛接彌隆又善許負之術曾正會登樓還語人曰太尉今年必當不濟時靜惠王尚康勝咸以為不然曰行步向前氣韻殊下若其不爾不復言相其年末靜惠王薨及昭明入朝又云必無嗣立之相俄而昭明薨兼善雲氣初至九派云天文不利南方更將有妖氣時李敞既新平謂必無敢繼踵之者言之甚正無何之閒而劉敬宮反嘗有銀帶被匣左右就邊之將近盈把乃笑而言曰此人後身會當更屬我初無一言呵責值吉日良辰大小萃聚竝令相次起舞感恩流惠爰及童稚每戒繹曰言出於近千里必應士之生世束脩而已廣則難周無勞交結玉尚待沽而況人乎勤營功德恆事賑賜此為上也又躬自禮千佛無隔冬夏人不堪其苦而不改其德常無蓄積必行信捨京師起梁安寺上虞起等福寺在荊州起禪林祗洹等寺潯陽治靈丘嚴慶等寺前後營諸寺佛寶帳百餘領躬事後素親加雕飾妙於思理若有神功性好賑施自春及冬無日而怠往年穀粒騰涌蒙袂而濟者不可勝言方固南山永明眉壽繹亹結幽祗奄罹偏罰大同九年太歲癸亥六月二日庚申薨于江州之內寢春秋六十七自孟夏弗豫有遺旨金銀珠玉不許自隨凡厥凶事每存儉約神色審正終始不擾卜遠有期詔曰能施盛德曰宣可諡宣信至京都梁安宣業福成定果靈光正覺等寺同皆號哭如喪親戚焉及渚宮祗洹禪林等寺又如此也繹始學弱年患眼之始衣不解帶冬則不近炎火夏則不敢風涼如此者離寒暑也每大官供進竝以準取錢纖毫已上皆施宣業寺數年之中僧徒眾食竝是豐飽繹聞元獺有祭丹烏哺糧矧乃禽魚猶能感動況稟含靈之氣者也東入禹川西浮雲夢冬溫夏清二紀及茲昏定晨省一朝永奪几筵寂寞日深月遠觸目屠殞自咎自悼昔泝淮涘侍奉舟艫今還宮寺仰瞻帷幙顧復之恩終天莫報陟岵之心鯁慕何已樹葉將夏彌切風樹之哀戒露已濡倍縈霜露之戚過隙難留川流不舍往而不還者年也逝而不見者親也獻年回斡恆有再見之期就養閨闈無復盡歡之日拊膺屠裂貫裁心髓日往月來暑流寒襲仰惟平昔彌遠彌深煩冤拔懊肝心屠裂攀號腷臆貫截骨髓竊深游張之感彌切蒼舒之報每讀孟軻皇甫謐之傳未嘗不拊膺哽慟也讀詩人勞悴之章未嘗不廢書而泣血也乙丑歲之六月氣候如平生焉冥然永絕入無瞻奉慈顏緬邈肝膽糜潰貫切痛絕柰何柰何終制篇四吾企及推延豈能及病偶屬炎夏流金煎石氣息綿微心用惝怳慮不支久方從風燭夫有生必有死達人恆分棺槨之造起自軒轅周室有牆翣之飾旌銘之儀晉文公請隧桓司馬石槨甚非謂也送終之禮思以裁之觀荀卿不韋淮南崔寔王符仲長其制書旨本自不同俱非厚葬孱若一也高平劉道真京兆摯仲治竝遺令薄葬楊王孫遺令裸葬晉代江應元又然樊靡卿言葬禮唯約沐浴竝終制令掘埳氣絕令兩人轝尸即埳止婦人之送禁弔祭之賓後亡者不得入藏不得封樹裴潛遺令曰墓中唯置一座瓦器數枚皇甫士安言以蘧篨裹尸覆卷三重麻繩約二頭置尸靈床上擇不毛之地坑訖去床下尸而已石苞曰死皆斂以時服不得斂唅不得兼重又不得設床帳盟器不得起墳種樹郝昭曰吾為將數見發冢取其木為攻具知厚葬之無益汝必斂以時服也郝竝敕子曰吾生素餐日已久矣可葬為小槨裁容下棺張奐遺令措尸靈床幅巾而已盧植敕其子以單帛附身葬於土穴雖制度不同同歸於薄也趙岐畫晏嬰叔向子產季札生不能及死而畫之甚非所以晉成帝曰山陵之事一從節儉陵中唯潔淨而已不得施塗車芻靈此事雖大又可諭小吾之亡也可以王服周身示不忘臣禮曲禮一卷孝經一帙孝子傳并陶華陽劍一口以自隨此外珠玉不入銅鐵勿藏也田國讓求葬於西門豹側杜元凱求葬於蔡仲冢邊杜臧求葬於蘧伯玉之側梁伯鸞求葬於要離之旁彼四子者異乎吾之意也山地東北隅始生山陵小墓之前可以為冢已具別圖庶魂兮有奉歸骨有地然壙中石屏風木人車馬塗車芻靈之物一切勿為金蠶無絲之實瓦雞乏司晨之用慎無以血臚膋腥為祭也戒子篇五東方生戒其子以上容首陽為拙柱下為工飽食安步以仕易農依隱玩世詭時不逢詳其為談異乎今之世也方今堯舜在上千載一朝人思自勉吾不欲使汝曹為之也后稷廟堂金人銘曰戒之哉無多言多言多敗無多事多事多患勿謂何傷其禍將長勿謂何害其禍將大崔子玉座右銘曰無道人之短無說己之長施人慎勿念受恩慎勿忘凡此兩銘竝可習誦杜恕家戒曰張子臺視之似鄙朴人然其中心不知天地閒何者為美何者為惡敦然與陰陽合德作人如此自可不富貴禍害何因而生馬文淵曰聞人之過失如聞親之名親之名可聞而口不可得言也好論人長短忘其善惡者寧死不願聞也龍伯高敦厚周慎謙約節儉吾愛之重之願汝曹效之杜季良憂人之憂樂人之樂有喪致客數郡畢至吾愛之重之不願汝曹效之效伯高不得猶為謹敕之士所謂刻鵠不成尚類鶩者也效季良不得所謂畫虎不成反類狗者也裴松之以為援此戒可謂切至之言不刊之訓若乃行事得失已暴於世因其善惡即以為戒云然戒龍伯高之美言杜季良之惡行吾謂託古人以見意斯為善也王文舒曰孝敬仁義百行之首而立身之本也孝敬則宗族安之仁義則鄉黨重之行成於內名著於外者矣未有干名要利欲而不厭而能保於世永全福祿者也欲使汝曹立身行己遵儒者之教履道家之言故以元默沖虛為名欲使顧名思義不敢違越也古者盤盂有銘几杖有戒俯仰察焉夫物速成而疾亡晚就而善終朝革之草戒旦零落松柏之茂隆冬不衰是以大雅君子惡速成戒闕黨也夫人有善鮮不自伐有能寡不自矜伐則掩人矜則陵人掩人者人亦掩之陵人者人亦陵之也陶淵明言曰天地賦命有生必終自古聖賢誰能獨免但恨室無萊婦抱茲苦心良獨惘惘汝輩既稚小雖不同生當思四海皆為兄弟之義鮑叔敬仲分財無猜歸生伍舉班荊道舊遂能以敗為成因喪立功他人尚爾況共父之人哉潁川陳元長漢末名士身處卿佐八十而終兄弟同居至於沒齒濟北汎稚春晉時積行人也七世同居家人無怨色詩云高山仰止景行行止汝其慎哉顏延年云喜怒者性所不能無常起於褊量而止於宏識然喜過則不重怒過則不威能以恬漠為體寬裕為器善矣大喜蕩心微抑則定甚怒傾性小忍則歇故動無響容舉無失度則為善也欲求子孝必先為慈將責弟悌務念為友雖孝不待慈而慈固植孝悌非期友而友亦立悌夫和之不備或應以不和猶信不足焉必有不信倘知恩意相生情理相出可以使家有參柴人皆由損枚叔有言欲人不聞莫若不言欲人不知莫若勿為禦寒莫如重裘止謗莫若自修論語云內省不疚夫何憂何懼單襄公曰君子不自稱也必以讓也惡其蓋人也吾弱年重之中朝名士抑揚於詩酒之際吟詠於嘯傲之閒自得如山忽人口草好為辭費頗事抑揚末甚悔之以為深戒向朗遺言戒子曰貧非人患以和為貴汝其勉之以為深戒酒酌之設可樂而不可嗜聲樂之會可𥳑而不可違淫華怪飾奇服麗食慎毋為也曾子曰狎甚則相𥳑莊甚則不親是故君子之狎足以交歡其莊足以成禮也子夏曰與人以實雖疏必密與人以虛雖戚必疏帥人以正誰敢不正敬人以禮孰敢不禮使人必須先勞後逸先功後賞戒慎乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨也必使長者安之幼者愛之朋友信之是以君子居其室出其言善則千里之外應之出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎近至于遠也言行君子之樞機樞機之發榮辱之主可不慎乎處廣廈之下細氈之上明師居前勸誦在後豈與夫馳騁原獸同日而語哉凡讀書必以五經為本所謂非聖人之書勿讀讀之百徧其義自見此外眾書自可汎觀耳正史既見得失成敗此經國之所急五經之外宜以正史為先譜牒所以別貴賤明是非尢宜留意或復中表親疏或復通塞升降百世衣冠不可不悉任彥升云人皆有榮進之心政復有多少耳然口不及迹不營居當為勝王文舒曰人或毀己當退而求之於身若己有可毀之行則彼言當矣若己無可毀之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉且聞人毀己而忿者惡醜聲之加己反報者滋甚不如默而自修也顏延年言流言謗議有道所不免況在闕薄難用算防應之之方必先本己或信不素積嫌閒所為或性不和物尢怨所聚有一於此何處逃之日省吾躬月料吾志斯道必存何卹人言任嘏每獻忠言輒手懷草自在禁省歸書不封何其美乎入仕之後此其勗哉昔孔光有人問溫室之樹笑而不荅誠有以也中行桓子為衛之士師刖人之足俄而衛有蒯聵之亂刖者守門焉謂季羔曰於此有室季羔入焉既追者罷季羔將去問刖者曰今吾在難此正子報怨之時而子逃我何曰曩君治臣以法臣知之獄決罪定臨當論刑君愀然不樂見於顏臣又知之君豈私於臣哉天生君子其道固然此臣之所以待君子孔子聞之曰善哉為吏其用法一也歸義隱蕃為豪傑所善潘承明子翥與之善承明問曰何故與輕薄通使人心震面熱廣陵陽竺幼而有聲陸遜謂之必敗令其兄子穆與其別族季豐年十五賓客填門乃曰神童而遂無週身之防果見誅夷相國掾魏諷有盛名同郡任覽與諷善鄭袞謂諷姦雄必以禍終子宜絕之諷果敗焉王仲回加子以檟楚朱公叔寄言以絕交此有深意最宜思之聚書篇六初出閤在西省蒙敕旨賚五經正副本為瑯琊郡時蒙敕給書并私有繕寫為東州時寫得史漢三國志晉書又寫劉選部孺家謝通直彥遠家書又遣人至吳興郡就夏侯亶寫得書又寫得虞太中闡家書為丹陽時啟請先宮書又就新渝上黃新吳寫格五戲得少許為揚州時就吳中諸士大夫寫得起居注又得徐𥳑肅勉起居注前在荊州時晉安王子時鎮雍州啟請書寫比應入蜀又寫得書又遣州民宗孟堅下都市得書又得鮑中記泉上書安成煬王於湘州薨又遣人就寫得書劉大南郡之遴小南郡之享江夏樂法才別駕庾喬宗仲回主簿庾格僧正法持絓經書是其家者皆寫得又得招提琰法師眾義疏及眾經序又得頭陀寺曇智法師陰陽卜祝冢宅等書又得州民朱澹遠送異書又於長沙寺經藏就京公寫得四部又於江州江革家得元嘉前後書五帙又就姚凱處得三帙又就江錄處得四帙足為一部合二十帙一百一十五卷竝是元嘉書紙墨極精奇又聚得元嘉後漢并史記續漢春秋周官尚書及諸子集等可一千餘卷又聚得細書周易尚書周官儀禮禮記毛詩春秋各一部又使孔昂寫得前漢後漢史記三國志晉陽秋莊子老子肘後方離騷等合六百三十四卷悉在一巾箱中書極精細還石城為戍軍時寫得元儒眾家義疏為江州時又寫蕭諮議賁劉中紀緩周錄事宏直等書時羅鄉侯蕭說於安成失守又遣王諮議僧辯取得說書又值吳平光侯廣州下遣何集曹沔寫得書又值衡山侯雍州下又寫得書又蘭左衛欽從南鄭還又寫得蘭書往往未渡江時書或是此閒製作甚新奇張湘州纘經餉書如樊光注爾雅之例是也張豫章綰經餉書如高僧傳之例是也范鄱陽胥經餉書如高誘注戰國策之例是也隱士王縝之經餉書如童子傳之例是也又就東林寺智表法師寫得書法書初得韋護軍叡餉數卷次又殷貞子鈞餉爾後又遣范普市得法書又使潘菩提市得法書竝是二王書也郡五官虞䂃大有古迹可五百許卷併留之伏事客房篆又有三百許卷併留之因爾遂蓄諸迹又就會稽宏普惠皎道人搜聚之及臨汝靈侯益州還遂巨有所辦後又有樂彥春劉之遴等書將五千卷又得南平嗣王書又得張雍州書又得桂陽藩王書又得留之遠書吾今年四十六歲自聚書來四十年得書八萬卷河閒之侔漢室頗謂過之矣二南五霸篇七
