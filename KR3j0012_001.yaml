body:
  text: 卷一興王篇一粵若稽古天皇氏地皇氏人皇氏分有十紀一曰九頭二曰五龍三曰括提四曰合雒五曰連通六曰序命七曰修飛八曰因穆九曰禪通十曰疏訖容成氏大庭氏柏皇氏中央氏栗陸氏驪連氏赫蘇氏宗盧氏祝和氏渾沌氏昊英氏有巢氏朱襄氏葛天氏陰康氏無懷氏太昊帝庖犧氏風姓也母曰華胥燧人之世有大跡出靁澤華胥履之生庖犧蛇身人首有聖德燧人氏沒庖犧氏代之繼天而王首德於木為百王之先都陳至于共工霸而不王炎帝神農氏姜姓也母曰女登為少典妃遊華陽有神龍感女登生炎帝人身牛首有聖德以火承木都陳遷魯嘉禾生醴泉出在位百二十年黃帝有熊氏號軒轅亦曰帝鴻少典之子姬姓也又姓公孫少典娶有蟜女附寶見大電光繞北斗樞星照郊野附寶孕二十月生黃帝龍顏有聖德生而神靈弱而能言幼而循齊長而敦敏成而聰明受國於有熊居軒轅之丘乃與炎帝戰於阪泉之野三戰然後得行其志屈軼草生庭佞人入則指之又有景星麟鳳之瑞乃以風后配上台天老配中台五聖配下台謂之三公置左右大監以治人得寶鼎興封禪帝座於元扈之上太一下來有大螻如羊帝曰土氣勝故以土德王在位一百年有四妃生二十五子少昊金天氏一號窮桑二曰白帝朱宣帝黃帝之子姬姓母曰女節黃帝時有大星如虹下流華渚意感生少昊於窮桑是為元囂姓姬氏或云已氏降居江水以登帝位以金承土都曲阜有鳳鳥之瑞以鳥紀官鳳鳥氏以為司歷正元鳥氏為司分伯趙氏為司至青鳥氏為司開丹鳥氏為司閉祝鳩氏為司徒雎鳩氏為司事五雉為五工正九扈為九農正天下大治焉帝顓頊高陽氏黃帝之孫昌意之子母曰女樞金天氏之末搖光之星貫日如虹感女樞於幽房之宮右脅有九色毛生顓頊以水承金始都窮桑徙商丘帝嚳高辛氏少昊之孫蟜極之子生而神靈自言其名曰夋𪘀齒以木承火都亳在位十年元妃有邰氏女曰姜嫄生后稷次妃有娀氏女曰蕑翟生契次陳酆氏女曰慶都生堯次陬訾氏女曰常儀生子摯摯立不善乃立堯帝堯字放勛一名同成育陶唐氏帝嚳之子伊祁姓也母曰慶都為嚳妃出觀河渚遇赤龍而孕寄伊長儒家産甲申歲而生堯丹陵也堯眉八采日角方目足有元武之字手有三河之文豐下鉛上就之如日望之如雲黃收純衣彤車白馬冬則鹿裘夏則絺葛采椽不斫土階三等克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦焦僥氏來獻沒羽常年之人得神獸若羊名曰獬豸堯乃緝其皮以為帳分命羲仲和仲日中星鳥以殷仲春日永星火以定仲夏宵中星虛以正仲秋日短星昴以正仲冬時許耳之子名曰由字道開一字仲武仲武黃白色長八尺九寸兄弟七人十九而隱堯欲禪之由乃洗耳是後景星曜於天甘露降於地朱草生於囿鳳凰止於庭以莆蓂莢之瑞都於平陽命羲仲羲叔和仲和叔掌四方在位四十一年洪水滔天懷山襄陵四嶽舉鯀治水九年績庸不成五十年乃更咨四嶽得舜乃在璿璣玉衡以齊七政類於上帝禋於六宗望於山川辨升群瑞堯崩乃葬濟陰城廟居齊郡有柏樹死而更生焉舜攝政二十八年堯乃殂三年禮畢舜避丹朱於南河諸侯朝覲訟獄者不之丹朱而之舜舜曰乃天命也初堯教丹朱棊以文桑為局犀象為子帝舜有虞氏龍顏大口圓天日角出額重鼻足履龜文目重瞕子身長九尺一寸常夢擊天鼓母曰握登早終瞽叟更娶生象象傲瞽叟頑後母嚚咸欲殺舜使舜入井舜鑿井傍行二十里以孝聞三十而帝堯問可用者四嶽咸舉舜堯於是降以女娥皇女瑩配之妻舜以觀其內使九男與處以觀其外二女不敢以貴驕事舜親戚甚有婦道堯九男皆益篤舜耕於歷山歷山之人皆讓畔耕地得金枝銀節漁於靁澤上人皆讓民陶於河濱河濱器皆不苦窳一年而所居成聚二年成邑三年成都堯乃試舜五典百官皆治布五教於四方堯乃老使舜攝行天子政巡狩得舉用事卿雲出景星見西王母使使乘白鹿駕羽車建紫旗來獻白環之玦益地之圖乘黃之駟綏耳貫胸之民來獻珠蝦既陟帝位以土承火都平陽命禹為司空棄為后稷契為司徒咎繇為士垂為共工益為朕虞伯夷為秩宗夔為典樂龍為納言庶績咸熙群瑞畢集簫韶九成鳳凰來儀擊石拊石百獸率舞生子商均不肖舜復禪禹入九疑山置銅劍一枚化為礫今濟南歷城有祠太陽山有虞氏三石闕也禹即位後十五年舜乃殂禹讓商均避之陽城天下不歸商均而之禹初商均一名章鷁帝禹夏后氏名曰文命字高密母修已山行見流星貫昴意感又吞神珠薏苡胸坼而生禹於石坳夜有神光長於隴西大夏縣龍角珠庭虎鼻大口兩耳參鏤首戴鉤鈐身長九尺九寸胸有黑子如玉斗焉手長至膝脛無毛左手中十七黑子為人敏給克勤其德不違其言可信聲為律身為度乃遂與益后稷奉帝令諸侯百姓傷先人父鯀之功不成受誅乃勞身焦思過門不入而洪水平既陟元后以金承土都平陽或營安邑薄衣食而致孝於鬼神卑宮室而致美於黻冕陸行乘車水行乘舟泥行乘橇山行乘檋神鹿出於河水天錫元圭乾吾國獻裘毛有五采復薦咎繇於天將以致禪會咎繇終復薦益禹殂葬會稽廟中有鐵屧鐵䔪石船廟裏有塗山神姑之像珠璣為帳寶玉雕華諸廟莫及當中山水之盛良辰吉日羅綺袨服滿橋梁之上皆金翠為飾神又甚靈彼人所敬初禹娶塗山氏之女生啓三年禮畢益避啓人不歸益而歸啓一名建一名余母化而為石啓即位伐有扈氏啓庶兄也夏禹氏絶少康出於竇之中復禹跡也成湯姓子名履字天乙狼星之精感黑龍而生高天廣角隆準手有縱理如印綬之文豐下兌上晳而有鬚長九尺四寸八肘凡有七號一名姓生二云履長三云瘠肚四云天成五云天乙六云地甲七云成湯成湯始居亳從先王居作商誥湯征諸侯葛伯不祀湯始伐之湯曰汝不能敬命豫大伐殛之無有攸赦作湯征伊尹號阿衡阿衡欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味說湯致於王道湯謂之曰自進非道也乃令還其本居使人聘迎之五反然後從之任以國政白狼銜劍有神人身虎首獻玉鏡白狐九尾諸國貢玉盤入自北門遇女房作女房之歌林樹久不花一旦生如鳳翼湯出見野張網四面祝曰自上下四方皆入吾網湯曰噫盡之矣乃去其三面祝之曰欲左左欲右右不用命乃入吾綱諸侯聞之曰湯德至矣及於禽獸當是時夏桀為虐政淫荒而諸侯昆吾氏為亂湯乃興師率諸侯伐桀敗於有娀氏之墟奔於鳴條之野乃改正朔服色朝諸侯崩葬於濟陰亳縣東北郭去縣三里冢高七尺漢哀帝時遣大司空行湯冢又說曰殷湯無葬處此言非焉武丁大戊竝賢君也周文王昌狼星之精母曰大任夢長人感己有胎目不視惡色耳不聽淫聲以胎教之溲於豕牢生文王龍顏虎肩身長十尺胸有四乳即位為西伯有雀生鸇於殷城隅文王增修政三年四方諸侯皆服崇侯譖之於紂紂不納費仲又言於紂欲誅之紂不從九年春三月率六州諸侯朝於殷崇侯虎又譖之紂怒囚文王於羑里雖有憂患方修先聖之業廣解六十四卦著其卦詞謂為周易時謂西伯為聖紂疑而未達長子伯邑考質於殷為紂御紂烹之為羹賜文王以試之實聖當不食子羹文王得而食焉紂笑曰誰謂西伯聖者食其子而尚不知紂謂西伯曰譖汝者長鼻決耳也文王曰此崇侯虎之狀紂赦文王四十三年春正月庚子朔文王在酆九州諸侯咸朝五緯聚房心周之分野時有烏銜丹書集於周社文王乃獻洛西赤壤之國方千里請除炮烙之刑紂許焉賜以弓矢鈇鉞使專征天下大悅有鳳凰銜書而至文王稽首受命是歲即位化被江漢之域以受命之始年也周武王發望羊高視𪘀齒生而有光太公周公作輔武王渡河伐紂中流白魚躍入舟長一尺四寸一說云丹鯉未知孰是武王俯取以祭既渡有火至於王屋流為烏其色赤其聲魄云是時諸侯不期而會盟津者八百諸侯皆曰未可乃還歸居一年聞紂昏亂暴虐滋甚殺王子比干囚箕子太師疵少師彊抱其樂器而奔周戊午師渡盟津諸侯咸會共行天罰甲子昧爽武王朝至於商郊牧野乃誓武王左仗黃鉞右秉白旄紂聞武王來亦發兵七十萬人距武王紂師雖衆皆無戰心心欲武王亟入及紂師皆倒兵以戰以開武王武王馳之持太白旗以麾諸侯畢拜武王王乃揖諸侯諸侯畢從武王至商國商百姓待於郊於是天錫黃鳥之旗遂入至紂死所武王身射之三發而後下車以輕劍擊之以黃鉞斬紂頭懸之大白之旗肅慎氏獻石砮楛矢苦庭之國獻文犀紫駝命釋百姓之囚表商容之閭命南宮括散鹿臺之財發巨橋之粟以賑貧弱時夷雍之子名伯夷叔齊不食周粟餓於首陽依麋鹿以為群叔齊起害鹿鹿死伯夷恚之而死漢高祖名季父名執嘉母曰舍始入池中浴見玉雞銜赤珠名曰玉英吞之有孕昔孔子夢三槐閒豐沛邦有赤蛇化為黃玉上有文曰卯金刀字此其瑞矣帝美髭髯隆準容受直言好謀多欲平秦楚之難撥亂反正雖不修文學而性明達聰自監門戍卒見之如舊初從民心作三章之約天下既定命蕭何次律令韓信申軍法張蒼定章程叔孫通定禮儀陸賈造新語又與功臣剖符作誓丹書鐵券金匱石室藏之宗廟雖日不暇給規模宏遠矣漢太宗恆即位宮室苑囿車騎服御無所增益有不便輒弛以利民嘗欲作露臺臺基已成將構召匠計之直百金乃曰百金中人十家之産也吾奉先帝宮室嘗羞之何以臺為身衣弋綈所幸慎夫人衣不曳地幃帳無文繡常集上書囊以為殿帷兵器無刃以示敦朴為天下先葬霸陵皆瓦屋不以金銀銅鐵為飾因山不起墳南粵尉他自立為帝召他兄弟以德懷之他遂稱臣與胸奴結和親而背約入盜令邊備守不發兵深入恐煩百姓吳王濞詐病不朝錫以几杖群臣袁盎等諫雖切常假借納用焉張武等受賂金錢覺更加賞賜以愧其心專務以德化民是以海內殷富興於禮儀斷獄數百幾致刑措至於中宗宣帝樞機周密品式備具工巧器械先代莫及民畏其法吏奉其職矣漢世祖文叔建平元年十二月甲子夜生於武帝故宮有赤光照室影如五麟七鳳後望氣蘇伯阿為王莽使至南陽遙見舂陵城郭曰佳哉美氣鬱鬱葱葱帝美鬚眉身長八尺七寸腳下有文色如銀印厚一分更始起兵還舂陵遠望舍內火光赫然屬天夢乘赤龍登天上珠階玉闥乃以三千人破王莽百萬衆及即位故能平隗囂公孫述等在兵既久厭武事常思息肩皇太子嘗問攻戰之事帝諭曰衛靈公問陳於孔子孔子不對非爾所及也每旦視事日昃乃罷斷遠方餉異味奇珍功臣高枕無所誅殺引公卿講經論夜分乃寐太子諫曰階下有禹湯之明失彭聃之福願怡愛精神帝曰我自樂之不為疲也雖身濟大業兢兢如不及故能明慎政體總覽權綱嘗有獻千里馬者帝曰鑾旗在前屬車在後朕乘此安之乃以駕鼓車初巡狩舂陵父老曰乞蠲十年帝曰天下艱難三年已外豈能自保乃蠲三年退勳臣進文吏身衣大絹色無重采耳不聽鄭衛之音手不持珠玉之扇無私愛左右無偏恩損池籞廢弋獵賜州國竝皆一札十行成文細書勤約之嘗著瑞火籠賦內外匪懈百姓寬息戢弓矢散馬牛上信止戈為武也魏武帝曹操用師大較依孫吳之法而因事設奇量敵制勝變化如神自作兵書十餘萬言諸將征伐皆以新書從事臨時叉手為節度從令者克捷違教者負敗與虜對陳意思安閒如不欲戰然及至決機乘利氣勢盈溢故每戰必克取張遼徐晃於亡虜之中皆佐命立功列為名將其餘拔出細微登為牧守者不可勝數是以創造大業文武竝施御事三十餘年手不捨書晝則講軍策夜則思經傳登高必賦被之管弦皆成樂章才力絶人手射飛鳥躬擒猛獸嘗於南皮一日射雉六十三頭及造宮室繕治器械無不為之法則皆盡其意雅性節儉不好華麗攻城拔邑得靡麗之物則悉以賜有功勛勞宜賞不吝千金無功望施分毫不與四方所獻與群下共之豫自制送終衣服四篋而已晉世祖安世少厲高行造次必於忠怒未曾有過言失色於人然而明達善謀能斷大事暨登大阼之日制強國御下有禮所以鎮壓內外輯靜四方威惠參洽文武必舉故天下服焉承魏氏奢侈剋弊之後百姓思古之遺風帝既謙儉寡欲亦雅識時變臨朝愷悌務崇𥳑泰有人餉雉頭裘者即令燒之朝廷輯睦興居可觀故威服強吳規模宏遠雖饗國未久德洽於民矣其後惠懷喪亂中宗東渡所謂五馬俱渡江一馬化為龍者也宋高祖德輿清𥳑寡欲嚴整有法度未嘗視珠至輿馬之飾後庭無紈綺絲竹之音寧州嘗獻琥珀枕光色甚麗時諸將北征以琥珀治金瘡帝大悅命搗分付諸將平關中得姚興從女有盛寵以廢事謝晦諫即時遣出財帛皆在外府內無私藏宋臺建有司奏東西堂施局腳床銀埿釘帝不許使用直腳床釘用鐵諸主出適遣送不過二十萬無錦繡金玉內外奉禁莫不節儉後孝武帝大明中壞帝所居陰室於其處起玉燭殿與群臣觀之床頭有土鄣壁上挂葛燈籠廣州所部二千石有獻入筒細布一端八丈帝既見惡其精麗勞民力即付所司彈牧守以布還之并制嶺南勿作此布帝素有熱疾并患金瘡末年尢劇坐仕臥常須冷物而未能得後人獻石床帝見善之寢其上即覺極以為佳乃歎曰木床猶用功不少況乃鐫石即還其人亦令毀之帝始遊軍彭城置酒命紙筆賦詩曰先蕩臨淄寇卻清河洛塵華陽有逸驥桃林無伏輪於是群才竝作也宋太祖義隆年十四身長七尺三寸好讀史書善楷隸能文章溫和有人君之德及南面負扆深以子民為先臺殿堂宇無所改易為吏長子孫居官成姓號明法令時人謂有建安永平之風每至諸侯王宴集必先論國家政務自朝訖晡乃設食既而語人曰千乘之君幼居人貴吾所以未便設食令此輩稍知饑寒也經巡歷至上庫謂左右曰此庫內大有錢殊可羡願左右曰此縣官之物耳何羡願耶帝曰此皆國家之物吾奉先帝之祀常懼羞之四方豐稔倉粟皆紅省租賦米五錢也梁高祖武皇帝生而靈異有聖德頸光龍液舌文八字頂垂帶重丘額照日象有文在手曰武帝并上諱三字始在髫髮便愛琴書容止進退自然合禮常與兒童鬭技手無所持躡空而立觀者擊節咸共稱神及遭獻太后憂哭踊大至居喪之哀高柴不能過也每讀孝子傳未曾終軸輒輟書悲慟由是家門愛重不使垂堂登於晚年探賾索隱窮理盡性究覽墳籍神悟知機讀書不待溫故一閲皆能誦憶所以馳騁古今備該內外辨解聯環論精堅白沛國劉瓛當時馬鄭上每析疑義雅相推揖深沈靜默不雜交游所與往來一時才雋至於得人門稱多士居宇精肅常有煙霧垂簾拱帳望者竦然六義四始尢解禮體登高必賦莫非警策弱冠升朝令問籍甚太尉王儉齊國阿衡欽上風雅請為戶曹屬司徒竟陵王齊室驃騎招納士林待上賓友之禮范雲時為司徒記室深慕上德自結神遊驅車到門頃日驟至上嘗旦往報雲雲聞街衢灑掃喚呼清道俄聞笳鼓之聲雲意天子出幸南苑尋乃上遣通焉心獨怪之未敢言也上哲於知人慮無遺事歷司徒法曹祭酒掾會輔友仁之職永明九年出為鎮西諷議西上述職行過牛渚直暴風卒起入泊龍瀆既波浪不可靜登岸逍遙四望梁山瞻眺墟落見一長老披儒服至揖上曰君龍顏虎步相不可言天下方亂四海未一安蒼生者其在君乎上笑之曰觀公長者不容見戲俄而風靜此夕竟屆姑熟永明十年太祖登遐上始承不豫便即言歸輕舟仍發州府贈遺一無所受齊隋郡王若留一宿不許得單艇望星上路犯風冒浪兼行不息雖狂飆地發高浪天湧船行平正常若安流舟中之人皆稱神異及舟漏臨沒叫不輟聲鵲頭戍主周達奉上一船奔波就路至京不踰二旬自在途便不盥櫛寢食俱廢焦憂易形視人不識望宅奉諱氣絶良久既葬嘔血數升水漿不入口者四日憂服之內不復嘗米所資粗麥日中二溢再拜山陵杖而後起涕淚所灑松為變色及號思廬室未嘗見齒仍留山陵因欲隱遁太傅宣武王若諫乃止有桑門釋僧輝不知從何來也自云有許負之法通名詣上見而驚曰檀越頂有伏龍此非人臣之相貧道所未見也若封泰山願能見覓上笑而不答此後莫知所之齊明密敕上為雍州領兵往救新野仍即發引振旅長途號令清嚴所過秋毫不犯信賞分明士卒咸思盡命凡公私行旅多停大雷輒逾信次不肯時發上軍浦口值風起浪生沿流泝波無敢行者軍直兵啓風浪大不可冒宜入浦待靜兼應解周何郎神上曰周公瑾何無忌在昔勤王如我今日亦復何異爾若有靈當令風靜因打上鼓催進行途未遠便波恬風息於是利涉常乘便風漢沔穀貴百姓多饑上賑救乏絶闔境不匱九月九日上出講武時士女觀者遠近畢至中閒忽暴風起烟塵四合當上所居獨白日清照有紫雲特起始齊高在府夢著屐上太極殿三人從一人齊武一人齊明一人張天地圖而不識意言是太祖子弟及踐阼嘗與太祖密謀謂太祖曰我辛苦得天下而祚不傳孫我死龍子當得龍子死當屬阿度此後當還卿子孫遂至大霸及太傅援京邑夜在越城假寐忽夢見一大人著朱衣牽三匹馬來太傅因騎一匹騰空半天而墜次衡陽王一馬踴過屋而落後上騎一匹因化成龍遂飛上天此幽讚神明吉之先見及受終太祖允恭寶歷臺城內起至敬殿庶羞百品若殷薦焉其中隋珠和璧圓淵方井侔於宗廟上晦朔恆號慟哽絶躬至寢門若文王之為世子也又奉為太祖於鍾山起大愛敬寺又奉為獻后起大智度寺即位五十年至於安上治民移風易俗度越終古無得而稱焉又作聯珠五十首以明孝道云伏尋我皇之為孝也四運推移不以榮落遷貿五德更用不以貴賤革心臨朝端默過隙之思彌慚垂拱巖廊風樹之悲踰切齊潔宗廟虔事郊禋言未發而涕零容弗改而傷慟所謂終身之憂者是之謂也蓋虞舜夏禹周文梁帝萬載之中四人而已針戒篇二末喜桀之妃美於色薄於德亂孽無道女子行丈夫志身常帶劍桀嘗置末喜於膝上喜謂桀曰群臣盡憎妾之貴乃以益慢於君君威衰令多不從皆以妾為亂君願賜死桀於是大怒行苛法賜與嬖妾侈益無度府藏空虛譽者昌諫者亡群下杜口莫敢正言造酒池可以運舟一鼓而牛飲者三千人於酒池醉而溺死者無數於是末喜笑之以為樂夏桀作為璿臺瑤室象牙之席白玉之床以處之夏桀淫於婦人求四方美女積之後宮俳優侏儒狎徒能為奇瑋戲者聚之於傍造爛熳之樂夏桀嘗鑿霍山通於淵關夏桀時兩日竝出黑光遍天攝提之星失其常所伊洛水竭天雨血月流精火神回祿見於黔隧昔夏后既衰妖精竝見蜚虹滿野夷羊在牧殷帝乙無道為偶人謂之天神與之博令人為行天神不勝乃戮辱之殷武乙無道嘗為革囊盛血仰而射之命曰射天獵於河渭之閒暴震而死殷帝紂囚西伯羑里西伯乃獻獸黃金目毛如織錦玉女駭雞犀九江大貝青狐元豹黃熊白虎因費仲獻紂紂喜之殷帝紂淫虐王子比干諫弗聽剖其心十二穴破而觀之帝紂垂胡長尺四寸手格猛獸愛妲己色重師涓聲狗馬奇物充牣後庭使男女裸形相隨為長夜之飲時人為之語曰車行酒騎行炙百二十日為一夜帝紂時木林之地宵陷為池池生淫魚取而食之池一夜而竭得淫魚數百大悅之錫之宮人宮人悉淫亂帝紂時天雨丹血布及石大者如瓮小者如箕周厲王好利近榮公大夫苪良夫諫之王怒問衛巫使監謗者以告則殺之喜曰能弭謗矣召公曰防人之口甚於防川川潰傷人人亦如之故近臣盡規親戚補察瞽瞍教誨耆艾修之王不聽於是莫敢出言其先夏后氏衰有二龍止於夏庭曰余褒之二君也帝殺而埋其漦三代莫敢視厲王發而觀之使婦人裸而譟之漦化為元龜後宮未齓者遭之既笄而孕褒姒矣周幽王嬖愛褒姒褒姒生子伯服廢太子而立之用褒姒為后褒姒者宣王時歌云皎皎伯服實亡周國宣王下國內有白服者殺之時褒姒初生父母不養而棄白服者聞嬰兒啼因取以奔褒後褒人以姒贖罪因名褒姒焉西周君奔秦蹶角受罪遣獻其邑秦受其獻歸其君於周周赧王卒降為西武公秦始皇聞鬼谷先生言因遣徐福入海求玉蔬金菜并一寸椹秦二世即位自幽深宮以鹿為馬以蒲為脯漢昌邑王賀初昭帝崩無嗣霍光徵賀典喪到濟陽求長鳴雞卵五百枚道買積竹杖過宏農使大奴宋善以衣連載女子行居道上不素食常私買雞豚漢有三璽賀受之上前就次不拜初至國都不哭言嗌痛不能哭後即位二十七日見廢漢昌邑王賀嘗召皇太后御果下馬使官奴服之漢昌邑王賀嘗封奴二百餘人常與居禁闥使中府令高昌奉黃金千斤賜侍中君卿取十妻漢昌邑王嘗夢青蠅之矢積西階東可五六石以屋板瓦覆發視之青蠅之矢也以問龔遂遂曰皆宜進先帝大臣子孫親近以為左右如不忍昌邑故人信用讒諛必有凶咎願詭禍為福皆放逐之臣當先逐矣漢昌邑王在藩時有大鳥集於宮中血汙王坐席其怪如此漢昌邑王賀在藩嘗見大白狗戴法冠問左右左右皆曰不見後王即位二十七日見廢漢哀帝即位寵任董賢均田之制從此墮壞百姓訛言持籌相驚被髮徒跣而走漢氏衰矣漢哀帝時董賢母病長安廚給祠具道中過者皆飲酒為賢治器成奉御乃行賜及蒼頭奴婢人十萬錢漢桓帝常在南宮長秋和曜殿上作樂漢桓帝時黃龍千秋萬歲殿皆被災漢靈帝本侯家宿貧即位常歎曰桓帝不能作家居都無私錢乃賣官自關內侯虎賁羽林各有差私令左右賣公卿錢公錢十萬卿錢五百萬漢靈帝嘗藏寄小黃門常侍錢纍數千萬漢靈帝嘗鑄銅人四列於蒼龍元武闕外漢靈帝時鑄四鐘皆受二千斛懸於玉堂及雲臺殿前漢靈帝起篳圭靈琨苑以珉玉為壁以博山柏節為床漢靈帝嘗於四園弄狗著進賢冠帶綬漢靈帝時作列肆於後宮使采女販賣更相盜竊鬭爭之聲聞於人閒帝著商賈服飲宴於其閒漢靈帝時養驢數百帝自騎之驅馳遍京師有時駕四驢入市裏漢靈帝時黃巾賊起帝自稱無上將軍耀兵平樂館上設九葉蓋蓋皆安孔子真金鈴銀珠玉之飾稱是也漢靈帝時樂城門災延及北闕度道燒嘉德和曜殿廣陽門外上屋自壞收天下田畝十錢以治室魏明帝於列殿北立八坊諸才人以次第處其中貴人夫人以上轉南附焉其名擬百官之數帝常遊宴在內魏明帝時徙長安鍾簴駱駝銅人承露盤盤折銅人重不可致留於霸城大發銅鑄人二號曰翁仲列坐司馬門外魏明帝時鑄黃龍鳳凰各一龍高四丈鳳高三丈餘置內殿前魏明帝時引穀水過九龍前為玉井綺闌蟾蜍含受神龍吐流歲首建巨獸魚龍曼延弄馬倒騎如漢西京之制魏明帝起土山於芳林西北陬使公卿皆負土捕禽獸置其中群臣穿方舉土面目垢黑沾體塗足衣冠了鳥以崇無益其所以不能興國也魏明帝作延休殿永寧殿昌宴殿魏齊王芳不親萬機耽淫內寵日延倡優迎六宮家人留止內房嘗於芙蓉殿前裸袒相逐又於凌雲臺曲施帷見九親婦女芳臨宣曲觀呼小優郭懷袁信使入帷並飲酒清商令令狐景曰先帝持門戶急今陛下日將后妃游戲無度乃至共觀為陛下計耳倡優裸袒為亂恐不可令皇太后聞臣不愛死芳曰我作天子不得自在耶向使先帝使外人淫內侍子孫豈不衆多太后何與我事使人縛景燒鐵灼之舉體皆爛魏齊王芳日延倡優及司馬昭初入朝司馬師將有問鼎之志芳與左右小臣謀因昭辭殺之勒其衆以師昭既入芳方食粟優人唱曰青頭雞青頭雞者鴨也芳懼不敢發晉惠帝衷為太子時武帝宴群臣於式乾殿歡甚衛瓘被酒拊帝座云此座可惜帝猶不悟乃佯言曰公醉耶後朝臣多言衷不可立及即位後為趙王倫所篡晉惠帝昏酒過常每見大官上食有蚶帝慘然作色曰自今勿復制此糜費人力宋景和子業孝建之太子也即皇帝位興改制度或取之前史謝莊為誄宣貴妃文曰贊軌堯門方之漢鉤弋也帝下莊於獄乃發貴妃墓縱糞於孝建冢曰查奴何意生我孝建多昏縱故有查奴之目太后臨卒遣人召帝帝曰病人閒多鬼不可往太后怒曰引刀破我腹那得生如此兒其不孝皆此類也宋蒼梧王昱嘗置射雉場二百處翳中帷帳皆緑紅錦為之金銀鏤弩牙玳瑁帖箭宋蒼梧王鈐鑿錐鋸之徒不離左右嘗以槌捶人陰破左右見之有斂眉者大怒令此人袒膊正立以矛㓨膊洞過宋蒼梧王昱嘗於七月七日乘靈車往新安寺從曇慶道人飲酒宋蒼梧王昱嘗飲酒醉於仁壽殿東阿氈幄中臥時楊玉夫見昱醉無所知乃與楊萬年同入氈幄中以千牛刀斬之齊武帝嘗與王公大臣共集石頭烽火樓令長沙王晃歌子夜之曲曲終輒以犀如意打床折為數段爾日遂碎如意數枚齊武帝內殿則張帷雜色錦復帳帳之四角為金鳳凰銜九子鈴形如二三石瓮垂流蘇珥羽其長拂地施畫屏風白紫貂皮褥雜寶枕金衣機名香之氣充滿其中外宴既畢則環而臥齊武帝時宮內深密不聞端門鼓漏聲乃置鐘於景陽樓上宮人聞鐘則起裝飾也齊武帝有寵姬何美人死帝深悽愴後因射雉登巖石以望其墳乃命布席奏伎呼工歌陳尚歌之為吳聲鄙曲帝掩嘆久之賜錢三萬絹二十匹齊武帝數幸琅邪城宮人常從之早發至湖北埭雞始鳴齊武帝嘗於內殿環臥合歌姬舞女奏樂於帷幔之前為歡曲則拊几稱佳起哀聲則引巾拭淚齊武帝時隱靈寺雕飾炫麗四月八日皆往往以宦閽防門有禮拜者男女不得同日至也僧尼竝皆妍少俗心不盡或以箱簏貯姦人而進之後為覘伺所得竝皆誅死齊武帝時內人出家為異衣住禪靈寺者猶愛帶之如初齊鬱林王初欲廢明帝其文則內博士韓蘭英所作也蘭英號韓公總知內事善於文章始入為後宮司儀齊鬱林王武帝嫡孫嗣位之日與妃何氏書題作一喜字又作三十許細喜字繞四邊齊鬱林王昭業既嗣位武帝有甘草杖宮人寸斷用之齊鬱林王嘗取武帝衣箱開之有金射雉玻瓈貫納等悉賜左右齊鬱林王既嗣位恆在內與宦者及宮人戲以玉為墮公以金擲之齊鬱林王既嗣位嘗夜中與宦者共刺鼠至曉皆用金銀叉以金花獸紅綸為襦齊鬱林王既嗣位常列胡伎二部夾閣迎奏極意賞賜動百數十萬齊鬱林王既嗣位賞賜無度武帝庫儲垂盡嘗開生衣庫與皇后寵姬觀之又給閹人豎子各十數人隨其所欲恣意輦取諸寶器以相剖擊破碎之以為笑樂齊鬱林王時有顏氏女夫嗜酒父母奪之不出入宮為列職帝以春夜命後宮司儀蘭英為顏氏賦詩曰絲竹獨在御愁人獨向隅棄置將已矣誰憐微薄軀帝乃還之東昏侯寶卷黑色身才長五尺猛眉出口齊東昏侯時後宮遭火之後更起仙華神仙玉壽殿刻畫雕彩青金鉛帶錦幔珠簾窮極巧麗齊東昏侯以青油為堂名琉璃殿穿針樓在其南最可觀望上施統成帳懸千條玉珮聲晝夜不絶地以錦石為之殿北開千門萬戶又有千和香香氣芬馥聞之使人動諸邪態兼令人睡眠齊東昏侯初於宮中取空輦行之繞臺如天子儀服自捉玉手版金梁路帶齊東昏侯於芳樂苑諸樓觀壁上畫男女淫褻之狀又於苑中立市太官則每旦進酒肉雜使宮人屠沽齊東昏侯寶卷潘氏服御極選珍寶琥珀釧一隻直七千萬齊東昏侯嘗為潘妃御車製雜色錦伎衣綴以金花玉鏡齊東昏侯潘妃嘗著裲襠袴
