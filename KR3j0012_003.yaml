body:
  text: 卷三說蕃篇八周公攝政管叔欲為亂因是流言於國曰公將不利孺子奄君聞之說祿父舉兵祿父及三監遂貳于公公謂召公曰我攝政者恐天下叛周也無以告我先王乃奉成王命東征剋殷殺祿父踐奄誅其君戮管叔殺蔡叔降霍叔為庶人王既惑流言意愈不悅時雷電且風禾黍盡偃大木皆拔王懼與大夫啟金縢書王執書泣曰公勤勞王家予不知今天動威彰公之德王遂夜迎公天乃雨反風禾盡起公定鼎郟鄏越裳氏以三象重九譯獻白雉肅慎又來入貢獻白雉旦讀書一百篇夕則見士七十人也鸞風至蓂莢生公以天下既定宜有事于河洛示神祗之變定人神之徵往從之沈璧于河有光滿河青龍銜元甲圖而出元龜甲有赤字公寫之書成其赤字隨滅龜於是墮甲而去景星見醴泉吐麒麟出朱草生王以公勳勞天下九十九薨召公奭與周同姓姬氏周武王之滅紂封召公於燕其在成王時召公為三公自陝以西召公主之自陝以東周公主之成王既幼周公攝政當國祚召公疑之作君奭君奭不說周公周公稱湯時有伊尹假于皇天在太戊時則有若伊陟臣扈假于上帝巫咸治于家祖乙時有巫賢武丁時有甘盤保乂于殷也於是召公乃說之召公治西方甚得兆民和召公巡行鄉邑有棠樹決獄政事於其下自侯伯庶人各得其所無失職者齊桓公小白雍林人襲殺齊君無知桓公之立發兵攻魯心欲殺管仲鮑叔諫桓公從之乃佯為召管仲欲甘心實用之管仲知之故往見桓公桓公序禮以為大夫任政桓公既得管仲鮑叔隰朋高徯修政齊國連五家之兵伐魯魯莊公請獻遂邑以平諸侯會桓公於甄而桓公始霸焉山戎伐燕告急於齊桓公救燕遂伐山戎至孤竹而還衛文公有狄亂告急於齊率諸侯城楚丘而立衛君伐蔡蔡潰遂伐楚楚盟而去狄伐陳夏會諸侯於葵丘周襄王賜桓公文武胙彤弓大輅是歲秦繆入晉公子夷吾桓公於是討晉亂至高梁使隰朋立晉君而還是時周室還微獨齊為中國令諸侯成周也晉文公重耳生而胼脅年十七賢士五人曰趙衰狐偃咎犯賈佗先軫晉惠公卒重耳得入是為文公晉人多附焉周襄王以弟難出居鄭告急晉乃發兵至陽樊圍溫入襄王於周周王賜晉河內陽樊命晉侯為伯秦穆公任好即位晉獻公滅虞虢虜虞君秋公自將伐晉戰於河西晉驪姬作亂夷吾使人謂秦求入晉公許使百里奚將兵送夷吾夷吾謂曰若得立請割晉之河西八城予秦及至已立而不予旱請粟於秦公公與之秦饑請粟於晉晉因饑伐秦使丕豹往擊之與晉惠公夷吾合戰於韓地晉君棄其軍與秦爭利還而馬縶穆公追之不得反為晉軍所圍岐山下食善馬者三百人馳冒解圍遂脫穆公反生得晉公獻其河西地發兵襲鄭賈人弦高持十二牛賣之因見秦兵獻其牛曰聞大國將誅鄭鄭君謹修守備令臣以牛勞軍士秦三將軍相謂曰將襲鄭鄭人已覺之往無及已滅滑晉之邊邑當是時晉文公喪尚未葬太子襄公怒縗絰發兵遮秦兵於殽擊大破之虜三將晉文公夫人穆公女也曰繆公怨此三人於骨髓心願歸之我君得此快意烹之晉君許三將歸歸至繆公素服郊迎哭曰孤不用百里奚蹇叔之言以辱三子三子何罪乎復官秩益厚之使孟明等伐晉取王官及鄗以報殽之役秦用由余謀伐戎王益國十二開地千里也楚莊王即位不出號令日夜為樂有諫死者伍舉入諫不從居數月益甚蘇從乃入諫於是乃罷淫樂聽政任伍舉蘇從以政國人悅是歲滅戎伐陸渾戎遂至洛觀兵於周郊問鼎之輕重而歸若敖反擊滅之伐陳殺夏徵舒圍鄭剋之引兵去三十里而避舍遂許之平大敗晉師河上至衡雍而歸圍宋以宋殺楚使也宋華元出告以情遂罷兵焉宋襄公茲甫即位宋地隕星如雨與俱下六鷁退飛公為鹿上之盟以求諸侯於楚楚人許之秋諸侯會宋公於盂於是楚執宋公以伐宋冬會於亳以釋宋公又楚成王戰於泓宋師大敗公傷股國人皆恐昔蕃屏之盛德者則劉德字君道造次儒服卓爾不群好古文每就人閒求善書必為好寫與之留其真本加以金帛士有不遠千里而至者多獻其先祖舊書周官尚書禮禮記孟子老子獻王好之采周官及諸子之樂事作樂記獻八佾之舞使弟子王定傳之二十四首表立毛詩左氏春秋博士武帝在位來朝對辟雍明堂靈臺故世謂之三雍對也及令詔策問三十餘事及著樂語五均事云天子取諸侯之士巳立五均則市無二價四時常均強者不得困弱富者不得要貧則五家有餘恩及於小民矣王既有哲天子下大樂官常存之歲時以備數常山王禹世受河閒樂能說其義弟子宋曄上書云河閒王躬求幽隱興禮樂蓋有漢之所以興也王常謂人曰禹鑿江通乎九谷酒分五湖而注東海民不怨者利也吾將行之時元俗自言餌巴豆雲母賣於都市七丸一錢治百病王病服之下蛇十餘頭俗言王病乃六世餘殃非王所招也王常放乳鹿仁心感天故當遇耳俗形無影獻王以女配之故武帝遣所忠問王王輒對無影帝曰湯以七十里文王以百里其勉之王知意即縱酒聽樂又為周制二十篇劉游好書多才藝少時嘗與魯穆生白生申公俱受詩於浮丘伯丘伯者孫卿門人也高后時浮丘伯在長安元王遣子郢客與申公俱卒業文帝時聞申公為詩最精以為博士元王好詩諸子皆讀詩申公始為詩傳號魯詩元王亦之詩傳號曰元王詩劉蒼好經史博學多識恭肅畏敬明帝重其器能特愛異之入為相薦郇恁桓榮等其後蒼數上疏陳藩職至重不宜久留京師蒼為人體貌長大美鬚髯腰八尺二寸故帝言副其腰腹也帝以所自作光武本紀示蒼蒼因上世祖受命中興頌咸言類相如揚雄前世史岑也章帝時王入朝以王觸寒涉道使中謁者逢迎賜王乘輿貂裘劉輔性矜嚴有盛名深沈好經書善說京氏易論集經傳及圖讖文作五經通論儒者得以明事世號之曰沛王通論明帝甚敬之賞賜恩寵加異數訪問以事京師少雨上御雲臺召尚席取卦具自卦以周易卦林占之其繇曰螘封穴戶大雨將集明日大雨上即以詔書問輔對深被知遇詔報曰善哉王次序之也月為一卦以當游戲稱為賢王劉羨少好學博通經傳有威嚴與諸儒講論於白虎殿帝以廣平在北多有邊費乃徙羨為平西王又徙封陳王劉睦少好學博通書傳光武愛之數被延納顯宗在東宮尢見幸入則諷誦出則執轡中興初禁網尚闊而睦性謙恭好士千里交結自大儒宿德莫不造門由是聲價益廣永平中法憲頗峻睦乃謝絕賓客放心音樂歲遣大夫奉璧朝賀召而謂曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝仁慈敬賢樂士睦曰吁子危我也其對以孤襲爵以來志意衰惰聲色是娛犬馬是好使者受命而行其能屈伸如此初靖王薨悉推財產與諸弟雖王車服珍寶非列侯制皆以為分然後隨以金帛贖之能屬文作春秋旨義終始論及賦頌數十篇又喜史書當時以為楷則及寢疾帝驛馬令作草書尺牘十首曹裒好學讀書左右常恐精力為病苦諫之每弟兄游娛裒獨覃思經典文學防輔相與言曰受詔察公舉措有過當奏及有善亦宜以聞不可匿其美也遂共表稱陳裒美裒聞之大驚責文學曰修身自守常人之行耳諸君乃以上聞是適所以增負累也後黃龍見鄴西漳水裒上書讚頌性尚儉約教敕妃妾紡績習為家人之事病困敕令官屬曰吾寡德忝寵天命將盡吾既好儉而聖朝著終誥之制為天下法吾氣絕之日自殯及葬務奉詔書衛大夫蘧瑗葬濮陽吾望其基常想遣風願託賢靈以弊髮齒營吾兆域必往從之禮男子不卒婦人之手亟以時成東堂堂成名之曰遂志之堂司馬攸少以奇英見稱長好經書武帝受禪攸督帥府鎮撫中外有佐命之勛封齊王初居文帝喪上以攸至孝毀甚文明皇太后親臨省攸攸毀瘠應黑貌不可識太后留攸宅撫慰旬日及還中詔勉攸曰若萬一加以他疾將復如何宜遠慮深計不可守一意以陷於不孝若復不從往言當遣人監守飲食攸好學不倦借人書皆為治護攸自受國秩表求絕御府常賜前後十餘輒不見聽國之文武下至士卒分租賦以給之疾病死亡醫藥皆有差時有水旱國內百姓則加賑貨須豐年乃責十減其二國內賴之文明皇太后臨崩謂武帝曰桃符性急汝宜宏之詔攸當世總方岳遂加都督青州增封濟南郡備物典策軒懸之樂六佾之舞馮紞意也攸結氣病黃暴薨司馬泰廉靜不近聲色之讌位至太尉衣食有如布素任真𥳑率每朝會不識者不知其王公也事親恭謹居處謙和為宗室儀表當時諸王唯高密王泰下邳王晃俱以儉稱晃字子明為太傅劉休慶少而閒素篤好文籍文帝寵愛殊常為立第於雞籠山盡山水之美建平國職高他國為尚書左僕射謙儉周慎禮賢接士曉明政事上深信仗之劉義慶為荊州刺史性謙虛始至及去鎮迎送物竝不受在州八年為安於西土撰徐州先賢傳奏上之又擬班固典引為典序以述皇代之美為性𥳑素寡嗜欲愛好文義為宗室之表受任歷蕃無浮淫之過善騎乘招聚才學之士近遠必至文冠當時為衛軍咨議參軍吳郡陸扆東海何長瑜鮑照等引為佐史竟陵蕭子良開私倉賑貧民少有清尚禮才好士居不疑之地傾意賓客天下才學皆游集焉善立勝事夏月客至為設瓜飲及甘果著之文教士子文章及朝貴辭翰皆發教撰錄居雞籠山西邸集學士抄五經百家依皇覽列為四部要略千卷招致名僧講論佛法造經唄新聲道俗之盛江左未有也好文學我高祖王元長謝元暉張思光何憲任昉孔廣江淹虞炎何僩周顒之儔皆當時之傑號士林也隋郡王子隆好文章體肥常服蘆茄丸以自消猶無益也劉安有文才好書鼓琴不喜弋獵狗馬馳騁行陰德拊循百姓沽多譽招致賓客方術之士數千人作內書二十一篇外書甚眾又有中書八篇言神仙黃白之術亦二十餘萬言時武帝方好藝文以安屬為諸父辯博善為文辭甚尊重之每為報書及賜常召司馬相如等視草乃遣初安入朝獻所作內篇新出上愛祕之使為離騷傳旦受詔日食時上又獻頌及賦每見談說昏暮而罷曹子建善屬文魏武帝見其文謂植曰汝倩人邪植跪曰臣言出為論下筆成章故當面試奈何倩人邪時鄴銅爵臺新成武帝悉將諸子登臺使各為賦植援筆立成文彩可觀劉休元少好學嘗為水仙賦當時以為不減洛神擬古詩時人以為陸士衡之流頻征戰皆獻捷劉章年二十忿劉氏不得職常入侍燕飲高后令章為酒吏章自請曰臣將種也請得以軍法行酒高后曰可酒酣章進歌舞已而曰請為太后言耕田高后兒子畜之笑曰顧而父知田耳若生而為王子安知田章曰臣知之太后曰試為我言田意章曰深耕穊種立苗欲疏非其種者鋤而去之太后默然頃之諸呂一人醉亡章斬之自是後諸呂憚之雖大臣皆依朱虛侯劉氏為強其明年呂產欲作亂章首先斬產以定天下劉非為汝南王吳楚反時非年十五有才氣上書自請擊吳景帝賜非將軍印擊吳吳已陂徙王江都治故吳國以軍功賜天子旗曹子文少善射御膂力過人手格猛獸不避險阻數從征伐志章慷慨魏武帝常抑之曰汝不念讀書而好乘汗馬擊劍此一夫之用何足貴也課彰讀書彰謂左右曰丈夫一為衛霍將十萬騎馳沙漠驅戎狄立功建號耳何能作博士邪烏丸反以子文為北中郎將行驍騎將軍時兵馬未集唯有步卒千人騎數百匹用田豫計固守要隙虜乃散退彰追之身自搏戰射胡騎應弦而倒者前後相屬戰過半日彰鎧中數箭意氣益厲乘勝逐北至於桑乾諸將以為新涉遠士馬疲又受節度不得過代不得深進遂上馬令軍中後出者斬一日一夜與虜相及擊破之斬首獲生以千數魏武喜捋彰鬚曰黃鬚兒竟大奇也司馬承身居藩屏躬處儉約乘葦笨車家無別室王敦懷無君之心元帝召承曰湘州南楚險固在上流之要控三州之會是用武之國全勝之地今以叔父居之如何承曰君之所命敢有辭焉承行達武昌釋戎備見王敦敦因宴集謂承曰大王雅素佳士非將御才也承曰安知鉛刀不能一割敦果謂錢鳳曰彼不知懼而學壯語此不知武何能為焉劉長母本張敖美人坐貫高事繫之河內弟趙兼因辟陽侯告呂后后妒不肯白辟陽侯不強爭美人已生厲王恚即自殺長有材力扛鼎乃往請辟陽侯侯出見之即袖金椎椎之居處無度為黃屋蓋擬天子擅法合不用漢法以罪徙處蜀嚴道日三食給薪菜鹽炊食器席蓐制曰食長給肉日五斤酒二斗令故美人才人得幸者從之乃不食而死刺王旦壯大就國為人辯博學經書雜說好星歷術數倡優射獵之事招致游士及衛太子敗齊懷王又薨旦自以次第當立上書求入宿衛上怒下其使獄後坐藏匿亡命削良鄉安次文安三縣武帝由是惡旦後遂立少子為太子帝崩太子立是為昭帝賜諸侯王璽書旦不肯哭曰璽書封小京師疑有變興宗室遂招來群國姦人賦斂銅鐵作甲兵數閱其車騎材官卒建旌旗鼓車旄頭先毆郎中侍從著貂羽黃金附蟬皆號侍中旦從相中尉以下勒車騎發民會圍大獵文安縣以講士馬須期日時天雨虹下屬宮中令井水井水竭廁中豕群出壞大官竈烏鵲鬭死鼠舞殿端門中殿上戶自閉不開天火燒城門大風壞宮城樓折拔樹木流星下墮王驚病使人祠葭水台水王客呂廣等知星為王言當有兵圍城期在九月十月漢當有大臣戮死者會燕倉告蓋主上官桀與旦有逆謀桀等皆伏誅有赦令到王讀之曰嗟乎獨赦吏民不赦我因迎后姬諸夫人之明光殿王曰老虜曹為事當族欲自殺以綬自絞后夫人隨旦自殺者二十餘人劉胥壯大好倡樂逸遊力扛鼎空手搏熊彘猛獸動作無法度故終不得為漢嗣宣帝即位封內四子聖曾寶昌皆為列侯又立胥小子宏為高密王所襃賞甚厚始昭帝時胥見上年少無子有覬欲心而楚地巫鬼胥迎女巫李子須使下神祝詛女須泣曰孝武帝下我左右皆伏言吾必令胥為天子胥多賜女須錢使禱巫山及昌邑王徵復使巫咒咀之後王廢胥寖信女須等數賜予錢物宣帝立胥曰太子孫何以反得立復使女須咒咀如前胥宮園中棗樹生十餘莖莖正赤葉白如素池水變赤魚死有鼠晝立舞王后庭中胥謂姬南等曰棗水魚鼠之怪甚可惡也居數月咒咀事發自殺劉荊光武崩飛書與東海王彊恐說之勸令興兵為逆亂乃封荊廣陵遣就國後復呼相工謂曰我貌最類先帝先帝三十得天下我今年亦三十可起兵未相者詣吏告之後竟使巫祝咀自殺劉英交通賓客晚節學黃老浮屠永平八年詔令天下死辠皆入縑贖英遣郎中令詣國相曰過惡積惶懼歡喜大恩奉送黃縑二十五匹入贖楚相以聞詔書示諸國中傳曰楚王誦黃老之微言尚浮屠之仁祠潔齋三月與神為誓何嫌當有悔吝還贖縑紈以助伊塞桑門之盛饌是後英遂交通方士十三年中男子燕廣告英作金龜玉鵠謀反坐死徙者以千數劉端為人賊螫又陰痿一近婦人病數月有所愛幸少年以為郎郎與後宮亂端擒滅之及殺其子母數犯法漢公卿數請誅端帝弗忍而所為滋甚有司比再請削其國去大半端心慍遂為無訾省封其宮門從一門出入數變姓名為布衣之他國死無子國除劉彭祖為人巧佞卑諂足恭而心刻深好法律持詭辯以中人多內寵姬及子孫相二千石欲奉漢法以治則害於王家是以每相二千石至彭祖衣帛布單衣自行迎除舍多設疑事以詐動之故二千石莫敢治而趙王擅使使即縣為賈人榷會入多於國租稅以是多金錢然所賜姬諸子亦盡之彭祖不好治宮王禨祥好書史上書願督國中盜賊常夜從走卒行邀邯鄲中諸使過客以彭祖險詖莫敢留劉建遊章臺令女子乘小船以足蹈覆其船四人皆溺二人死後游雷陂天大風建使郎二人乘小舟入波中船覆兩郎攀船乍見乍沒建臨觀大笑令皆死宮人姬人子有過者輒令臝立擊鼓或居樹上久者三十日乃得衣或髡鉗以鉛杵舂不中程輒掠或縱狼令齧殺之建觀而大笑或閉不食令餓死建欲令人與禽獸交而生子強令宮人臝而與羝羊狗交專為淫虐王后父胡應為將軍中大夫疾有材力善騎射號曰靈武君作治黃屋蓋刻皇帝璽鑄將軍都騎金銀印作漢使節二十綬千餘具積數歲以謀反自殺劉去嗣為廣川王其殿門有成慶畫短衣大袴長劍去好之作七尺五寸劍被服皆效焉有幸姬王昭平地餘許以為后去嘗疾姬陽成昭信侍甚謹更愛之去與地餘戲得褏中刀笞問狀服欲與昭平共殺昭信笞問昭平不服以鐵鍼鍼之彊服乃會諸姬去以劍自擊地餘令昭信擊昭平皆死去令昭信為后幸姬陶望卿為脩靡夫人主繒帛崔脩成為貞明夫人主永巷昭信復譖望卿曰與我無禮衣服常鮮於我盡取善繒匄諸宮人去未知信又巧譖之昭信知去已怒即誣言望卿歷指諸郎吏臥處俱知其主名又言郎中令錦被疑有姦即與昭信從諸姬至望卿所臝其身更擊之令諸姬各持燒鐵灼望卿望卿走投井死諸幸於去者昭信輒譖殺之凡十四人去坐徙自殺昭信棄市劉讓嗣為梁王初孝王有罍尊直千金戒後世善寶之母得以與人讓之后曰任后聞而欲得之讓之祖母李太后曰后先王有命母得以尊予人也他物雖鉅萬猶自恣王讓直使人開府即以尊賜任后又王及母陳后事李太后多不順有漢使者來太后欲自言王使謁者中郎胡等遮止閉門太后與爭門損指太后後病薨病時任后未嘗請疾又不待喪劉次昌為齊王其母曰紀太后取弟紀氏女為王后不愛紀太后欲其家重寵令其長女紀翁主入王宮其後宮無主得近王欲令愛紀氏女王因與其姊翁主姦齊有宦者徐甲入侍漢皇太后有愛女曰脩成君非劉氏子太后憐之脩成君有女娥太后欲嫁之於諸侯宦者甲乃請使齊必令王上書請娥皇太后喜使甲之齊時主父偃知甲使齊以取后事亦因謂甲即成幸言偃女願得充王後宮甲至齊風以此事紀太后怒曰王有后後宮備具且甲齊貧人及為宦者入事漢初無補益乃欲亂吾王家且主父偃何為者乃欲以女充後宮甲大窮還報皇太后曰王已願尚娥然事有所害恐如燕王燕王者與其子昆弟姦新坐死故以燕感皇太后太后曰毋復言嫁女齊事者也事寖淫聞於上劉宇壯大通姦犯法上以至親弗辠傅相連坐久之事太后內不相得太后上書言之璽書敕諭元帝崩宇謂中謁者信等曰漢大臣議天子少弱未能治天下以為我知文法建言欲使我輔佐天子我見尚書晨夜極勞若使我為之不能也今暑熱縣官年少持服恐無處所我危得之比至闕下宇凡三哭飲酒食肉妻妾不離側後為妻妾告之坐削兩縣其功業無成者則司馬穎初起軍河朔三軍畢從每夜刀戟之端有光若火壘中井皆有龍像長沙王既死增封穎二十郡拜丞相一如魏武九錫故事乘輿服御皆遷於鄴其掾步熊私曰雖為太弟不得嗣也穎遂立邦郊兆於鄴城及敗為頓丘太守馮嵩所執穎素為鄴都所服慮為變偽稱臺使賜穎死穎曰我放逐於今三年身體手足不見洗沐取五斗湯來其二子號泣穎叱去浴訖散髮束首臥命縊之二子皆死鄴中為之悲哀司馬乂忠毅方正成都王穎河閒王顒同攻京師乂敗績時東海王越領中書監慮外難已逼潛與殿中將士收乂送金墉城成都軍不彊恨乂功垂成而敗之謀共劫乂更以距穎朝廷及東海王越懼難復作欲遂誅乂黃門侍郎潘滔曰不可將自有靜之者征西將軍張方遣將郅輔勒仈三千至金墉城收乂馬負至營縊之三軍莫不為之垂涕司馬越少有令名自許昌率苟晞及冀州刺史丁劭討汲桑破之越拜太傅先是謠曰元超兄弟大落度上桑打椹為苟作晞亦懼逼說越曰兗州天下之要公宜自牧大治官舍以待越有大星頭如箕長五六丈起西方流東行至地有赤散流光若血所照皆赤日中若飛燕者十八日有流星若箕自東北西南行至地越請討石勒且鎮集兗豫以援京師越專擅威權圖為霸業州郡攜貳上下崩離憂懼成疾薨劉餘之封為淮陽王吳楚反破後徙王魯好治宮室苑囿狗馬季年好音口吃難言初壞孔子舊宅以廣其宮聞鍾磬琴瑟之聲遂不敢壞於其壁中得古文經傳劉京性恭孝好經學京都莒好宮室窮極伎巧殿館壁帶皆飾以金銀數上詩賦頌德帝嘉美之京國中有城陽景王祀吏民奉祠神數下言宮中多不便乃復徙宮開陽司馬道子於府第內築土山穿池沼樹竹木用功數十百萬又使宮人為酒肆酤賣於水側道子與親幸乘船就其家飲宴若在市肆以為笑樂子元顯時年十六為政苛刻生殺自己矜豪奢侈發東諸郡免奴為客者號曰樂屬移置京師以充兵役道子既失威權遂終日昏醉不復厝意政無大小一委元顯元顯大治兵器聚徒十萬百姓饑饉人情危懼而道子元顯置酒作樂竟以此敗劉休祐在荊州裒刻在所多營財貨以短錢一百賦民田登既就求白米一斛米粒皆令潔白若有破折者悉刪揀不受民閒糴此米一斗一百至時又不受米計米責錢百姓嗷然不復堪命性狠戾前後忤上非一且慮將來難制遂方便殺之諡刺王劉義康性好吏職銳意文案是非莫不精盡為侍中司徒錄尚書事既專總朝政生殺大事皆以錄命斷之凡所陳奏入無不可方伯以下竝委義康授用由是朝野輻湊勢傾天下義康亦自強不息無有懈倦府門每旦常有數百乘車雖復位卑人微皆被引接又聰識過人一聞必記嘗所暫遇終身不忘稠人廣坐每標題所憶以示聰明物議益以此推服之愛惜官爵未嘗以階級私人凡朝士有才用者皆引入己府無施及忤旨即度為臺官自下樂為竭力私置僮六千餘人不以言臺時四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉柑歎其形味竝劣義康在坐曰今年柑殊有佳者遣人還東府取柑大供御者三寸因此見廢劉義恭鎮彭城伐魯郡孔子舊廟柏樹二十四株經歷漢晉其大連抱者二株先倒折土人崇敬莫之敢犯義恭悉遣人伐取之父老莫不歎息義恭性嗜不恆與時移變自始至終屢遷第宅與人游款意好亦多不終而奢侈無度不愛財寶左右親幸者一日先與一二百萬小有忤旨輒追奪之大明時資供豐厚而用常不足賒市百姓物無錢可還民有通辭求錢者輒題後作原字善騎馬解音樂游行或三五百里東至吳郡登虎丘山又登無錫烏山以望太湖劉義宣在荊鎮十年兵彊財富既首創大義誅元凶劭威名蓋天下凡所求欲無不畢從朝廷所下制度意所不同者一不遵奉嘗獻世祖酒先自酌飲封送所餘其不識大體也如此為臧質所說俄舉兵反以第八子慆為輔國將軍荊州刺史左司馬竺超民輔之王元謨舟師頓梁山洲內東西兩岸為卻月城營柵甚固撫軍柳元景據姑熟臧質徑入梁山去元謨一里許結營義宣屯蕪湖西南風猛質乘風從流攻元謨西壘冗從僕射胡子友等戰失利棄壘渡就元謨義宣至梁山步軍東岸敢元謨元謨分遣游擊將軍垣護之竟陵太守薛安都出壘奮擊大破之軍人一時投水護之因風縱火焚其舟乘風勢猛煙燄覆江縱兵攻之大眾奔潰義宣與質相失各單舸逆走與義宣相隨船舸猶有百餘艘女先適臧質子過尋陽入城取女載以西奔至江夏聞巴陵有軍懼被鈔回入逕口步向江陵眾散且盡腳痛不復行就民閒僦露車自載無復食緣道求告至江陵郭外遣人報竺超民超民具羽儀兵眾迎之時內外猶自如舊帶甲尚萬餘人義宣既入城仍出聽事見客左右翟靈寶戒使拊慰云昔漢高祖百敗終成大業而義宣忘所戒誤云項羽千敗眾咸掩口而笑乃於內戎服攜息慆及所愛妾五人皆著男子服相隨入城內擾亂白刃交橫義宣大懼落馬仍便步出超民送出城外未至郭將士逃散都盡唯餘慆及五妾兩黃門而已夜還向城入南郡空廨無床席地寢至旦遣黃門報超民遣故車一乘載送刺姦義宣止獄戶內坐地歎曰臧質老奴誤我始與五妾俱入獄五妾尋被遣出義宣號泣語獄吏曰常日非若今日分別始是苦尋盡殺之劉休範欲舉兵襲朝廷密與典籤新蔡人許公輿謀之上表治城樓堞多解榜板擬以供用遂舉兵反虜發百姓船乘使軍隊稱力請受付以先解榜板合手裝治二三日閒便悉整辦率眾二萬鐵騎數百匹發自尋陽盡晝夜取道大雷戍主杜道欣馳下告變道欣至一宿休範已至新林朝廷震動步上攻新亭壘自臨城南於前巘樓上以數百人自衛屯騎校尉黃回見其可乘乃偽往請降并詐宣齊王意旨休範大說以二子德宣德嗣與回為質至即斬之蕭遙光將敗都不復識人孫樂祖曹樹生常心腹委付後望見火起問左右此是何火荅曰下官向令人燒外閒左右仍問卿是誰曹樹生荅曰是孫樂祖仍問曹復是誰曹以名荅仍言左右下官熱發可覓冷沈飲并勸始安且還別省消息於是呼轝至始安便移殺於時名士皆在側見不識人沈昭略昭光之徒一時皆去遙光美風姿眉目如畫髮鬢若點漆隆準口如含丹而足蹇體殊肥壯腳如三歲小兒性聰察善吏政每至理朝廷大事及揚州曹獄動至三四更前列倡人後列侍女華燭照爛於其閒手捉玉柄毛扇有時以金鏤炙刀自割牛胘而食之每明帝有所誅殺必先取其名明帝大漸託以後事後主疑焉常就王索寶物王奉琥珀盤螭二枚枚廣五寸炯然洞徹無有瑕滓後主怒云琥珀者欲使虎來拍我也仍匍匐下地作羊行遂動心疾有時著衣袷而伏地入戶扇裏王交道素壯不勝忿怒一旦以手扳陰遂長數尺屢有別舍恆見丈夫露髻從屋來下以齧人俄失所在又有殺鬼來其齋閤轝兒鞭之流血而反常所親信鮮卑道兒及閹人吳明紹頭臥道兒膝上至四更中覓飲已而無人矣喚道兒又不得唯明紹伏床下荅云人皆叛去眾軍悉至於床下斬之蕭子響在荊州造仗長史司馬皆以啟聞王知大怒乃偽請入坐起既至坐厲聲色而語曰身父則是天子政復造五千人仗此復何嫌而君遂以上啟二下床叩頭拔褥刀自下斬之甚有膂力曾出獵頭亂呼梳取刷於馬上以手捉左右襢帶去地數尺令料頭竟乃放之此其勇也竟被誅
