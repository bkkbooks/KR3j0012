  - {type: variant, offset: 3637, length: 0, content: '', WYG: 案别卷載金樓子一條其事同其文互異又不著篇名附録於此以備考薛譚學謳於秦未窮青之㫖於一日遂辭歸秦青乃餞於郊衢撫節悲歌聲震林木響遏行雲薛譚乃謝求返終身不敢言歸秦青謂其友曰昔韓娥東之齊匱粮過雍門鬻歌假食既去而響繞梁三日不絶左右以其人弗去過逆旅逆旅之人辱之韓娥因曼聲哀哭一里老幼悲愁涕泣相對三日不食遽追而謝之娥復曼聲長歌一里老幼喜歡抃舞弗能自禁乃厚賂而遣之故雍門之人至今善歌善哭效娥之遺聲}
