  - {type: variant, offset: 1893, length: 0, content: '', WYG: 案晉書譙縱傳朱齡石徙馬躭於越嶲追殺之耽之徙也謂其徒曰朱侯不送我京師㓕衆口也吾必不免乃盥洗而卧引繩而死湏􅁷齡石師至遂戮尸焉史謂不送我京師㓕衆口也此謂朱齡石具以聞與史不同一也史謂師至此謂蜀使繼至與史不同二也史謂引繩而死此謂言訖冺然若已絶與史不同三也又考宋書朱齡石傳譙縱奔於涪城巴西人王志斬送偽尚書令馬耽封府庫以待王師則封府庫以待宋之師者志也并無徙越嶲事晋書則謂其尚書令馬耽封倉庫以待王師此亦謂耽方檢封儲藏為國防守各書不同如此}
